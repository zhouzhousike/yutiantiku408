生变化。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"ip数据报经过每个路由器时内容必然发生变化的部分是()."},{"id":"b_cn_11_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":11,"date":"","stem":"某 IP 分组的片偏移字段值为 100，首部长度字段值为 5，总长度字段值为 100，则该 IP 分组的段数据部分的第一个字节的编号与最后一个字节的编号是（ ）。","options":{"A":"100,200","B":"100,500","C":"800,879","D":"800,900"},"answer":["C"],"analysis":"首部长度字段值为5，表示首部长度为20字节。总长度字段值为100，表示整个IP数据报总长度为100字节。因此，数据部分长度为80字节。片偏移字段值为100，以8字节为单位，故该分片的数据部分在原始数据报数据部分中的起始偏移量为800字节。该分片数据部分占用800至879字节，因此，第一个字节编号为800，最后一个字节编号为879。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"某ip分组的片偏移字段值为100,首部长度字段值为5,总长度字段值为100,则该ip分组的段数据部分的第一个字节的编号与最后一个字节的编号是()."},{"id":"b_cn_12_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":12,"date":"","stem":"以下关于分组分片的相关描述中，正确的是（ ）。","options":{"A":"分片的 MF=1，则此分片为 IP 分组的最后一个分片","B":"属于同一 IP 分组的分片具有相同的标识","C":"IP 分组的 DF=1，且长度超过 MTU，将该分组进行分片","D":"对于长度超过 MTU 但不允许分片的 IP 分组，主机会将其丢弃，且无需向源主机报告"},"answer":["B"],"analysis":"选项A错误，MF等于1表示后面还有分片，本分片不是最后一个，MF等于0才表示最后一个。选项B正确，同一IP数据报的所有分片必须具有相同的标识字段值，以便目的主机重组。选项C错误，DF等于1表示不允许分片，若长度超过MTU，路由器将丢弃该分组并向源主机发送差错报告，而不会进行分片。选项D错误，丢弃分组后路由器会向源主机发送ICMP差错报告报文。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"以下关于分组分片的相关描述中,正确的是()."},{"id":"b_cn_13_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":13,"date":"","stem":"若将网络 21.3.0.0/16 划分为 128 个规模相同的子网，则每个子网可分配的最大 IP 地址个数是（ ）。","options":{"A":"254","B":"256","C":"510","D":"512"},"answer":["C"],"analysis":"原网络21.3.0.0/16前缀长度为16位，主机位为16位，要划分为128个规模相同的子网，需要从原主机位中借用7位作为子网号，每个子网的主机位剩余9位。每个子网的总地址数为512个。可分配给主机的地址需减去子网地址和广播地址2个，因此最大可分配IP地址个数为510个。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"若将网络21.3.0.0/16划分为128个规模相同的子网,则每个子网可分配的最大ip地址个数是()."},{"id":"b_cn_14_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":14,"date":"","stem":"现将一个 IP 网络划分为 3 个子网，若其中一个子网是192.168.9.128/26，则下列网络中，不可能是另外两个子网之一的是（ ）。","options":{"A":"192.168.9.0/25","B":"192.168.9.0/26","C":"192.168.9.192/26","D":"192.168.9.192/27"},"answer":["B"],"analysis":"A选项，网络是192.168.9.0/25, 已知的网络是192.168.9.128/26,其划分思路是将192.168.9.0/24这个网络首先二分，得到192.168.9.0/25（选项中给的网络）；再将 192.168.9.128/25 划分成两个网络，得到","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"现将一个ip网络划分为3个子网,若其中一个子网是192.168.9.128/26,则下列网络中,不可能是另外两个子网之一的是()."},{"id":"b_cn_15_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":15,"date":"","stem":"下列情况需要启动 ARP 请求的是（ ）。","options":{"A":"主机需要接收信息，但 ARP 表中没有源 IP 地址与 MAC 地址的映射关系","B":"主机需要接收信息，但 ARP 表中已有源 IP 地址与 MAC 地址的映射关系","C":"主机需要发送信息，但 ARP 表中没有目的 IP 地址与 MAC 地址的映射关系","D":"主机需要发送信息，但 ARP 表中已有目的 IP 地址与 MAC 地址的映射关系"},"answer":["C"],"analysis":"ARP协议用于在发送数据之前通过目的IP地址解析其对应的MAC地址。当主机需要发送IP数据报到某个目的IP地址，但在本机ARP高速缓存中未找到该IP地址对应的MAC地址映射条目时，主机就会启动ARP请求，广播询问该IP地址对应的硬件地址。接收信息时不需要通过ARP解析源地址。因此，只有选项C描述了需要启动ARP请求的情况。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"下列情况需要启动arp请求的是()."},{"id":"b_cn_16_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":16,"date":"","stem":"如下图的支持VLAN划分的交换机，已按编口划分了3个VLAN，部分端口连接主机的IP和MAC地址如图示，ARP表结构为<IP地址,MAC地址,TTL>。下列选项中，不会出现在H4的ARP表中的是（ ）","options":{"A":"IP2.168.3.81, 00-18A2-3B-36-21, 14:32:00","B":"IP2.168.3.91, 00-3E-C2-39-12-B5, 14:37:00","C":"IP2.168.3.125, 00-E5-78-4A-09-B2, 14:35:00","D":"IP2.168.3.129, 00-08-6E-05-A7-82, 14:52:00"},"answer":["D"],"analysis":"在虚拟局域网（VLAN）中，每个VLAN都被视为一个独立的广播域。这意味着，ARP表中的条目只包含该VLAN内部的主机信息。当一个主机在其所在的VLAN中发送ARP请求时（例如，它想找出另一个主机的MAC地址），这个ARP请求只会在该VLAN内部广播。只有在同一个VLAN中的主机才会看到这个ARP请求，并有可能响应。这就是说，一个VLAN中的主机无法通过ARP找到其他VLAN中的主机的MAC地址。只有D只在VLAN3，其他都在VLAN1，因此选D。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"如下图的支持vlan划分的交换机,已按编口划分了3个vlan,部分端口连接主机的ip和mac地址如图示,arp表结构为<ip地址,mac地址,ttl>.下列选项中,不会出现在h4的arp表中的是()\u0001"},{"id":"b_cn_17_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":17,"date":"","stem":"当路由器没有匹配到目的 IP 地址对应的路由表项时，会使用默认路由，默认路由的目的地址和子网掩码应分别置为（ ）。","options":{"A":"255.255.255.255、255.255.255.255","B":"255.255.255.255、0.0.0.0","C":"0.0.0.0、0.0.0.0","D":"0.0.0.0、255.255.255.255"},"answer":["C"],"analysis":"默认路由是路由表中的最后一条兜底条目，用于匹配所有未被其他更具体路由所覆盖的目的地址。为了与任何目的IP地址都能匹配成功，其目的网络地址必须设置为0.0.0.0，子网掩码也必须设置为0.0.0.0，在CIDR记法中表示为0.0.0.0/0。任何IP地址与子网掩码0.0.0.0进行逻辑与运算，结果都为0.0.0.0，与默认路由的网络地址匹配，因此该条目可匹配所有目的地址。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"当路由器没有匹配到目的ip地址对应的路由表项时,会使用默认路由,默认路由的目的地址和子网掩码应分别置为()."},{"id":"b_cn_18_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":18,"date":"","stem":"某网络拓扑如下图所示，路由器 R1 只有到达子网 192.168.1.0/24 的路由。为使 R1 可以将 IP 分组正确地路由到图中所有子网，则在 R1 中需要增加的一条路由（目的网络，子网掩码，下一跳）是（ ）。","options":{"A":"192.168.2.0 255.255.255.128 192.168.1.1","B":"192.168.2.0 255.255.255.0 192.168.1.1","C":"192.168.2.0 255.255.255.128 192.168.1.2","D":"192.168.2.0 255.255.255.0 192.168.1.2"},"answer":["D"],"analysis":"要使 R1 能够正确将分组路由到所有子网，则 R1 中需要有到192.168.2.0/25和192.168.2.128/25的路由。所以要将这两个网络进行聚合，网络192.168.2.0/25和192.168.2.128/25的网络号的前24位都相同，于是可以聚合成超网 192.168.2.0/24。所以其子网掩码就是 24 个 1，即255.255.255.0，下一跳地址是192.168.1.2。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"某网络拓扑如下图所示,路由器r1只有到达子网192.168.1.0/24的路由.为使r1可以将ip分组正确地路由到图中所有子网,则在r1中需要增加的一条路由(目的网络,子网掩码,下一跳)是().\u0001"},{"id":"b_cn_19_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":19,"date":"","stem":"下列关于路由选择算法的描述中，（ ）是错误的。","options":{"A":"静态路由算法也被称为非自适应的算法","B":"静态路由算法所使用的路由选择一旦启动就不能修改","C":"动态路由算法也称自适应算法，会根据网络的拓扑变化和流量变化改变路由 决策","D":"动态路由算法需要实时获得网络的状态"},"answer":["B"],"analysis":"选项A正确，静态路由算法不随网络状态变化而调整，因此也称为非自适应算法。选项B错误，静态路由虽然不会自动适应网络变化，但网络管理员可以在任何时候手动修改静态路由配置，并非一旦启动就不能修改。选项C正确，动态路由算法能够感知拓扑和流量变化并自动调整路由，故称自适应算法。选项D正确，动态路由算法需要通过网络状态信息的交换来感知变化，因此需要实时或准实时地获得网络状态。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"下列关于路由选择算法的描述中,()是错误的."},{"id":"b_cn_20_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":20,"date":"","stem":"下列关于链路状态协议的描述中，（ ）是错误的。","options":{"A":"仅相邻路由器需要交换各自的路由表","B":"全网路由器的拓扑数据库是一致的","C":"采用洪泛法更新链路变化信息","D":"具有快速收敛的优点"},"answer":["A"],"analysis":"选项A错误，链路状态协议要求路由器通过洪泛法向全网所有路由器发送链路状态信息，而非仅与相邻路由器交换路由表。选项B正确，链路状态协议使同一区域内的所有路由器最终获得一致的链路状态数据库。选项C正确，链路状态更新采用洪泛法在全网传播。选项D正确，链路状态协议收敛速度快，是其主要优点。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"下列关于链路状态协议的描述中,()是错误的."},{"id":"b_cn_21_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":21,"date":"","stem":"关于 RIP，以下选项错误的是（ ）。","options":{"A":"RIP 使用距离向量算法计算最佳路由","B":"RIP 规定的最大有效跳数为 16","C":"RIP 按照一定的时间间隔更新路由信息","D":"RIP 是一种内部网关协议"},"answer":["B"],"analysis":"选项A正确，RIP是基于距离向量的路由协议。选项B错误，RIP规定的最大有效跳数为15，当距离达到16时表示不可达，因此16是无穷大而非最大跳数上限。选项C正确，RIP周期性地，默认每30秒向邻居发送路由更新。选项D正确，RIP是典型的内部网关协议。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"关于rip,以下选项错误的是()."},{"id":"b_cn_22_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":22,"date":"","stem":"以下关于OSPF协议的描述中，正确的是（ ）。","options":{"A":"OSPF协议根据链路状态法计算最佳路由","B":"OSPF协议是用于自治系统之间的外部网关协议","C":"OSPF协议不能根据网络通信情况动态地改变路由","D":"OSPF协议只适用于小型网络"},"answer":["A"],"analysis":"选项A正确，OSPF协议的核心是链路状态算法，基于全网链路状态数据库使用Dijkstra算法计算最佳路由。选项B错误，OSPF是内部网关协议，用于自治系统内部。选项C错误，OSPF是动态路由协议，能够根据网络拓扑变化动态调整路由。选项D错误，OSPF支持区域划分，适用于大规模网络。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"以下关于ospf协议的描述中,正确的是()."},{"id":"b_cn_23_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":23,"date":"","stem":"下列关于 OSPF 协议特征的描述中，错误的是（ ）。","options":{"A":"OSPF 协议将一个自治域划分成若干域，有一种特殊的域称为主干区域","B":"域之间通过区域边界路由器互连","C":"在自治系统中有 4 类路由器：区域内部路由器、主干路由器、区域边界路 由器和自治域边界路由器","D":"主干路由器不能兼作区域边界路由器"},"answer":["D"],"analysis":"选项A正确，OSPF划分区域，其中区域0为骨干区域，即主干区域。选项B正确，区域之间通过区域边界路由器连接。选项C正确，OSPF定义了四类路由器类型，即区域内路由器、骨干路由器、区域边界路由器和自治系统边界路由器。选项D错误，一台路由器可以同时承担多种角色，例如区域边界路由器如果位于骨干区域内，其本身也属于骨干路由器。因此，主干路由器可以兼作区域边界路由器。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"下列关于ospf协议特征的描述中,错误的是()."},{"id":"b_cn_24_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":24,"date":"","stem":"RIP、OSPF 协议、BGP 的路由选择过程分别使用（ ）。","options":{"A":"路径向量协议、链路状态协议、距离向量协议","B":"距离向量协议、路径向量协议、链路状态协议","C":"路径向量协议、距离向量协议、链路状态协议","D":"距离向量协议、链路状态协议、路径向量协议"},"answer":["D"],"analysis":"RIP使用距离向量算法，基于跳数度量。OSPF使用链路状态算法，基于Dijkstra最短路径计算。BGP使用路径向量算法，交换到达目的网络的完整自治系统路径序列。因此，三者的协议类型依次为距离向量协议、链路状态协议、路径向量协议。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"rip,ospf协议,bgp的路由选择过程分别使用()."},{"id":"b_cn_25_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":25,"date":"","stem":"若某路由器收到一个 TTL 值为 1 的 IP 数据报，则路由器的操作是（ ）。","options":{"A":"转发该 IP 数据报","B":"仅仅丢弃该 IP 数据报","C":"丢弃该 IP 数据报并向源主机发送类型为终点不可达的 ICMP 差错报告报文","D":"丢弃该 IP 数据报并向源主机发送类型为时间超过的 ICMP 差错报告报文"},"answer":["D"],"analysis":"路由器在转发IP数据报之前，先将TTL值减1。若收到的数据报TTL值已经是1，减1后变为0，路由器判定该数据报的生存时间已到，将丢弃该数据报，并向源主机发送ICMP时间超过差错报告报文，告知源主机该数据报已被丢弃的原因。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"若某路由器收到一个ttl值为1的ip数据报,则路由器的操作是()."},{"id":"b_cn_26_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":26,"date":"","stem":"在 IP 分组转发过程中，当生存时间 (TTL) 字段值减至 0 时，路由器将（ ）。","options":{"A":"丢弃该分组，并向源主机发送 ICMP 源抑制报文","B":"丢弃该分组，并向源主机发送 ICMP 超时报文","C":"转发该分组，并向源主机发送 ICMP 源抑制报文","D":"转发该分组，并向源主机发送 ICMP 超时报文"},"answer":["B"],"analysis":"当路由器将TTL值减1后结果为0时，必须丢弃该分组，并向源主机发送ICMP时间超过报文，即超时报文，以通知源主机分组因TTL耗尽而被丢弃。源抑制报文用于拥塞控制，现已废弃。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"在ip分组转发过程中,当生存时间(ttl)字段值减至0时,路由器将()."},{"id":"b_cn_27_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":27,"date":"","stem":"关于路由器的下列说法中，正确的是（ ）。","options":{"A":"路由器处理的信息量比交换机少，因而转发速度比交换机快","B":"对于同一目标，路由器只提供延迟最小的最佳路由","C":"通常的路由器可以支持多种网络层协议，并提供不同协议之间的分组转发","D":"路由器不但能够根据 IP 地址进行转发，而且可以根据物理地址进行转发"},"answer":["C"],"analysis":"选项A错误，路由器工作在网络层，需要解析IP首部并查表，处理复杂度高于工作在数据链路层的交换机，转发速度通常慢于交换机。选项B错误，路由器依据路由协议计算出的最优路径进行转发，路径度量值可能是跳数、代价或策略，不一定是延迟最小的路径。选项C正确，路由器通常设计为支持多种网络层协议，例如IPv4和IPv6双栈，可在不同协议之间转发。选项D错误，路由器转发分组的依据是网络层的IP地址，而非数据链路层的物理地址。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"关于路由器的下列说法中,正确的是()."},{"id":"b_cn_28_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":28,"date":"","stem":"路由器中计算路由信息的是（ ）。","options":{"A":"输入队列","B":"输出队列","C":"交换结构","D":"路由选择处理机"},"answer":["D"],"analysis":"路由选择处理机是路由器的控制平面核心构件，负责运行路由协议，与相邻路由器交换路由信息，并依据路由算法计算出路由表。输入队列和输出队列属于端口的缓存，交换结构负责在端口之间转发分组，均不承担路由计算任务。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"路由器中计算路由信息的是()."},{"id":"b_cn_29_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":29,"date":"","stem":"下列关于交换机连接的网络和路由器连接的网络的描述，（ ）是错误的。","options":{"A":"交换机连接的网络中，帧以 MAC 地址为转发方向的依据","B":"路由器连接的网络中，IP 分组以 IP 地址为转发方向的依据","C":"交换机必须要能解析分组中所使用的网络协议","D":"路由器必须要能解析分组中所使用的网络协议"},"answer":["C"],"analysis":"选项A正确，二层交换机根据帧头中的目的MAC地址查询MAC地址表进行转发。选项B正确，路由器根据IP分组首部中的目的IP地址查询路由表进行转发。选项C错误，传统二层交换机仅工作在数据链路层，依据MAC地址进行转发，不需要也不应解析上层的网络层协议。三层交换机具备路由功能时则需要解析。选项D正确，路由器工作在网络层，必须能解析IP协议等网络层协议以进行路由决策。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"下列关于交换机连接的网络和路由器连接的网络的描述,()是错误的."},{"id":"b_cn_30_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":30,"date":"","stem":"下列关于 IPv4 和 IPv6 的说法中，正确的是（ ）。","options":{"A":"与 IPv4 相比，IPv6 地址从 32 位增加到 64 位","B":"IPv6 在传输路径中若长度超过了MTU，路由器会将其分片","C":"IPv6 地址首部中没有校验和字段","D":"IPv4 比 IPv6 更安全"},"answer":["C"],"analysis":"选项A错误，IPv6地址长度为128位，不是64位。选项B错误，IPv6规定中间路由器不再进行分片操作，分片功能仅由源节点执行，若中途超过MTU，路由器直接丢弃并发送ICMPv6差错报告。选项C正确，IPv6基本首部取消了校验和字段，以减轻路由器每跳计算的负担。选项D错误，IPv6在设计上内置了对IPSec的强制支持，安全性相较IPv4有显著提升。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"下列关于ipv4和ipv6的说法中,正确的是()."},{"id":"b_cn_31_第四讲 网络层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第四章 网络层","num":31,"date":"","stem":"下列关于 IPv4 和 IPv6 的叙述中，正确的是（ ）。\nI.IPv6 地址空间是 IPv4 地址空间的 96 倍\nII.IPv4 首部和 IPv6 基本首部的长度均可变\nIII.IPv4 向 IPv6 过渡可以采用双协议栈和隧道技术\nIV.IPv6 首部的 HopLimit 字段等价于 IPv4 首部的 TTL 字段","options":{"A":"仅 I、II","B":"仅 I、IV","C":"仅 II、III","D":"仅 III、IV"},"answer":["D"],"analysis":"第I项错误，IPv6地址空间为2128，IPv4地址空间为232，前者是后者的296倍，而非96倍。第II项错误，IPv4首部因选项字段而长度可变，IPv6基本首部固定为40字节，长度不可变。第III项正确，双协议栈和隧道技术是IPv4向IPv6过渡的两种主流技术。第IV项正确，IPv6的跳数限制字段在功能上与IPv4的TTL字段等价，每经过一跳路由器减1，减至0时丢弃数据报。因此，正确的叙述是III和IV。","kps":["计算机网络","第四讲 网络层"],"video":"","_n":"下列关于ipv4和ipv6的叙述中,正确的是().i.ipv6地址空间是ipv4地址空间的96倍ii.ipv4首部和ipv6基本首部的长度均可变iii.ipv4向ipv6过渡可以采用双协议栈和隧道技术iv.ipv6首部的hoplimit字段等价于ipv4首部的ttl字段"},{"id":"b_cn_1_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":1,"date":"","stem":"传输层使用（ ）标识参与通信的进程。","options":{"A":"主机地址","B":"网络地址","C":"端口号","D":"MAC地址"},"answer":["C"],"analysis":"传输层通过端口号来区分同一台主机上同时运行的多个应用进程，从而将数据正确地交付给目标进程。主机地址和网络地址即IP地址，用于标识网络中的主机，属于网络层的寻址范畴。MAC地址用于数据链路层标识网络接口硬件。三者均不直接用于传输层的进程标识。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"传输层使用()标识参与通信的进程."},{"id":"b_cn_2_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":2,"date":"","stem":"UDP 数据报首部不包含（ ）。","options":{"A":"UDP 源端口号","B":"UDP 检验和","C":"UDP 目的端口号","D":"UDP 数据报首部长度"},"answer":["D"],"analysis":"UDP数据报的首部由四个字段组成，分别是源端口号、目的端口号、长度和检验和，每个字段各占2字节，共8字节。UDP首部中并没有单独的首部长度字段，UDP首部的长度是固定的8字节，因此不需要专门的字段来指示。长度字段记录的是整个UDP数据报的总长度，包括首部和数据部分，而非首部长度。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"udp数据报首部不包含()."},{"id":"b_cn_3_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":3,"date":"","stem":"下列关于UDP的说法中，正确的是（ ）。","options":{"A":"适合对数据丢失率要求不高的实时应用","B":"UDP具有重传机制","C":"UDP无法找到目的进程","D":"伪首部是UDP首部的一部分"},"answer":["A"],"analysis":"选项A正确，UDP无连接、开销小、传输时延低，非常适合实时音视频流、在线游戏等对实时性要求高但对少量数据丢失可容忍的应用。选项B错误，UDP本身不提供任何重传机制，重传需由上层应用自行实现。选项C错误，UDP通过目的端口号能够准确定位目的主机上的目标应用进程。选项D错误，伪首部仅在校验和计算时临时构造，并不属于UDP数据报首部的实际组成部分，不随报文传输。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"下列关于udp的说法中,正确的是()."},{"id":"b_cn_4_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":4,"date":"","stem":"下列网络应用中，（ ）不适合使用 UDP 协议。","options":{"A":"客户/服务器模型应用","B":"远程调用","C":"实时多媒体应用","D":"远程登录"},"answer":["D"],"analysis":"远程登录，如Telnet或SSH，要求每条命令和响应都必须被准确无误且按序地传输，任何数据的丢失、乱序或重复都会导致严重的操作错误，因此必须依赖TCP提供的可靠传输服务，不适合使用UDP。客户服务器模型应用和远程调用可以根据具体需求灵活选择TCP或UDP。实时多媒体应用则是UDP的典型应用场景，可容忍少量丢包以换取低延迟。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"下列网络应用中,()不适合使用udp协议."},{"id":"b_cn_5_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":5,"date":"","stem":"关于 UDP 描述不正确的是（ ）。","options":{"A":"UDP 支持端口号","B":"UDP 与 TCP 位于同一层","C":"UDP 采用尽力交付策略","D":"UDP 是面向连接的"},"answer":["D"],"analysis":"选项A正确，UDP首部包含源端口号和目的端口号字段。选项B正确，UDP和TCP均属于传输层协议。选项C正确，UDP提供尽最大努力交付服务，不保证可靠传输。选项D错误，UDP是无连接的传输层协议，在通信前不需要建立连接。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"关于udp描述不正确的是()."},{"id":"b_cn_6_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":6,"date":"","stem":"下列关于UDP协议的叙述中，正确的是（ ）。\nI. 提供无连接服务\nII. 提供复用/分用服务\n\nIII. 通过差错校验，保障可靠数据传输","options":{"A":"仅 I","B":"仅 I、II","C":"仅 II、III","D":"I、II、III"},"answer":["B"],"analysis":"第I项正确，UDP是无连接的传输层协议。第II项正确，UDP通过端口号实现了进程间的复用与分用功能。第III项错误，UDP的检验和机制仅用于检测数据在传输中是否发生比特差错，发现错误后只是丢弃数据报，并不提供任何纠错或重传机制，因此不能保障可靠数据传输。正确的叙述是I和II。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"下列关于udp协议的叙述中,正确的是().i.提供无连接服务ii.提供复用/分用服务iii.通过差错校验,保障可靠数据传输"},{"id":"b_cn_7_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":7,"date":"","stem":"下列关于 TCP 的叙述中，正确的是（ ）。\nI.TCP 是一个端到端的通信协议\nII.TCP 提供了无连接的可靠数据传输\nIII.TCP 将来自上层的字节流组织成 IP 数据报，然后交给 IP\nIV.TCP 将收到的报文段组成字节流交给上层","options":{"A":"I、II","B":"I、IV","C":"仅 IV","D":"III、IV"},"answer":["B"],"analysis":"第I项正确，TCP是传输层协议，提供进程到进程的端到端通信服务。第II项错误，TCP是面向连接的协议，在数据传输之前必须通过三次握手建立连接，而非无连接。第III项表述有误，TCP将来自上层的字节流组织成TCP报文段，然后交给网络层的IP协议，再由IP协议将其封装为IP数据报进行传输，TCP并不直接生成IP数据报。第IV项正确，接收方TCP协议栈将收到的各个TCP报文段中的数据部分按照序号重新排序并组装成连续的字节流，然后交付给上层的应用进程。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"下列关于tcp的叙述中,正确的是().i.tcp是一个端到端的通信协议ii.tcp提供了无连接的可靠数据传输iii.tcp将来自上层的字节流组织成ip数据报,然后交给ipiv.tcp将收到的报文段组成字节流交给上层"},{"id":"b_cn_8_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":8,"date":"","stem":"TCP 是面向字节流的传输协议，关于 TCP 报文段长度的表述，正确的是（ ）。","options":{"A":"TCP 报文段长度根据每次应用进程需要传输的数据块长度决定","B":"TCP 报文段长度根据路径上能够传送的最大数据块长度决定","C":"TCP 报文段长度根据接收方的接收能力和网络状况决定","D":"TCP 报文段长度确定后，在本应用进程通信过程中保持不变"},"answer":["C"],"analysis":"TCP是面向字节流的协议，应用进程将数据以字节流的形式写入TCP发送缓冲区。TCP并不按照应用程序的写入边界来划分报文段，而是根据接收方通告的接收窗口大小，即接收能力，以及当前网络拥塞窗口，即网络状况，动态决定每次从发送缓冲区中取出多少个字节组成一个报文段发送。因此，TCP报文段的长度是动态可变的，同一个连接在不同时刻的报文段长度可以完全不同。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"tcp是面向字节流的传输协议,关于tcp报文段长度的表述,正确的是()."},{"id":"b_cn_9_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":9,"date":"","stem":"以下关于 TCP 协议的说法，不正确的是（ ）。","options":{"A":"TCP 协议具有拥塞控制的功能","B":"TCP 协议数据单元的窗口字段是为了进行动态的流量控制","C":"TCP 协议提供面向连接的服务，来保证数据按序到达接收方","D":"TCP 协议不支持组播"},"answer":["C"],"analysis":"。选项 A 正确，TCP 协议包含慢启动、拥塞避免、快重传、快恢复等完整的拥塞控制机制。选项 B 正确，TCP 首部的窗口字段用于接收方向发送方通告自己当前的接收能力，实现端到端的动态流量控制。选项 C 错误，TCP的面向连接只是建立端到端的逻辑通路，IP 数据报在网络中仍可能乱序到达，TCP需要在接收端重新排序后才能按序交付给应用层。选项 D 正确，TCP只能在两个端点之间建立一对一的连接，不支持组播和广播通信。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"以下关于tcp协议的说法,不正确的是()."},{"id":"b_cn_10_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":10,"date":"","stem":"长度为 2000 字节的应用层数据依次封装成 TCP 报文段、IP 数据报和以太网的帧后传送出去（不考虑前导码及以太网帧拆分的情况），则数据的最高传输效率为（ ）。","options":{"A":"97.28%","B":"97.19%","C":"96.34%","D":"95.42%"},"answer":["B"],"analysis":"传输效率定义为应用层数据长度占最终以太网帧总长度的百分比。若要使传输效率最高，则控制信息应该尽可能少。TCP首部取最短的20字节，IP首部取最短的20字节，以太网帧的帧头包括目的MAC地址6字节、源MAC地址6字节、类型字段2字节共14字节，帧尾检验序列为4字节，帧头和帧尾合计18字节，总开销为58字节。数据部分2000字节，因此总帧长为2058字节。传输效率=2000/2058，约等于百分之97.19。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"长度为2000字节的应用层数据依次封装成tcp报文段,ip数据报和以太网的帧后传送出去(不考虑前导码及以太网帧拆分的情况),则数据的最高传输效率为()."},{"id":"b_cn_11_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":11,"date":"","stem":"下列关于 TCP 报头格式的描述中，错误的是（ ）。","options":{"A":"报头长度为 20 ~ 60B，其中固定部分为 20B","B":"端口号字段依次表示源端口号与目的端口号","C":"报头长度总是 4 的倍数个字节","D":"TCP 检验和伪首部中 IP 分组头的协议字段为 17"},"answer":["D"],"analysis":"选项A正确，TCP首部的固定部分为20字节，加上选项字段后最大可达60字节。选项B正确，TCP首部中前两个字段依次为源端口号和目的端口号。选项C正确，数据偏移字段以4字节为单位，且选项后跟有填充字段，确保首部总长度是4字节的整数倍。选项D错误，TCP对应的IP协议字段值为6，而17是UDP对应的协议字段值。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"下列关于tcp报头格式的描述中,错误的是()."},{"id":"b_cn_12_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":12,"date":"","stem":"主机甲向主机乙发送一个 (SYN=1,seq=1000) 的 TCP 段，期望与主机乙建立 TCP 连接，若主机乙接受该连接请求，则主机乙向主机甲发送的正确的 TCP 段可能是（ ）。","options":{"A":"(SYN=1, ACK=0, seq=1001, ack=1001)","B":"(SYN=1, ACK=1, seq=1000, ack=1000)","C":"(SYN=1, ACK=1, seq=1001, ack=1001)","D":"(SYN=0, ACK=1, seq=1000, ack=1000)"},"answer":["C"],"analysis":"TCP 三次握手的第二次握手报文必须同时设置SYN=1和ACK=1标志位。SYN=1 表示主机乙同步自己的初始序号，ACK=1 表示对主机甲连接请求的确认。ack 字段的值为对方初始序号加 1，即 1000+1=1001，因为 SYN 段会消耗一个序号。seq 字段为主机乙自己的初始序号，本题选项中为 1001。选项 A 中 ACK=0 错误；选项 B 中 ack=1000 错误；选项 D 中 SYN=0 错误。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"主机甲向主机乙发送一个(syn=1,seq=1000)的tcp段,期望与主机乙建立tcp连接,若主机乙接受该连接请求,则主机乙向主机甲发送的正确的tcp段可能是()."},{"id":"b_cn_13_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":13,"date":"","stem":"假设客户C和服务器S已建立一个TCP连接，通信往返时间RTT=50ms，最长报文段寿命MSL=800ms，数据传输结束后，C主动请求断开连接。若从C主动向S发出FIN段时刻算起，则C和S进入CLOSED状态所需的时间至少分别是（ ）","options":{"A":"850ms，50ms","B":"1650ms，50ms","C":"850ms，75ms","D":"1650ms，75ms"},"answer":["C"],"analysis":"题目问的是最少时间，所以当服务器S 收到客户C 发送的FIN 请求后不再发送数据，而是立马发送FIN 请求(即第②步和第③步同时发生，忽略","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"假设客户c和服务器s已建立一个tcp连接,通信往返时间rtt=50ms,最长报文段寿命msl=800ms,数据传输结束后,c主动请求断开连接.若从c主动向s发出fin段时刻算起,则c和s进入closed状态所需的时间至少分别是()"},{"id":"b_cn_14_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":14,"date":"","stem":"甲和乙的通信是 TCP 连接，甲向乙发送的报文段数据部分有 10 个字节，已知乙发回的确认报文段中 seq=401，ack=311，那么先前甲向乙发送的报文段中（ ）。","options":{"A":"seq=301,ack=301","B":"seq=300,ack=401","C":"seq=301,ack=401","D":"seq=302,ack=311"},"answer":["C"],"analysis":"乙发回的ack=311，表示乙期望收到甲的下一个字节序号是311，即乙已经正确收到了甲发送的序号为310及之前的所有字节。甲这次发送了10个字节，因此这次发送的第一个字节序号为311-10=301，即甲发送报文段的seq字段值为301。乙发回的seq=401，表示乙发送的这个确认报文段的第一个字节序号是401。因此，甲在发送报文段时，ack字段的值应为401，表示甲期望收到乙的下一个字节序号是401。综上，甲发送的报文段中seq=301，ack=401。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"甲和乙的通信是tcp连接,甲向乙发送的报文段数据部分有10个字节,已知乙发回的确认报文段中seq=401,ack=311,那么先前甲向乙发送的报文段中()."},{"id":"b_cn_15_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":15,"date":"","stem":"一个 TCP 连接总是以 1KB 的最大段长发送 TCP 段，发送方有足够多的数据要发送。当拥塞窗口为 16KB 时发生了超时， 如果接下来的 4 个\nRTT（往返时间）时间内的 TCP 段的传输都是成功的，那么当第 4 个 RTT 时间内发送的所有 TCP 段都得到肯定应答时，拥塞窗口大小是（ ）。","options":{"A":"7 KB","B":"8 KB","C":"9 KB","D":"16 KB"},"answer":["C"],"analysis":"在本题中，在拥塞窗口为16KB 时发生超时，将拥塞窗口重设为1，慢开始门限设为8KB，并重新开始采用慢开始算法。在第一个、第二个、第三个传输轮次后，发送方的拥塞窗口分别变为2KB、4KB、8KB。在第四个RTT 结束，发送方收到了所有数据段的确后，此时的拥塞窗口已经达到了慢开始门限，所以采用拥塞避免算法，拥塞窗口就变成了8KB+1KB=9KB，而不是慢开始算法的8KB×2=16KB。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"一个tcp连接总是以1kb的最大段长发送tcp段,发送方有足够多的数据要发送.当拥塞窗口为16kb时发生了超时,如果接下来的4个rtt(往返时间)时间内的tcp段的传输都是成功的,那么当第4个rtt时间内发送的所有tcp段都得到肯定应答时,拥塞窗口大小是()."},{"id":"b_cn_16_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":16,"date":"","stem":"主机甲与主机乙之间已建立一个 TCP 连接， 双方持续有数据传输，且数据无差错与丢失。若甲收到 1 个来自乙的 TCP 段，该段的序号为 1913、确认序号为 2046、有效载荷为 100 字节，则甲立即发送给乙的 TCP 段的序","options":{"A":"2046、2012","B":"2046、2013","C":"2047、2012","D":"2047、2013"},"answer":["B"],"analysis":"根据题干，甲收到1 个来自乙的TCP 段，该段的序号seq=1913、 确认序号ack =2046、有效载荷为100 字节，表明到序号1913 +100-1 =2012 为止的所有数据甲均已收到，所以甲期待收到乙的下一个字节的序号为2013，所以发送确认序号为2013，而乙给甲发送的确认序号为2046 则表明期望收到下一个报文段的序号从2046 开始，所以表明甲给乙发送的序号为2046，综上所述，甲发给乙的TCP 段的序号seq=ack=2046 和确认序号ack1=seq+100=2013。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"主机甲与主机乙之间已建立一个tcp连接,双方持续有数据传输,且数据无差错与丢失.若甲收到1个来自乙的tcp段,该段的序号为1913,确认序号为2046,有效载荷为100字节,则甲立即发送给乙的tcp段的序号和确认序号分别是()."},{"id":"b_cn_17_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":17,"date":"","stem":"主机 A 通过三次握手与主机 B 建立 TCP 连接，主机 A 向主机 B发送了 2 个连续的报文段，分别携带长度为 1300B 和 362B 的有效载荷，主机 B 正确收到两个报文段，若序号从 0 开始，则主机 B 希望接收的下一个序号为（ ）。","options":{"A":"1300","B":"362","C":"1662","D":"1663"},"answer":["C"],"analysis":"TCP 协议采用面向字节流的编号方式，每个字节的数据都有一个唯一的序号。确认号字段的值表示期望收到对方下一个字节的序号，等于已正确接收的最后一个字节的序号加 1。本题中，序号从 0 开始：第一个报文段携带1300B 数据，字节序号范围为0~1299，第二个报文段携带 362B 数据，字节序号范围为1300~1661。主机 B 正确收到了这两个报文段，意味着它已经接收了序号 0~1661 的所有字节。因此，主机 B 希望接收的下一个序号为1661+1=1662。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"主机a通过三次握手与主机b建立tcp连接,主机a向主机b发送了2个连续的报文段,分别携带长度为1300b和362b的有效载荷,主机b正确收到两个报文段,若序号从0开始,则主机b希望接收的下一个序号为()."},{"id":"b_cn_18_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":18,"date":"","stem":"将流量控制用于 TCP 数据传输的原因是为了（ ）。","options":{"A":"同步设备速度以便发送数据","B":"同步并对序列号排序，从而以完整的数字顺序发送数据","C":"防止输入数据耗尽接收方资源","D":"在服务器上同步窗口大小"},"answer":["C"],"analysis":"TCP流量控制的核心目的是防止发送方的发送速率超过接收方的接收处理能力，从而避免接收方的接收缓冲区被溢出耗尽。如果发送方不顾接收方的处理速度持续高速发送数据，接收方的缓冲区很快会被填满，后续到达的数据将被丢弃，导致不必要的重传和资源浪费。因此，流量控制是为了匹配收发双方的速度，保护接收方资源。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"将流量控制用于tcp数据传输的原因是为了()."},{"id":"b_cn_19_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":19,"date":"","stem":"下列关于 TCP 窗口与拥塞控制概念的描述中，错误的是（ ）。","options":{"A":"接收窗口（rwnd）通过 TCP 首部中的窗口字段通知数据的发送方","B":"发送窗口确定的依据是：发送窗口 = min{接收端窗口，拥塞窗口}","C":"拥塞窗口是接收端根据网络拥塞情况确定的窗口值","D":"拥塞窗口大小在开始时可以按指数规律增长"},"answer":["C"],"analysis":"选项A正确，接收窗口即rwnd由接收方维护，并通过TCP首部的窗口字段通告给发送方。选项B正确，发送方的实际发送窗口取接收窗口与拥塞窗口两者中的较小值。选项C错误，拥塞窗口cwnd是由发送方根据对网络拥塞程度的判断来独立维护和动态调整的，而非由接收端确定。选项D正确，在慢开始阶段，拥塞窗口的大小呈指数规律增长。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"下列关于tcp窗口与拥塞控制概念的描述中,错误的是()."},{"id":"b_cn_20_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":20,"date":"","stem":"一个 TCP 连接总是以 1KB 的最大段发送 TCP 段，发送方有足够多的数据要发送，当拥塞窗口为 32KB 时发生超时，如果接下来的 8 个 RTT(往返时间)时间内的 TCP 的传输都是成功的，那么当第 8 个 RTT 时间内发送的所有 TCP 段都得到肯定应答，拥塞窗口大小是（ ）。","options":{"A":"16KB","B":"18KB","C":"19KB","D":"20KB"},"answer":["D"],"analysis":"根据TCP Tahoe版本的拥塞控制算法，当发生超时时，发送方会执行以下操作。第一步，将慢开始门限ssthresh更新为当前拥塞窗口值的一半，即32KB除以2等于16KB。第二步，将拥塞窗口cwnd重置为1个MSS，即1KB。第三步，重新从慢开始算法开始执行。初始状态，发生超时后，cwnd等于1KB，ssthresh等于16KB。第1个RTT，发送方根据cwnd为1KB发送数据并收到确认。这一轮次结束后cwnd翻倍，变为2KB。第2个RTT结束后cwnd翻倍，变为4KB。第3个RTT结束后cwnd翻倍，变为8KB。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"一个tcp连接总是以1kb的最大段发送tcp段,发送方有足够多的数据要发送,当拥塞窗口为32kb时发生超时,如果接下来的8个rtt(往返时间)时间内的tcp的传输都是成功的,那么当第8个rtt时间内发送的所有tcp段都得到肯定应答,拥塞窗口大小是()."},{"id":"b_cn_21_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":21,"date":"","stem":"假设MSS为1KB，TCP 的拥塞窗口变为18KB时出现了一个超时，如果接下来的 4 次传输轮次全部成功的话，则拥塞窗口为（ ）。","options":{"A":"2KB","B":"4KB","C":"8KB","D":"9KB"},"answer":["D"],"analysis":"发生超时后，cwnd等于1KB，ssthresh等于9KB。第1个RTT，发送方根据cwnd为1KB发送数据并收到确认。这一轮次结束后cwnd翻倍，变为2KB。第2个RTT结束后cwnd翻倍，变为4KB。第3个RTT结束后cwnd翻倍，变为8KB。第4个RTT结束后cwnd翻倍，变为9KB。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"假设mss为1kb,tcp的拥塞窗口变为18kb时出现了一个超时,如果接下来的4次传输轮次全部成功的话,则拥塞窗口为()."},{"id":"b_cn_22_第五讲 传输层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第五章 传输层","num":22,"date":"","stem":"若主机甲与主机乙建立 TCP 连接时发送的 SYN 段中的序号为1000，在断开连接时， 甲发送给乙的 FIN 段中的序号为 5001，则在无任何重传的情况下，甲向乙已经发送的应用层数据的字节数为（ ）","options":{"A":"4002","B":"4001","C":"4000","D":"3999"},"answer":["C"],"analysis":"主机甲和主机乙建立TCP 连接的序号是1000，也就是第一次握手的序号是1000，第三次握手的序号是1001，但是一般情况下，第三次握手时即开始发送数据，也就是主机甲向主机乙发送数据的第一个自己的编号是1001；甲发送给乙的FIN 段中的序号为5001，那么主机甲向主机乙发送的字节数是5001-1001 =4000B，故选C。","kps":["计算机网络","第五讲 传输层"],"video":"","_n":"若主机甲与主机乙建立tcp连接时发送的syn段中的序号为1000,在断开连接时,甲发送给乙的fin段中的序号为5001,则在无任何重传的情况下,甲向乙已经发送的应用层数据的字节数为()"},{"id":"b_cn_1_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":1,"date":"","stem":"下面关于客户端/服务器模型的描述，（ ）存在错误。\nI. 客户端必须提前知道服务器的地址，而服务器则不需要提前知道客户端的地址\nII. 客户端主要实现如何显示信息与收集用户的输入，而服务器主要实现数据的处理\nIII. 浏览器显示的内容来自服务器\nIV. 客户端是请求方，即使连接建立后，服务器也不能主动发送数据","options":{"A":"I、IV","B":"III、IV","C":"仅 IV","D":"仅 III"},"answer":["C"],"analysis":"第I项正确，客户端必须预先知道服务器的地址才能发起请求，服务器从请求中获取客户端地址。第II项正确，客户端侧重用户界面和交互，服务器侧重后端数据处理和存储，这是C/S模型的典型分工。第III项正确，浏览器作为客户端，其显示的内容是从服务器获取的，包括HTML页面、图片等资源。第IV项错误，客户端虽然是请求发起方，但TCP连接一旦建立，连接是全双工的，服务器完全可以主动向客户端推送数据，例如服务器主动发送消息通知，或者在WebSocket中主动推送实时数据。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下面关于客户端/服务器模型的描述,()存在错误.i.客户端必须提前知道服务器的地址,而服务器则不需要提前知道客户端的地址ii.客户端主要实现如何显示信息与收集用户的输入,而服务器主要实现数据的处理iii.浏览器显示的内容来自服务器iv.客户端是请求方,即使连接建立后,服务器也不能主动发送数据"},{"id":"b_cn_2_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":2,"date":"","stem":"下列关于网络应用模型的叙述中，错误的是（ ）。","options":{"A":"在 P2P 模型中，结点之间具有对等关系","B":"在客户/服务器（C/S）模型中，客户与客户之间可以直接通信","C":"在 C/S 模型中，主动发起通信的是客户，被动通信的是服务器","D":"在向多用户分发一个文件时，P2P 模型通常比 C/S 模型所需的时间短"},"answer":["B"],"analysis":"选项A正确，P2P模型中各结点地位对等，每个结点既可提供服务也","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列关于网络应用模型的叙述中,错误的是()."},{"id":"b_cn_3_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":3,"date":"","stem":"下列说法错误的是（ ）。","options":{"A":"Internet 上提供客户访问的主机一定要有域名","B":"同一域名在不同时间可能解析出不同的 IP 地址","C":"多个域名可以指向同一台主机的 IP 地址","D":"IP 子网中的主机可以由不同的域名服务器来维护其映射"},"answer":["A"],"analysis":"选项A错误，互联网上的主机通过IP地址进行通信，域名只是便于记忆的别名，并非必须。一台提供服务的服务器完全可以只有IP地址而没有注册域名，用户仍可通过IP地址直接访问。选项B正确，由于负载均衡，同一域名在不同时间可能解析到不同的IP地址。选项C正确，多个域名可以通过DNS配置指向同一个IP地址，即同一台服务器托管多个网站。选项D正确，域名映射的管理以区为单位，不同的区可以交由不同的权限域名服务器负责，IP子网与域名的映射维护并无强制的一一对应关系。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列说法错误的是()."},{"id":"b_cn_4_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":4,"date":"","stem":"在DNS的递归查询中，由（ ）将查到的IP地址发送给客户端。","options":{"A":"权限域名服务器","B":"根服务器","C":"顶级域名服务器","D":"本地域名服务器"},"answer":["D"],"analysis":"在递归查询方式中，客户端向本地域名服务器发起一次查询请求后，本地域名服务器便承担起以自身名义逐级向外查询的全部责任。本地域名服务器可能依次向根域名服务器、顶级域名服务器和权限域名服务器发起查询，直到获得最终解析结果。无论中间经过了多少级查询，最终将IP地址返回给客户端的始终是这台最初接收请求的本地域名服务器。中间各级域名服务器只将结果返回给本地域名服务器，不与原始客户端直接通信。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"在dns的递归查询中,由()将查到的ip地址发送给客户端."},{"id":"b_cn_5_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":5,"date":"","stem":"如果本地域名服务器无缓存，当采用递归方法解析另一网络某主机域名时， 用户主机、本地域名服务器发送的域名请求消息数分别为（ ）。","options":{"A":"一条、一条","B":"一条、多条","C":"多条、一条","D":"多条、多条"},"answer":["A"],"analysis":"在递归查询方式下，用户主机只向本地域名服务器发送一条域名请求消息，然后等待最终结果。本地域名服务器收到该请求后，如果没有缓存，它会以递归的方式代为主机完成后续查询，在递归查询中，本地域名服务器向根域名服务器发送请求后，根域名服务器也会以递归方式为本地域名服务器完成查询，即根域名服务器代替本地域名服务器去依次查询顶级域名服务器和权限域名服务器。因此本地域名服务器实际上也只向根域名服务器发出了一条请求消息，然后等待根域名服务器返回最终结果。因此，用户主机和本地域名服务器各自都只发送了一条请求消息。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"如果本地域名服务器无缓存,当采用递归方法解析另一网络某主机域名时,用户主机,本地域名服务器发送的域名请求消息数分别为()."},{"id":"b_cn_6_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":6,"date":"","stem":"下列是文件传输协议（FTP）主要特征的是（ ）。","options":{"A":"允许客户指明文件的类型但不允许指明文件的格式","B":"不允许客户指明文件的类型但允许指明文件的格式","C":"允许客户指明文件的类型与格式","D":"不允许客户指明文件的类型与格式"},"answer":["C"],"analysis":"FTP提供交互式访问，允许客户在传输前指明文件的类型，例如ASCII文本文件或二进制文件，也允许指明文件的格式或数据结构，例如文件结构、记录结构或页结构。这使得FTP能够在异构计算机系统之间正确地传输文件。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列是文件传输协议(ftp)主要特征的是()."},{"id":"b_cn_7_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":7,"date":"","stem":"FTP 中作为服务器一方的进程，通过监听（ ）端口得知有无服务请求。","options":{"A":"53","B":"80","C":"20","D":"21"},"answer":["D"],"analysis":"FTP服务器的主进程在熟知端口21上监听，等待客户进程发来的连接请求。53是DNS的熟知端口，80是HTTP的熟知端口，20是FTP在主动模式下用于数据连接的默认端口，服务器并不在20端口上监听连接请求。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"ftp中作为服务器一方的进程,通过监听()端口得知有无服务请求."},{"id":"b_cn_8_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":8,"date":"","stem":"下列关于 FTP 工作过程的描述，错误的是（ ）。","options":{"A":"FTP 协议支持不同类型操作系统的文件传输","B":"FTP 服务器端包括控制进程和数据进程两个进程","C":"FTP 服务器在每次数据传输结束时会同时释放控制端口和数据端口","D":"FTP 的控制连接是持久的"},"answer":["C"],"analysis":"选项A正确，FTP屏蔽了不同操作系统的文件系统差异，支持异构系统间文件传输。选项B正确，FTP服务器端有主控制进程负责监听和建立控制连接，以及为每个客户创建的数据传输进程。选项C错误，每次数据传输结束释放的是数据连接及其端口，而控制连接在整个会话期间始终保持，不会在每次数据传输结束时被释放。选项D正确，控制连接是持久的，在整个FTP会话期间一直保持打开状态。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列关于ftp工作过程的描述,错误的是()."},{"id":"b_cn_9_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":9,"date":"","stem":"下列关于 FTP 协议的叙述中，错误的是（ ）。","options":{"A":"数据连接在每次数据传输完毕后就关闭","B":"控制连接在整个会话期间保持打开状态","C":"服务器与客户端的 TCP 20 端口建立数据连接","D":"客户端与服务器的 TCP 21 端口建立控制连接"},"answer":["C"],"analysis":"选项A正确，FTP屏蔽了不同操作系统的文件系统差异，支持异构系统间文件传输。选项B正确，FTP服务器端有主控制进程负责监听和建立控制连接，以及为每个客户创建的数据传输进程。选项C错误，每次数据传输结束释放的是数据连接及其端口，而控制连接在整个会话期间始终保持，不会在每次数据传输结束时被释放。选项D正确，控制连接是持久的，在整个FTP会话期间一直保持打开状态。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列关于ftp协议的叙述中,错误的是()."},{"id":"b_cn_10_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":10,"date":"","stem":"下列关于 POP3 协议的说法，错误的是（ ）。","options":{"A":"接收邮件后是否将邮件保存在服务器上由服务器而非客户端决定","B":"POP3 协议不能直接传输二进制文件","C":"TCP 连接建立之后，才能建立 POP3 会话连接","D":"建立 POP3 连接时需要先完成用户的身份认证"},"answer":["A"],"analysis":"选项A错误，POP3客户端在接收邮件时可以选择是否在服务器上保留邮件副本，这个选择由客户端决定并在下载时通过相应命令告知服务器，而非由服务器单方面决定。选项B，POP3底层使用SMTP类似的文本协议，二进制文件需要MIME编码后传输，不能直接传输原始二进制文件，此说法正确。选项C","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列关于pop3协议的说法,错误的是()."},{"id":"b_cn_11_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":11,"date":"","stem":"下列协议中不能用于从邮件服务器接收电子邮件的是（ ）。","options":{"A":"HTTP","B":"POP3","C":"IMAP","D":"SMTP"},"answer":["D"],"analysis":"SMTP是简单邮件传送协议，用于发送邮件和邮件服务器之间的邮件转发，不能用于从邮件服务器接收邮件到用户本地。POP3和IMAP是标准的邮件读取协议，用于从邮件服务器获取邮件。HTTP也可以通过网页邮件的方式间接从邮件服务器获取邮件。因此SMTP不能用于接收邮件。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列协议中不能用于从邮件服务器接收电子邮件的是()."},{"id":"b_cn_12_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":12,"date":"","stem":"下列关于电子邮件格式的描述，错误的是（ ）。","options":{"A":"电子邮件包含首部和主体两部分","B":"邮件地址中的用户名在邮件服务器上必须是唯一的","C":"邮件首部中的 From、To 和 Subject 字段必填，且需要用户手动填写","D":"MIME 协议支持电子邮件传输图像、音频及视频等非 ASCII 码文件"},"answer":["C"],"analysis":"选项A正确，电子邮件由信封和内容组成，内容部分又包含邮件首部和邮件主体。选项B正确，在同一个邮件服务器上，每个用户名必须是唯一的，否则无法区分不同用户的邮箱。选项C错误，From和To字段通常由用户代理根据用户设置和用户填写的信息自动生成，并非需要用户以纯文本方式手动键入字段名，Subject字段也由用户在图形界面填写后由用户代理封装。这些字段在实际使用中对用户是透明的，由邮件客户端自动处理。选项D正确，MIME协议的引入就是为了支持邮件传输图像、音频、视频等非ASCII码的多媒体内容。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列关于电子邮件格式的描述,错误的是()."},{"id":"b_cn_13_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":13,"date":"","stem":"通过 POP3 协议接收邮件时，使用的传输层服务类型是（ ）。","options":{"A":"无连接不可靠的数据传输服务","B":"无连接可靠的数据传输服务","C":"有连接不可靠的数据传输服务","D":"有连接可靠的数据传输服务"},"answer":["D"],"analysis":"POP3协议在传输层使用TCP协议，TCP是面向连接的协议，通过三次握手建立连接，并通过确认重传等机制提供可靠的数据传输服务。因此POP3使用的是有连接可靠的数据传输服务。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"通过pop3协议接收邮件时,使用的传输层服务类型是()."},{"id":"b_cn_14_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":14,"date":"","stem":"无须转换即可由 SMTP 协议直接传输的内容是（ ）。","options":{"A":"JPEG 图像","B":"MPEG 视频","C":"EXE 文件","D":"ASCII 文本"},"answer":["D"],"analysis":"SMTP协议在设计上只能传输7位ASCII码文本。JPEG图像、MPEG视频和EXE可执行文件均为二进制文件，不能由SMTP直接传输，必须通过MIME机制先编码转换为ASCII文本格式后再交由SMTP传输。ASCII文本文件本身由7位ASCII字符组成，因此可以直接通过SMTP传输而无需任何转换。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"无须转换即可由smtp协议直接传输的内容是()."},{"id":"b_cn_15_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":15,"date":"","stem":"使用 WWW 服务时需要使用 HTTP 协议传送网页文件，HTTP/1.0 的工作模式是（ ）。","options":{"A":"使用 TCP 协议传送页面文件，一个 TCP 连接建立后传送所请求的多个页面文件","B":"使用 TCP 协议传送页面文件，不需要建立连接","C":"使用 TCP 协议传送页面文件，每个页面文件独立建立 UDP 连接传送","D":"使用 TCP 协议传送页面文件，每个页面文件独立建立 TCP 连接传送"},"answer":["D"],"analysis":"HTTP/1.0默认使用非持续连接方式，其工作模式是客户端每请求一个页面文件或对象，就与服务器建立一条新的TCP连接，服务器返回该对象后连接立即关闭。如果同一页面上包含多个对象，如多个图片，浏览器需要为每个对象都单独建立一次TCP连接并传送。这种模式导致传输效率较低。HTTP/1.1引入了持续连接来改善这一问题。HTTP始终基于TCP协议，不存在使用UDP的情况。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"使用www服务时需要使用http协议传送网页文件,http/1.0的工作模式是()."},{"id":"b_cn_16_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":16,"date":"","stem":"下列关于 HTTP 非持续连接和持续连接的描述中，错误的是（ ）。","options":{"A":"HTTP/1.0 版本默认使用非持续连接，HTTP/1.1 版本默认使用持续连接","B":"采用持续连接方式时，服务器在发出响应后会继续维持该连接","C":"采用非持续连接方式时，针对每次请求/响应都要建立一次 TCP 连接","D":"一个服务器中的多个 HTML 页面需要通过多个持续的 TCP 连接来传送"},"answer":["D"],"analysis":"选项A正确，HTTP/1.0默认非持续连接，HTTP/1.1默认持续连接。选项B正确，持续连接方式下，服务器在发送完响应后不会立即关闭TCP连接，在一定时间内保持连接以便复用。选项C正确，非持续连接方式下，每次HTTP请求响应都需要建立一条新的TCP连接，完成后即关闭。选项D错误，持续连接的意义就在于可以使用同一条已建立的TCP连接来传送多个页面或对象，而不需要为每个页面单独建立多个连接。因此，多个HTML页面完全可以通过同一条持续的TCP连接依次传送。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列关于http非持续连接和持续连接的描述中,错误的是()."},{"id":"b_cn_17_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":17,"date":"","stem":"若浏览器不支持并行TCP连接，使用非持久的HTTP/1.0协议请求浏览1个web页，该页中引用同一网站上7个小图像文件，则从浏览器为传输Web页请求建立TCP连接开始，到接收完所欲内容为止，所需要的往返时间RTT数至少是（ ）","options":{"A":"4","B":"9","C":"14","D":"16"},"answer":["D"],"analysis":"在HTTP/1.0协议中，如果浏览器不支持并行TCP连接，那么每个请求（包括主页面和每个图像文件）都需要单独建立一个TCP连接，对于主页面和7个图像文件的请求，总共需要发出8次请求，每次请求都需要建立TCP连接，传输8个对象所需的时间是2×8×RTT = 16RTT，故选D。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"若浏览器不支持并行tcp连接,使用非持久的http/1.0协议请求浏览1个web页,该页中引用同一网站上7个小图像文件,则从浏览器为传输web页请求建立tcp连接开始,到接收完所欲内容为止,所需要的往返时间rtt数至少是()"},{"id":"b_cn_18_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":18,"date":"","stem":"下列 TCP/IP 应用层协议中，可以使用传输层无连接服务的是（ ）。","options":{"A":"FTP","B":"DNS","C":"SMTP","D":"HTTP"},"answer":["B"],"analysis":"传输层的无连接服务由UDP协议提供。在所列选项中，FTP使用TCP，SMTP使用TCP，HTTP使用TCP，它们均使用面向连接的可靠传输服务。DNS通常使用UDP协议的53号端口进行域名查询。因此，DNS是可以使用传输层无连接服务的应用层协议。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"下列tcp/ip应用层协议中,可以使用传输层无连接服务的是()."},{"id":"b_cn_19_第六讲 应用层","source":"bank500","subject":"cn","subjectName":"计算机网络","lecture":"第六章 应用层","num":19,"date":"","stem":"一台新接入网络的主机 H 通过 DHCP服务器动态请求 IP 地址过程中，与 DHCP 服务器交换 DHCP 报文过程如下图所示。封装 DHCP 的\nREQUEST 报文的 IP 数据报的目的 IP 地址和源 IP 地址分别是（ ）","options":{"A":"192.168.5.1， 0.0.0.0","B":"192.168.5.1， 192.168.5.9","C":"255.255.255.255， 0.0.0.0","D":"255.255.255.255， 192.168.5.9"},"answer":["C"],"analysis":"DHCP 动态主机配置协议，常用于给主机动态地分配 IP 地址，属于应用层协议，基于 UDP。DHCP 客户和服务器端需要通过广播方式进行交互，因为客户机没有 IP 且不知道服务器的 IP。所以交换过程中，客户发出的报文都是源地址为 0.0.0.0，目的地址是 255.255.255.255；服务器回复的报文都是源地址为服务器的 IP，目的地址为 255.255.255.255。DHCP 的 REQUEST 报文是客户向服务器端的请求报文，所以选 C。","kps":["计算机网络","第六讲 应用层"],"video":"","_n":"一台新接入网络的主机h通过dhcp服务器动态请求ip地址过程中,与dhcp服务器交换dhcp报文过程如下图所示.封装dhcp的request报文的ip数据报的目的ip地址和源ip地址分别是()\u0001"},{"id":"d_arr_4","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第五章 数组","num":4,"date":"","stem":"已知二维数组A的每个元素是由6个字符组成的串，其行下标i=0，1，…，8，列下标j=1，2，3，…，10。若A按行序为主序存储，则元素A[8][5]的起始地址与当A按列序为主序存储时的元素（ ）的起始地址相同。(设每个字符占一个字节)","options":{"A":"A[8][5]","B":"A[3][10]","C":"A[5][8]","D":"A[0][9]"},"answer":["B"],"analysis":"A[8][5]的起始地址=首地址+[8×10+(5-1)]×6=SA+504，当以列为主序存储数组A的元素时，分别计算4个选项元素的起始地址如下：A选项，&A[8][5]=首地址+(4×9+8)×6=首地址+264；B选项，&A[3][10]=首地址+(9×9+3)×6=首地址+504；C选项，&A[5][8]=首地址+(7×9+5)×6=首地址+408；D选项，&A[0][9]=首地址+(8×9+0)×6=首地址+432。故选B。","kps":["数据结构","第五讲 数组"],"video":"","_n":"已知二维数组a的每个元素是由6个字符组成的串,其行下标i=0,1,…,8,列下标j=1,2,3,…,10.若a按行序为主序存储,则元素a[8][5]的起始地址与当a按列序为主序存储时的元素()的起始地址相同.(设每个字符占一个字节)"}];

(function(){
  "use strict";
  const Q = window.QUESTIONS || [];
  const SUBJ = [

    {key:"co", name:"计算机组成与系统结构"},

  const SUBJ_NAME_TO_KEY = {}; SUBJ.forEach(s=>SUBJ_NAME_TO_KEY[s.name]=s.key);
  const SUBJ_KEY_TO_NAME = {}; SUBJ.forEach(s=>SUBJ_KEY_TO_NAME[s.key]=s.name);
  // 模块 -> 显示名称
  const MODULE_NAME = {daily:"每日一题", bank:"基础必刷500题", wrong:"错题区", done:"已练习", fav:"我的收藏", real:"真题选择"};
  // lecture(章节名) -> 所属科目 key，用于在“全部科目”下区分同名章节
  const LECT_SUBJ = {};
  Q.forEach(q=>{ if(q.lecture && !LECT_SUBJ[q.lecture]) LECT_SUBJ[q.lecture]=q.subject; });
  // source(来源) -> 区域标签：用于卡片/收藏区显示“题目归属哪个区”
  const ZONE = [
    {key:"daily",   name:"每日一题区"},
    {key:"bank500", name:"基础必刷500题区"},
    {key:"real",    name:"真题区"}
  ];
  const ZONE_KEY_TO_NAME = {}; ZONE.forEach(z=>ZONE_KEY_TO_NAME[z.key]=z.name);
  const zoneName = src => ZONE_KEY_TO_NAME[src] || src || "未分区";
  // 收藏区：是否在集合内的题（按 fav 集合）
  const inFav = q => fav.has(q.id);
  // 收藏区：按来源区域统计收藏数
  const favSizeByZone = zoneKey => Q.filter(q=>fav.has(q.id)&&q.source===zoneKey).length;
  // 错题区：按来源区域统计错题数
  const wrongSizeByZone = zoneKey => Q.filter(q=>wrong.has(q.id)&&q.source===zoneKey).length;
  // 已练习区：按来源区域统计已练数
  const doneSizeByZone = zoneKey => Q.filter(q=>prog[q.id]&&q.source===zoneKey).length;

  // 某科目×某区域「无对应题目」的空状态（收藏/错题/已练习通用）
  const EMPTY_META = {
    fav:   {icon:"⭐", noun:"收藏的题目",
            global:["还没有收藏的题目","在任意题目卡片右上角点 ☆ 即可加入收藏～"],
            hint:"换个科目或区域看看，也可以先去题目里点 <b>☆</b> 收藏几道～"},
    wrong: {icon:"📝", noun:"错题",

            hint:"答错的题会自动归到这里，继续刷题巩固一下吧～"},
    done:  {icon:"✅", noun:"已练习的题目",
            global:["还没有练习记录","去任意模块点「⚡ 刷题」作答，完成后的题目会汇总到这里～"],
            hint:"去刷几道题，练习记录就会出现在这一栏～"}
  };
  function emptyEl(kind){
    const m = EMPTY_META[kind];
    let title, hint;
    if(state.subject==="all" && state.zone==="all"){
      [title,hint] = m.global;
    }else{
      const scope = (state.zone!=="all" ? "「"+zoneName(state.zone)+"」" : "")

      title = scope + "还没有" + m.noun;
      hint = m.hint;
    }
    const w = el("div","empty-state");

    return w;
  }

  // 刷题模式下的空状态（收藏/错题/每日一题/基础500 通用）：同样按「科目×区域」提示
  function practiceEmptyEl(){

      title = "当前筛选条件下没有题目";
      hint = "在上方调整科目或区域，或切换「🗂 浏览」看看别的题目～";

    w.innerHTML = `<div class="es-ic">⚡</div>`

      + `<div class="es-hint">${hint}</div>`;
    return w;

  // ---------- storage ----------
  const LS = {
    fav:"yt408_fav", prog:"yt408_prog", theme:"yt408_theme", view:"yt408_view", wrong:"yt408_wrong",
    doneFrom:"yt408_done_from", // id -> 最后一次作答正确的来源模块（用于"错题区攻克"标注）

  };
  const read = (k,def)=>{ try{const v=localStorage.getItem(k);return v==null?def:JSON.parse(v);}catch(e){return def;} };
  const write = (k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} };

  let fav = new Set(read(LS.fav,[]));
  let prog = read(LS.prog,{}); // id -> 'ok' | 'no'
  let wrong = new Set(read(LS.wrong,[]));
  let doneFrom = read(LS.doneFrom,{}); // id -> 'wrong' | 'daily' | 'bank' | ...
  let pos = read(LS.pos,{}); // module -> pIdx（上次停在的题）
  const isWrong = id=>wrong.has(id);

  const state = {
    module:"daily",   // daily | bank | real | wrong | done | fav
    view:"browse",    // browse | practice
    subject:"all",
    lecture:"all",
    zone:"all",       // all | daily | bank500 | real（收藏区按来源区域筛选）
    search:"",
    pIdx:0,
    pList:[],
    pListModule:null,   // 当前 pList 所属模块，用于在跨模块切换时安全重建
    revealed:false,
    selected:null,
    wrongCelebrated:false   // 错题区：本场是否已达全部答对（避免重复弹恭喜）
  };

  // ---------- helpers ----------
  const $ = (s,r=document)=>r.querySelector(s);
  const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
  const esc = s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const isFav = id=>fav.has(id);
  const badge = (cls,txt)=>`<span class="badge ${cls}">${esc(txt)}</span>`;
  const normAns = a=> Array.isArray(a)? a : (a==null? [] : [a]);
  // 每日一题：在解析区标注课程视频讲解位置（源文档已标注，计组最后一题除外）
  const videoNoteHtml = q=>{
    if(q.source!=="daily") return "";
    const v=q.video; if(!v) return "";
    return `<div class="vnote"><b class="vnote-tag">【视频】</b><span class="vnote-pos">${esc(v)}</span><span class="vnote-tip">（讲解视频详情见右下角）</span></div>`;
  };
  // 每日一题：知识点梳理（与解析分开的专属区块）
  const kpBlockHtml = q=>{
    if(q.source!=="daily" || !q.kpSummary) return "";
    return `<div class="kp-block">
      <button type="button" class="kp-toggle" aria-expanded="false">【知识点梳理】<span class="kp-chev">▾</span></button>
      <div class="kp-body">${esc(q.kpSummary)}</div>
    </div>`;
  };
  // 切换科目/区域后，滚动到筛选区顶部（而非页面绝对顶部），让 controls 正好露在导航下方
  function scrollToControls(){
    const c=$("#controls");
    if(!c) return;
    const rect=c.getBoundingClientRect();
    const top=rect.top + window.scrollY - 66;
    window.scrollTo({top:Math.max(0,top),left:0,behavior:"smooth"});
  }

  function chapterNum(s){
    if(!s) return 9999;
    let m=s.match(/第\s*(\d+)\s*章/); if(m) return parseInt(m[1],10);
    m=s.match(/第\s*([一二三四五六七八九十]+)\s*章/);
    if(m){ const map={一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10}; let v=0; for(const c of m[1]) v+=map[c]||0; return v; }
    return 9999;
  }
  function lecturesFor(subjKey, module){
    const out=[];
    Q.forEach(q=>{
      if(module==="daily" && q.source!=="daily") return;
      if(module==="bank" && q.source!=="bank500") return;
      if(module==="wrong" && !wrong.has(q.id)) return;
      if(module==="done" && !prog[q.id]) return;
      if(module==="fav" && !fav.has(q.id)) return;
      if(subjKey!=="all" && q.subject!==subjKey) return;
      if(q.lecture && !out.includes(q.lecture)) out.push(q.lecture);
    });
    return out.sort((a,b)=>chapterNum(a)-chapterNum(b));
  }

  function filtered(){
    const kw = state.search.trim().toLowerCase();
    return Q.filter(q=>{
      if(state.module==="daily" && q.source!=="daily") return false;
      if(state.module==="bank" && q.source!=="bank500") return false;
      if(state.module==="wrong" && !wrong.has(q.id)) return false;
      if(state.module==="fav" && !fav.has(q.id)) return false;
      if(state.module==="done" && !prog[q.id]) return false;
      if(state.zone!=="all" && (state.module==="wrong"||state.module==="fav"||state.module==="done") && q.source!==state.zone) return false;
      if(state.subject!=="all" && q.subject!==state.subject) return false;
      if(state.lecture!=="all" && q.lecture!==state.lecture) return false;
      if(kw){
        const hay=(q.stem+" "+(q.kps||[]).join(" ")+(q.lecture||"")).toLowerCase();
        if(!hay.includes(kw)) return false;
      }
      return true;
    });
  }

  // 进入刷题：按当前筛选快照本组题目（错题区会冻结本场，过程中不再重建/移位）
  // opts.restore=true 时跳到上次停在的题（进模块时触发）；否则从本组第 1 道开始
  function startPractice(opts){
    opts = opts||{};
    state.pList=filtered();
    state.pListModule=state.module;
    if(opts.restore){ state.pIdx = pos[state.module]||0; }
    else { state.pIdx = 0; }
    state.revealed=false; state.selected=null;
    if(state.module==="wrong") state.wrongCelebrated=false;
  }

  // 已练习列表（由 prog 记录派生，遵循当前 subject/lecture/search 筛选）
  function doneArr(){
    const kw=state.search.trim().toLowerCase();
    return Object.keys(prog).map(id=>Q.find(q=>q.id===id)).filter(Boolean).filter(q=>{
      if(state.subject!=="all" && q.subject!==state.subject) return false;
      if(state.lecture!=="all" && q.lecture!==state.lecture) return false;
      if(state.zone!=="all" && q.source!==state.zone) return false;
      if(kw){ const hay=(q.stem+" "+(q.kps||[]).join(" ")+(q.lecture||"")).toLowerCase(); if(!hay.includes(kw)) return false; }
      return true;
    });
  }

  // ---------- render: stats ----------
  function renderStats(){
    const dCount = Q.filter(q=>q.source==="daily").length;
    const bCount = Q.filter(q=>q.source==="bank500").length;
    const doneCount = Object.keys(prog).length;
    const okCount = Object.values(prog).filter(v=>v==="ok").length;
    const rate = doneCount? Math.round(okCount/doneCount*100):0;
    const defs = [
      ["题库总量", Q.length, "bank", "全部题库 · 点击进入刷题"],
      ["每日一题", dCount, "daily", "每日一题 · 点击进入刷题"],
      ["基础必刷", bCount, "bank", "基础必刷500题 · 点击进入刷题"],
      ["已练习", doneCount, "done", "已练习 · 点击查看"],
      ["错题", wrong.size, "wrong", "错题区 · 点击进入刷题"]
    ];
    $("#stats").innerHTML = defs.map(([l,n,mod,title])=>`
      <div class="stat clickable" data-mod="${mod}" title="${title}">
        <span class="stat-go">👁</span>
        <div class="n">${n}</div>
        ${mod==="done" && doneCount?`<div class="rate">正确率 ${rate}%</div>`:""}
        <div class="l">${l}</div>
      </div>`).join("");
    $("#footTotal").textContent = Q.length;
    $("#favCount").textContent = fav.size;
    $("#stats").querySelectorAll(".stat.clickable").forEach(s=>{
      s.onclick=()=>openModuleView(s.dataset.mod);
    });
  }

  // 点击统计块 -> 进入对应模块（刷题模式，已练习/错题特殊处理）
  function openModuleView(mod){
    $("#tabs").querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    if(["daily","bank","wrong"].includes(mod)){
      const tab=$(`#tabs .tab[data-mod="${mod}"]`);
      if(tab) tab.classList.add("active");
    }
    state.subject="all"; state.lecture="all"; state.search="";
    if(mod==="done"){
      state.module="done"; state.view="browse";
    } else if(mod==="wrong"){
      state.module="wrong"; state.view="practice";
    } else {
      state.module=mod; state.view="practice";
    }
    startPractice({restore:true}); // 进模块时跳到上次停在的题
    renderControls(); renderMain(); renderStats();
  }

  function renderModuleTitle(){
    const mt=$("#modTitle");
    if(!mt) return;
    mt.innerHTML=`<span class="mod-pill">${esc(MODULE_NAME[state.module] || state.module)}</span>`;
  }

  // ---------- render: controls ----------
  function renderControls(){
    renderModuleTitle();
    const c = $("#controls");
    c.innerHTML="";
    if(state.module==="real"){ return; }

    // view segmented（已练习模块仅浏览，不显示刷题切换）
    if(state.module!=="done"){
      const seg = el("div","seg");
      seg.innerHTML = `
        <button data-view="browse" class="${state.view==='browse'?'on':''}">🗂 浏览</button>
        <button data-view="practice" class="${state.view==='practice'?'on':''}">⚡ 刷题</button>`;
      seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{
        state.view=b.dataset.view;
        if(state.view==="practice"){ startPractice(); }
        renderControls(); renderMain();
      });
      c.appendChild(seg);
    }

    // subject chips
    const chips=el("div","chips");
    const allLabel = (state.module==="fav"||state.module==="wrong") ? "全部科目" : "全部";
    const allChip=el("button","chip"+(state.subject==="all"?" on":""),allLabel);
    allChip.onclick=()=>setSubject("all");
    chips.appendChild(allChip);
    SUBJ.forEach(s=>{
      const inModule = state.module==="daily"?q=>q.source==="daily"
        : state.module==="wrong"?q=>wrong.has(q.id)
        : state.module==="done"?q=>!!prog[q.id]
        : state.module==="fav"?q=>fav.has(q.id)
        : q=>q.source==="bank500";
      const n=Q.filter(q=>inModule(q)&&q.subject===s.key).length;
      // 每日一题：始终展示全部4科（其余两科题目将陆续上传）；其他模块仅展示有题的科目
      if(!n && state.module!=="daily") return;
      const b=el("button","chip"+(state.subject===s.key?" on":""),s.name.replace("计算机组成与系统结构","计组").replace("操作系统","操作系统"));
      b.onclick=()=>setSubject(s.key);
      chips.appendChild(b);
    });
    c.appendChild(chips);

    // 收藏区 / 错题区 / 已练习区：额外提供“来源区域”筛选（每日一题区 / 基础必刷500题区 / 真题区）
    if(state.module==="fav" || state.module==="wrong" || state.module==="done"){
      const zc=el("div","chips zone-chips");
      const zall=el("button","chip"+(state.zone==="all"?" on":""),"全部区域");
      zall.onclick=()=>setZone("all");
      zc.appendChild(zall);
      ZONE.forEach(z=>{
        const n = state.module==="fav" ? favSizeByZone(z.key)
                : state.module==="wrong" ? wrongSizeByZone(z.key)
                : doneSizeByZone(z.key);
        if(!n) return;
        const b=el("button","chip"+(state.zone===z.key?" on":""),z.name);
        b.onclick=()=>setZone(z.key);
        zc.appendChild(b);
      });
      c.appendChild(zc);
    }

    // lecture select
    const lects = lecturesFor(state.subject, state.module);
    if(lects.length>1){
      const sel=el("select","sel");
      const lectLabel = l => (state.subject==="all" && LECT_SUBJ[l])
        ? `【${SUBJ_KEY_TO_NAME[LECT_SUBJ[l]]}】${l}` : l;
      sel.innerHTML=`<option value="all">全部章节</option>`+lects.map(l=>`<option value="${esc(l)}" ${state.lecture===l?"selected":""}>${esc(lectLabel(l))}</option>`).join("");
      sel.onchange=()=>{ state.lecture=sel.value; if(state.view==="practice"){ startPractice(); } renderMain(); };
      c.appendChild(sel);
    }

    // search
    const sw=el("div","search");
    sw.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="searchInput" placeholder="搜索题干 / 知识点…" value="${esc(state.search)}"/>`;
    c.appendChild(sw);
    const inp=$("#searchInput",sw);
    inp.oninput=()=>{ state.search=inp.value;
      if(state.view==="practice"){ startPractice(); }
      renderMain(); };

    // 刷题模式：加上"从头开始"按钮（清空该模块进度位，重新从第 1 道刷）
    if(state.view==="practice" && ["daily","bank","wrong","fav"].includes(state.module)){
      const resetWrap=el("div","reset-wrap");
      const rb=el("button","btn ghost reset-btn","↺ 从头开始");
      rb.title="清空本模块刷题进度，从第 1 道重新刷";
      rb.onclick=()=>{
        delete pos[state.module]; write(LS.pos,pos);
        startPractice(); // 不带 restore，回到第 1 道
        renderMain();
      };
      resetWrap.appendChild(rb);
      c.appendChild(resetWrap);
    }
  }

  function setSubject(k){
    state.subject=k; state.lecture="all";
    if(state.view==="practice"){ startPractice(); }
    renderControls(); renderMain();
    scrollToControls();
  }

  function setZone(k){
    state.zone=k;
    if(state.view==="practice"){ startPractice(); }
    renderControls(); renderMain();
    scrollToControls();
  }

  // ---------- render: main ----------
  function renderMain(){
    const m=$("#main");
    m.innerHTML="";
    if(state.module==="real"){ m.appendChild(renderReal()); return; }
    if(state.module==="fav"){
      if(state.view==="practice"){
        // 收藏区刷题：跨模块切换后若 pList 不属于 fav 则重建，保证本场是收藏题目
        if(!state.pList.length || state.pListModule!=="fav"){ state.pList=filtered(); state.pListModule="fav"; }
        if(state.pIdx>=state.pList.length) state.pIdx=Math.max(0,state.pList.length-1);
        renderPractice(m); return;
      }
      renderFav(m); return;
    }
    if(state.module==="done"){ renderDone(m); return; }
    if(state.module==="wrong"){
      if(state.view==="practice"){
        // 关键：错题区刷题冻结本场列表，不再在此重建/移位，避免"题干与答案错位"
        if(!state.pList.length || state.pListModule!=="wrong"){ state.pList=filtered(); state.pListModule="wrong"; }
        if(state.pIdx >= state.pList.length) state.pIdx = Math.max(0, state.pList.length-1);
        const head=wrongHeadEl();
        if(head) m.appendChild(head);
        renderPractice(m);
        return;
      }
      renderWrong(m); return;
    }
    if(state.view==="practice"){ renderPractice(m); return; }
    renderBrowse(m);
  }

  // ---------- BROWSE ----------
  function renderBrowse(m){
    const list=filtered();
    const wrap=el("div","list");
    if(!list.length){ wrap.appendChild(el("div","fav-empty",`<div class="big">🔍</div><div>没有匹配的题目，换个筛选条件试试～</div>`)); m.appendChild(wrap); return; }
    list.forEach((q,i)=>wrap.appendChild(card(q,i)));
    m.appendChild(wrap);
    observeCards();
  }

  function card(q,i){
    const c=el("div","card");
    c.dataset.id=q.id;
    const head=el("div","card-head");
    head.innerHTML = `<div class="head-badges">`
      + badge("b-zone",zoneName(q.source))
      + (q.lecture?badge("b-lect",q.lecture):"")
      + (q.date?badge("b-date",q.date):"")
      + `</div><div class="head-meta"><span class="b-num">No.${q.num}</span></div>`;
    const star=el("button","fav-star"+(isFav(q.id)?" on":""), isFav(q.id)?"★":"☆");
    star.title="收藏";
    star.onclick=()=>toggleFav(q.id,star);
    head.querySelector(".head-meta").appendChild(star);
    c.appendChild(head);

    c.appendChild(el("div","stem",esc(q.stem)));
    const opts=el("div","opts");
    Object.keys(q.options||{}).sort().forEach(k=>{
      opts.appendChild(el("div","opt",`<span class="k">${k}</span><span>${esc(q.options[k])}</span>`));
    });
    c.appendChild(opts);

    const ans=el("div","analysis");
    const ansTxt=normAns(q.answer).join("、");
    ans.innerHTML= `<div class="ttl">✓ 正确答案：${esc(ansTxt)}</div><div class="body">${esc(q.analysis||"（暂无解析）")}</div>`
      + kpBlockHtml(q)
      + videoNoteHtml(q)
      + (q.kps&&q.kps.length?`<div class="kp-row">${q.kps.map(k=>`<span class="kp">${esc(k)}</span>`).join("")}</div>`:"");
    c.appendChild(ans);

    const acts=el("div","card-actions");
    const tog=el("button","btn","🔍 查看解析");
    tog.onclick=()=>{ const o=ans.classList.toggle("open"); tog.textContent=o?"收起解析":"🔍 查看解析"; };
    acts.appendChild(tog);
    c.appendChild(acts);
    return c;
  }

  function observeCards(){
    const cards=document.querySelectorAll(".card:not(.in)");
    if(typeof IntersectionObserver==="undefined"){
      cards.forEach(c=>c.classList.add("in")); return;
    }
    const io=new IntersectionObserver((ents)=>{
      ents.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} });
    },{threshold:.08, rootMargin:"0px 0px -40px 0px"});
    cards.forEach(c=>io.observe(c));
  }

  // ---------- PRACTICE ----------
  function renderPractice(m){
    const list = state.pList.length? state.pList : filtered();
    state.pList=list;
    if(!list.length){
      m.appendChild(practiceEmptyEl());
      return;
    }
    if(state.pIdx>=list.length) state.pIdx=list.length-1;
    if(state.pIdx<0) state.pIdx=0;
    const q=list[state.pIdx];

    const wrap=el("div","practice");
    // progress
    const pbar=el("div","pbar");
    const fillPct = list.length? Math.round((state.pIdx+1)/list.length*100):0;
    const doneInList = list.filter(x=>prog[x.id]).length;
    pbar.innerHTML=`<div class="track"><div class="fill" style="width:${fillPct}%"></div></div>
      <div class="ptxt">第 <b>${state.pIdx+1}</b>/${list.length} 题 · 本组已练 <b>${doneInList}</b></div>`;
    wrap.appendChild(pbar);

    const pc=el("div","pcard"); pc.id="pcard";
    const head=el("div","card-head");
    head.innerHTML = `<div class="head-badges">`
      + badge("b-zone",zoneName(q.source))
      + (q.lecture?badge("b-lect",q.lecture):"")
      + (q.date?badge("b-date",q.date):"")
      + `</div><div class="head-meta"><span class="b-num">No.${q.num}</span></div>`;
    const star=el("button","fav-star"+(isFav(q.id)?" on":""), isFav(q.id)?"★":"☆");
    star.title="收藏"; star.onclick=()=>toggleFav(q.id,star);
    head.querySelector(".head-meta").appendChild(star);
    pc.appendChild(head);
    pc.appendChild(el("div","pstem",esc(q.stem)));

    const opts=el("div","popts"); opts.id="popts";
    const correct=normAns(q.answer);
    Object.keys(q.options||{}).sort().forEach(k=>{
      const o=el("div","popt"); o.dataset.k=k;
      const st = state.revealed ? (correct.includes(k) ? '<span class="popt-status ok">✓</span>' : (state.selected===k ? '<span class="popt-status no">✗</span>' : '')) : '';
      o.innerHTML=`<span class="k">${k}</span><span>${esc(q.options[k])}</span>${st}`;
      if(!state.revealed){
        o.onclick=()=>selectOpt(k);
      }else{
        o.classList.add("locked");
        if(correct.includes(k)) o.classList.add("ok");
        if(state.selected===k && !correct.includes(k)) o.classList.add("no");
      }
      if(state.selected===k && !state.revealed) o.classList.add("sel");
      opts.appendChild(o);
    });
    pc.appendChild(opts);

    // result
    const res=el("div","presult"+(state.revealed?" open":"")); res.id="presult";
    if(state.revealed){
      const isOk = state.selected && correct.includes(state.selected);
      const verdict=el("div","verdict "+(isOk?"ok":"no"), isOk?"🎉 回答正确":"✗ 回答错误");
      res.appendChild(verdict);
      const ansTxt=correct.join("、");
      const block=el("div");
      block.innerHTML= `<div class="ttl" style="font-size:12.5px;font-weight:800;letter-spacing:1px;color:var(--accent);margin-bottom:7px">✓ 正确答案：${esc(ansTxt)}</div>
        <div class="body" style="font-size:14.5px;color:var(--text-2);line-height:1.8;white-space:pre-wrap">${esc(q.analysis||"（暂无解析）")}</div>`
        + kpBlockHtml(q)
        + videoNoteHtml(q)
        + (q.kps&&q.kps.length?`<div class="kp-row">${q.kps.map(k=>`<span class="kp">${esc(k)}</span>`).join("")}</div>`:"");
      res.appendChild(block);
    }
    pc.appendChild(res);

    // nav
    const nav=el("div","pnav");
    const prev=el("button","pnbtn","‹"); prev.title="上一题"; prev.disabled=state.pIdx<=0;
    prev.onclick=()=>goSlide(-1);
    const next=el("button","pnbtn","›"); next.title="下一题"; next.disabled=state.pIdx>=list.length-1;
    next.onclick=()=>goSlide(1);
    const grow=el("div","grow");
    if(!state.revealed){
      const rev=el("button","btn primary","✨ 揭晓答案");
      rev.style.width="100%"; rev.onclick=reveal;
      grow.appendChild(rev);
    }else{
      const againWrap=el("div","again-wrap");
      const shuffle=el("button","btn accent","🔀 换一批");
      shuffle.title="打乱当前筛选条件下的题目顺序，重新刷";
      shuffle.onclick=()=>{
        const arr=state.pList.slice();
        for(let i=arr.length-1;i>0;i--){
          const j=Math.floor(Math.random()*(i+1));
          [arr[i],arr[j]]=[arr[j],arr[i]];
        }
        state.pList=arr;
        state.pIdx=0; state.revealed=false; state.selected=null;
        if(state.module==="wrong") state.wrongCelebrated=false;
        pos[state.module]=0; write(LS.pos,pos);
        renderMain();
      };
      const redo=el("button","btn ghost","↺ 重做");
      redo.title="保持当前顺序（含换一批的乱序），从第 1 道重新开始";
      redo.onclick=()=>{
        if(state.module==="wrong") state.wrongCelebrated=false;
        // 注意：不调用 startPractice()，否则会用 filtered() 重建列表、把“换一批”的乱序冲掉
        state.pIdx=0; state.revealed=false; state.selected=null;
        pos[state.module]=0; write(LS.pos,pos);
        renderMain();
      };
      againWrap.appendChild(shuffle); againWrap.appendChild(redo);
      grow.appendChild(againWrap);
    }
    nav.appendChild(prev); nav.appendChild(grow); nav.appendChild(next);
    pc.appendChild(nav);

    wrap.appendChild(pc);
    m.appendChild(wrap);
  }

  function selectOpt(k){
    state.selected=k;
    document.querySelectorAll("#popts .popt").forEach(o=>{
      o.classList.toggle("sel", o.dataset.k===k);
    });
  }

  function reveal(){
    const q=state.pList[state.pIdx];
    if(!state.selected){ // nothing selected -> just show answer
      flashSelectHint(); return;
    }
    const correct=normAns(q.answer);
    const isOk = correct.includes(state.selected);
    prog[q.id]= isOk?"ok":"no"; write(LS.prog,prog);
    if(isOk){
      wrong.delete(q.id);
      // 记录最后一次答对来自哪个模块（错题区攻克单独标注）
      doneFrom[q.id]= state.module; write(LS.doneFrom,doneFrom);
    } else {
      wrong.add(q.id);
    }
    write(LS.wrong,[...wrong]);
    state.revealed=true;
    pos[state.module]=state.pIdx; write(LS.pos,pos); // 记录停在哪（已作答的这题）
    renderStats();
    renderControls();
    let celebrated=false;
    if(state.module==="wrong"){
      // 错题区：必须"本场全部作答正确"才弹恭喜（答对的题仍留在本场供回顾，list 不重建）
      if(!state.wrongCelebrated && state.pList.length && state.pList.every(x=>prog[x.id]==="ok")){
        celebrated=true; state.wrongCelebrated=true;
        celebrate("🎉","错题清空！","你已掌握全部错题，太强了");
      }
    } else if(state.pList.length && state.pIdx===state.pList.length-1){
      // 非错题区：揭晓本组最后一道 -> 恭喜通关
      celebrated=true;
      celebrate("🏆","恭喜通关！","你已完成本组全部 "+state.pList.length+" 道题目");
    }
    renderMain();
  }
  function flashSelectHint(){
    const pc=$("#pcard"); if(!pc) return;
    pc.animate([{transform:"translateX(0)"},{transform:"translateX(-7px)"},{transform:"translateX(7px)"},{transform:"translateX(0)"}],{duration:260});
  }

  function goSlide(dir){
    const list=state.pList;
    const ni=state.pIdx+dir;
    if(ni<0||ni>=list.length) return;
    state.pIdx=ni; state.revealed=false; state.selected=null;
    pos[state.module]=state.pIdx; write(LS.pos,pos); // 记录停在哪
    renderMain();
    const pc=$("#pcard");
    if(pc){ pc.classList.add(dir>0?"slide-next":"slide-prev"); }
  }

  // ---------- RANDOM ONE ----------
  let randState={q:null,selected:null,revealed:false};
  // 随机抽取：错题权重调高（约70%），但保留约30%从非错题抽取，保证“不全是错题”
  function pickRandomQuestion(){
    const wrongList=Q.filter(q=>wrong.has(q.id));
    if(wrongList.length){
      if(Math.random()<0.7) return wrongList[Math.floor(Math.random()*wrongList.length)];
      const nonWrong=Q.filter(q=>!wrong.has(q.id));
      if(nonWrong.length) return nonWrong[Math.floor(Math.random()*nonWrong.length)];
    }
    return Q[Math.floor(Math.random()*Q.length)];
  }
  function openRandom(){
    randState={q:pickRandomQuestion(),selected:null,revealed:false};
    renderRandom();
    $("#modal").classList.add("show");
  }
  function closeRandom(){ $("#modal").classList.remove("show"); }
  function flashSelectHintModal(){
    const c=$("#modalCard"); if(c)c.animate([{transform:"translateX(0)"},{transform:"translateX(-7px)"},{transform:"translateX(7px)"},{transform:"translateX(0)"}],{duration:260});
  }
  function renderRandom(){
    const m=$("#modalCard"); const q=randState.q;
    const correct=normAns(q.answer);
    const favOn=isFav(q.id);
    m.innerHTML=`<button class="modal-close" id="modalClose">✕</button>
      <div class="card-head">
        <div class="head-badges">${badge("b-zone",zoneName(q.source))}${q.lecture?badge("b-lect",q.lecture):""}${q.date?badge("b-date",q.date):""}</div>
        <div class="head-meta"><span class="b-num">No.${q.num}</span><button class="fav-star${favOn?" on":""}" id="rFav">${favOn?"★":"☆"}</button></div>
      </div>
      <div class="stem">${esc(q.stem)}</div>
      <div class="r-opts" id="rOpts"></div>
      <div class="r-result" id="rResult"></div>
      <div class="card-actions"><button class="btn" id="rNext">🔀 换一题</button></div>`;
    const ro=$("#rOpts",m);
    Object.keys(q.options||{}).sort().forEach(k=>{
      const o=el("div","r-opt"); o.dataset.k=k;
      const st = randState.revealed ? (correct.includes(k) ? '<span class="r-opt-status ok">✓</span>' : (randState.selected===k ? '<span class="r-opt-status no">✗</span>' : '')) : '';
      o.innerHTML=`<span class="k">${k}</span><span>${esc(q.options[k])}</span>${st}`;
      if(!randState.revealed){
        o.onclick=()=>{ randState.selected=k; ro.querySelectorAll(".r-opt").forEach(x=>x.classList.toggle("sel",x.dataset.k===k)); };
      }else{
        if(correct.includes(k)) o.classList.add("ok");
        else if(randState.selected===k) o.classList.add("no");
        else o.classList.add("locked");
      }
      ro.appendChild(o);
    });
    if(randState.revealed){
      const isOk=randState.selected&&correct.includes(randState.selected);
      const res=$("#rResult",m);
      res.innerHTML= `<div class="verdict ${isOk?"ok":"no"}" style="margin-bottom:12px">${isOk?"🎉 回答正确":"✗ 回答错误"}</div>
        <div class="ttl" style="font-size:12.5px;font-weight:800;letter-spacing:1px;color:var(--accent);margin-bottom:7px">✓ 正确答案：${esc(correct.join("、"))}</div>
        <div class="body" style="font-size:14.5px;color:var(--text-2);line-height:1.8;white-space:pre-wrap">${esc(q.analysis||"（暂无解析）")}</div>`
        + kpBlockHtml(q)
        + videoNoteHtml(q)
        + (q.kps&&q.kps.length?`<div class="kp-row">${q.kps.map(k=>'<span class="kp">'+esc(k)+'</span>').join("")}</div>`:"");
      res.classList.add("open");
    }else{
      const rev=el("button","btn primary","✨ 揭晓答案"); rev.style.marginTop="4px";
      rev.onclick=()=>{
        if(!randState.selected){ flashSelectHintModal(); return; }
        const isOk=correct.includes(randState.selected);
        prog[q.id]=isOk?"ok":"no"; write(LS.prog,prog);
        if(isOk) wrong.delete(q.id); else wrong.add(q.id);
        write(LS.wrong,[...wrong]);
        randState.revealed=true; renderRandom(); renderStats();
      };
      m.querySelector(".card-actions").appendChild(rev);
    }
    $("#modalClose",m).onclick=closeRandom;
    $("#rNext",m).onclick=openRandom;
    $("#rFav",m).onclick=()=>toggleFav(q.id,$("#rFav",m));
  }

  // ---------- FAV ----------
  function renderFav(m){
    let base=Q.filter(q=>fav.has(q.id));
    if(state.zone!=="all") base=base.filter(q=>q.source===state.zone);
    const wrap=el("div","list");
    if(!base.length){ wrap.appendChild(emptyEl("fav")); m.appendChild(wrap); return; }
    if(state.subject==="all"){
      // 未指定科目：按科目分组，分组标题即“科目区分”，无需在每张卡片前重复标注
      SUBJ.forEach(s=>{
        const items=base.filter(q=>q.subject===s.key);
        if(!items.length) return;
        const h=el("div","fav-group");
        h.innerHTML=`<span class="fg-dot fg-${s.key}"></span><span class="fg-name">${s.name}</span><span class="fg-cnt">${items.length}</span>`;
        wrap.appendChild(h);
        items.forEach((q,i)=>wrap.appendChild(card(q,i)));
      });
    } else {
      const items=base.filter(q=>q.subject===state.subject);
      if(!items.length){ wrap.appendChild(emptyEl("fav")); m.appendChild(wrap); return; }
      items.forEach((q,i)=>wrap.appendChild(card(q,i)));
    }
    m.appendChild(wrap);
    observeCards();
  }

  // ---------- WRONG ZONE ----------
  function wrongHeadEl(){
    const list=Q.filter(q=>wrong.has(q.id));
    if(!list.length) return null;
    const head=el("div","wrong-head");
    const mastered=list.filter(q=>prog[q.id]==="ok").length;
    const pct=Math.round(mastered/list.length*100);
    const info=el("div","wh-info");
    info.innerHTML=`<div class="wh-title">错题集 · <b>${list.length}</b> 道</div>
      <div class="wh-bar"><div class="wh-fill" style="width:${pct}%"></div></div>
      <div class="wh-sub">已掌握 ${mastered} / ${list.length} · 答对后自动移出错题集</div>`;
    head.appendChild(info);
    const clearBtn=el("button","btn ghost","🗑 清空错题");
    clearBtn.onclick=()=>{
      if(confirm("确定清空所有错题？（不可撤销）")){
        wrong.clear(); write(LS.wrong,[]);
        renderStats(); renderControls(); renderMain();
      }
    };
    head.appendChild(clearBtn);
    return head;
  }

  function renderWrong(m){
    let list=Q.filter(q=>wrong.has(q.id));
    if(state.zone!=="all") list=list.filter(q=>q.source===state.zone);
    if(state.subject!=="all") list=list.filter(q=>q.subject===state.subject);
    const wrap=el("div","list");
    if(!list.length){
      wrap.appendChild(emptyEl("wrong")); m.appendChild(wrap); return;
    }
    const head=wrongHeadEl();
    if(head) wrap.appendChild(head);
    list.forEach((q,i)=>wrap.appendChild(card(q,i)));
    m.appendChild(wrap);
    observeCards();
  }

  // ---------- DONE (已练习) ----------
  function renderDone(m){
    const list = doneArr();
    const wrap=el("div","list");
    if(!list.length){
      wrap.appendChild(emptyEl("done")); m.appendChild(wrap); return;
    }
    const firstOk = list.filter(q=>prog[q.id]==="ok" && doneFrom[q.id]!=="wrong").length;
    const fromWrong = list.filter(q=>prog[q.id]==="ok" && doneFrom[q.id]==="wrong").length;
    const wrongN = list.length - firstOk - fromWrong;
    const head=el("div","done-head");
    head.innerHTML=`<div class="dh-info">
        <div class="dh-title">已练习 · <b>${list.length}</b> 题</div>
        <div class="dh-legend">
          <span class="lg lg-ok"><i></i>一次做对 ${firstOk}</span>
          <span class="lg lg-no"><i></i>一次做错 ${wrongN}</span>
          <span class="lg lg-fw"><i></i>错题区攻克 ${fromWrong}</span>
        </div>
      </div>`;
    const clearBtn=el("button","btn ghost","🗑 清空已练");
    clearBtn.onclick=()=>{
      if(confirm("确定清空全部练习记录？（已练习、正确率统计将重置，不可撤销）")){
        prog={}; write(LS.prog,{});
        doneFrom={}; write(LS.doneFrom,{});
        renderStats(); renderControls(); renderMain();
      }
    };
    head.appendChild(clearBtn);
    wrap.appendChild(head);
    list.forEach((q,i)=>{
      const c=card(q,i);
      const ok = prog[q.id]==="ok";
      let sym, tagCls;
      if(ok){
        if(doneFrom[q.id]==="wrong"){ sym="✓"; tagCls="ok from-wrong"; }
        else { sym="✓"; tagCls="ok"; }
      } else {
        sym="✗"; tagCls="no";
      }
      const tag=el("div","done-tag "+tagCls, sym);
      c.querySelector(".head-badges").appendChild(tag);
      wrap.appendChild(c);
    });
    m.appendChild(wrap);
    observeCards();
  }

  // ---------- CELEBRATE overlay ----------
  function celebrate(emoji,title,sub){
    let ov=$("#celebrate");
    if(!ov){ ov=el("div","celebrate"); ov.id="celebrate"; document.body.appendChild(ov); }
    ov.innerHTML=`<span class="confetti c1"></span><span class="confetti c2"></span><span class="confetti c3"></span><span class="confetti c4"></span><span class="confetti c5"></span>
      <div class="cmodal">
        <div class="cemoji">${emoji}</div>
        <div class="ctitle">${title}</div>
        <div class="csub">${sub}</div>
        <button class="btn primary" id="ceClose">继续刷题 →</button>
      </div>`;
    ov.classList.add("show");
    $("#ceClose").onclick=()=>ov.classList.remove("show");
  }

  // ---------- REAL (placeholder) ----------
  function renderReal(){
    const d=el("div","placeholder");
    d.innerHTML=`<div class="ring">🎯</div>
      <h2>真题选择题 · 正在整理中</h2>
      <p>历年真题选择题正在由宇天团队逐题校对、标注知识点与视频讲解，预计很快上线。<br>先拿「每日一题」和「基础必刷500题」把基础打牢吧！</p>
      <div class="soon">
        <span class="pill">✓ 真题采集</span>
        <span class="pill">⏳ 知识点标注</span>
        <span class="pill">⏳ 视频讲解挂载</span>
        <span class="pill">⏳ 上线发布</span>
      </div>`;
    return d;
  }

  // ---------- fav toggle ----------
  function toggleFav(id,btn){
    if(fav.has(id)){ fav.delete(id); if(btn)btn.classList.remove("on"),btn.textContent="☆"; }
    else{ fav.add(id); if(btn)btn.classList.add("on"),btn.textContent="★"; }
    write(LS.fav,[...fav]);
    $("#favCount").textContent=fav.size;
  }

  // ---------- module tabs ----------
  $("#tabs").querySelectorAll(".tab").forEach(t=>{
    t.onclick=()=>{
      $("#tabs").querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      t.classList.add("active");
      const mod=t.dataset.mod;
      if(mod==="fav"){ state.module="fav"; }
      else{ state.module=mod; state.view="browse"; state.subject="all"; state.lecture="all"; state.search=""; }
      if(state.view==="practice"){ startPractice(); }
      renderControls(); renderMain(); renderStats();
    };
  });
  // fav button (special tab)
  $("#favBtn").onclick=()=>{
    $("#tabs").querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    state.module="fav";
    renderControls(); renderMain(); renderStats();
  };

  // random one
  $("#randBtn").onclick=openRandom;
  $("#modal").onclick=(e)=>{ if(e.target===$("#modal")) closeRandom(); };

  // hero buttons: 开始刷题 -> 基础必刷刷题，每日一题 -> 每日一题刷题
  $("#heroStart").onclick=()=>openModuleView("bank");
  $("#heroDaily").onclick=()=>openModuleView("daily");

  // ---------- theme ----------
  const themeBtn=$("#themeBtn");
  function applyTheme(th){
    document.documentElement.setAttribute("data-theme",th);
    themeBtn.textContent = th==="dark"?"🌙":"☀️";
    write(LS.theme,th);
  }
  themeBtn.onclick=()=>{
    const cur=document.documentElement.getAttribute("data-theme");
    applyTheme(cur==="dark"?"light":"dark");
  };
  applyTheme(read(LS.theme,"light"));

  // ---------- contact FAB (常驻悬浮入口) ----------
  const contactFab=$("#contactFab");
  const contactPop=$("#contactPop");
  if(contactFab){
    contactFab.onclick=()=>contactPop.classList.toggle("show");
    const cpClose=$("#cpClose");
    if(cpClose) cpClose.onclick=()=>contactPop.classList.remove("show");
    contactPop.onclick=(e)=>{ if(e.target===contactPop) contactPop.classList.remove("show"); };
  }

  // ---------- 知识点梳理折叠 ----------
  document.addEventListener("click", e=>{
    const t=e.target.closest(".kp-toggle");
    if(!t) return;
    const block=t.closest(".kp-block");
    if(!block) return;
    const open=block.classList.toggle("open");
    t.setAttribute("aria-expanded", open? "true":"false");
  });

  // ---------- init ----------
  renderStats();
  renderControls();
  renderMain();
})();
</script>
</body>
</html>
