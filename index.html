<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>宇天408 · 每日一题</title>
<style>
  :root{
    --purple:#660874;          /* 清华紫（主色，保留） */
    --purple-hi:#8a2fa3;
    --purple-soft:#f6eef8;
    --purple-line:#e9d9ef;
    --gold:#bd9a4e;            /* 古铜金（撞色点缀，高级感） */
    --gold-hi:#dcb566;
    --gold-deep:#9a7b34;       /* 深金（浅底小字用，保证对比度） */
    --gold-soft:#faf4e6;
    --gold-line:#ecd9b0;
    --ink:#1d1d1f;             /* Apple 近黑 */
    --ink-2:#6e6e73;
    --ink-3:#86868b;
    --line:#d2d2d7;            /* Apple 发丝线 */
    --bg:#ffffff;
    --bg-soft:#f5f5f7;         /* Apple 灰 */
    --radius:18px;
    --radius-sm:12px;
    --shadow:0 1px 3px rgba(0,0,0,.04), 0 10px 30px rgba(0,0,0,.05);
    --shadow-hover:0 2px 6px rgba(102,8,116,.08), 0 18px 44px rgba(102,8,116,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;
    -webkit-font-smoothing:antialiased;letter-spacing:.1px;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:0 24px;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}

  /* ---------- 导航 ---------- */
  .nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.72);
    backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line);}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px;}
  .brand{display:flex;align-items:center;gap:11px;font-weight:600;font-size:16px;cursor:pointer;}
  .brand .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--gold));
    color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;box-shadow:0 3px 9px rgba(102,8,116,.28);}
  .brand small{display:block;font-size:10px;font-weight:500;color:var(--ink-3);letter-spacing:1.5px;margin-top:-2px;}
  .nav-right{display:flex;align-items:center;gap:6px;}
  .nav-link{font-size:14px;color:var(--ink-2);padding:7px 13px;border-radius:8px;transition:.18s;}
  .nav-link:hover{color:var(--ink);background:var(--bg-soft);}
  .nav-link.active{color:var(--purple);font-weight:600;}
  .btn-purple{background:var(--purple);color:#fff;border:none;font-size:13.5px;font-weight:600;
    padding:8px 15px;border-radius:980px;transition:.18s;box-shadow:0 3px 10px rgba(102,8,116,.22);}
  .btn-purple:hover{background:var(--purple-hi);transform:translateY(-1px);box-shadow:0 6px 16px rgba(189,154,78,.3);}
  .today-pill{font-size:12.5px;color:var(--ink-2);background:var(--bg-soft);border:1px solid var(--line);
    padding:5px 12px;border-radius:980px;margin-left:6px;}
  .today-pill b{color:var(--gold);font-weight:600;}

  /* ---------- Hero ---------- */
  .hero{padding:84px 0 40px;position:relative;}
  .hero::before{content:"";position:absolute;left:-24px;right:-24px;top:-60px;height:360px;z-index:-1;pointer-events:none;
    background:
      radial-gradient(80% 120% at 12% 0%, rgba(102,8,116,.07), transparent 60%),
      radial-gradient(70% 120% at 92% 0%, rgba(189,154,78,.10), transparent 58%);}
  .eyebrow{font-size:12.5px;letter-spacing:2.5px;color:var(--gold-deep);text-transform:uppercase;font-weight:600;margin-bottom:18px;}
  .hero h1{font-size:56px;line-height:1.06;font-weight:700;letter-spacing:-.03em;}
  .hero h1 .accent{background:linear-gradient(120deg,var(--purple) 30%,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero p.lead{font-size:19px;color:var(--ink-2);max-width:620px;margin-top:18px;line-height:1.55;}
  .hero-subs{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;}
  .hero-sub{display:inline-flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:980px;padding:9px 17px;cursor:pointer;transition:.18s;}
  .hero-sub:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 22px rgba(189,154,78,.18);}
  .hero-sub .hm{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:7px;
    background:var(--gold-soft);color:var(--gold);font-size:12px;font-weight:800;}
  .stats{display:flex;gap:48px;margin-top:40px;flex-wrap:wrap;}
  .stat .num{font-size:32px;font-weight:700;letter-spacing:-.02em;color:var(--gold);}
  .stat .num .u{font-size:15px;color:var(--ink-3);font-weight:500;margin-left:3px;}
  .stat .label{font-size:13px;color:var(--ink-3);margin-top:2px;}

  /* ---------- 搜索 ---------- */
  .search{position:relative;margin:30px 0 8px;max-width:560px;}
  .search input{width:100%;border:1px solid var(--line);background:var(--bg-soft);border-radius:980px;
    padding:13px 18px 13px 46px;font-size:15px;color:var(--ink);outline:none;transition:.18s;}
  .search input:focus{border-color:var(--gold);background:#fff;box-shadow:0 0 0 4px var(--gold-soft);}
  .search svg{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--ink-3);}

  /* ---------- 区块标题 ---------- */
  .sec{margin-top:54px;}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:6px;}
  .sec-head h2{font-size:22px;font-weight:700;letter-spacing:-.02em;}
  .sec-head .hint{font-size:13px;color:var(--ink-3);}

  /* ---------- 科目卡片 ---------- */
  .sub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
  .sub-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:24px 22px;
    transition:.2s;cursor:pointer;position:relative;overflow:hidden;}
  .sub-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--purple-line);}
  .sub-card .mono{width:42px;height:42px;border-radius:12px;background:var(--purple-soft);color:var(--purple);
    display:grid;place-items:center;font-size:19px;font-weight:700;margin-bottom:16px;}
  .sub-card h3{font-size:17px;font-weight:600;margin-bottom:4px;}
  .sub-card .desc{font-size:12.5px;color:var(--ink-3);margin-bottom:14px;min-height:34px;}
  .sub-card .cnt{font-size:13px;color:var(--ink-2);}
  .sub-card .cnt b{color:var(--purple);font-weight:700;font-size:20px;}
  .sub-card .kps{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;}
  .sub-card .kps span{font-size:11.5px;color:var(--ink-3);background:var(--bg-soft);padding:3px 9px;border-radius:7px;}
  .sub-card .arrow{position:absolute;top:24px;right:22px;color:var(--ink-3);font-size:18px;transition:.2s;}
  .sub-card:hover .arrow{color:var(--purple);transform:translateX(3px);}
  .sub-card.empty .mono{background:var(--bg-soft);color:var(--ink-3);}
  .sub-card.empty h3{color:var(--ink-3);}

  /* ---------- 知识点 chips ---------- */
  .kp-chips{display:flex;gap:9px;flex-wrap:wrap;}
  .kp{font-size:13.5px;color:var(--purple);background:var(--purple-soft);border:1px solid var(--purple-line);
    padding:7px 13px;border-radius:980px;cursor:pointer;transition:.16s;display:inline-flex;align-items:center;gap:7px;}
  .kp:hover{background:var(--purple);color:#fff;border-color:var(--purple);}
  .kp .c{font-size:11.5px;background:rgba(102,8,116,.1);padding:0 7px;border-radius:6px;min-width:20px;text-align:center;}
  .kp:hover .c{background:rgba(255,255,255,.22);}

  /* ---------- 返回 / 标题 ---------- */
  .back{display:inline-flex;align-items:center;gap:5px;font-size:14px;color:var(--ink-2);cursor:pointer;margin:30px 0 6px;transition:.15s;}
  .back:hover{color:var(--purple);}
  .view-head{margin-top:6px;}
  .view-head h1{font-size:34px;font-weight:700;letter-spacing:-.02em;}
  .view-head .sub{font-size:14px;color:var(--ink-3);margin-top:6px;}
  .layout{display:grid;grid-template-columns:230px 1fr;gap:30px;margin-top:26px;align-items:start;}

  /* ---------- 侧栏知识点 ---------- */
  .side{position:sticky;top:80px;}
  .side .side-title{font-size:13px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;font-weight:600;}
  .side ul{list-style:none;display:flex;flex-direction:column;gap:4px;}
  .side li{padding:9px 12px;border-radius:10px;font-size:14px;color:var(--ink-2);cursor:pointer;transition:.15s;
    display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .side li:hover{background:var(--bg-soft);color:var(--ink);}
  .side li.active{background:var(--purple);color:#fff;}
  .side li .n{font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums;}
  .side li.active .n{color:rgba(255,255,255,.8);}
  .side li.all{border:1px solid var(--line);}

  /* ---------- 题目卡片 ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:20px 20px 16px;
    box-shadow:var(--shadow);transition:.2s;position:relative;overflow:hidden;}
  .card:hover{box-shadow:var(--shadow-hover);}
  .card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card .date{font-size:12.5px;color:var(--ink-3);font-variant-numeric:tabular-nums;}
  .card .date b{color:var(--ink-2);font-weight:600;}
  .star{background:none;border:none;font-size:18px;color:var(--line);line-height:1;transition:.15s;padding:2px;}
  .star:hover{color:var(--gold);}
  .star.on{color:var(--gold);text-shadow:0 1px 6px rgba(189,154,78,.45);}
  .badge{font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:7px;color:var(--purple);
    background:var(--purple-soft);border:1px solid var(--purple-line);display:inline-block;margin-bottom:10px;}
  .card .stem{font-size:15px;line-height:1.62;color:var(--ink);white-space:pre-wrap;word-break:break-word;}
  .card .kps{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px;}
  .card .kps .tag{font-size:12.5px;color:var(--purple);background:var(--purple-soft);border:1px solid var(--purple-line);
    padding:4px 10px;border-radius:8px;cursor:pointer;transition:.15s;}
  .card .kps .tag:hover{background:var(--purple);color:#fff;border-color:var(--purple);}
  .toggle{margin-top:14px;font-size:13.5px;font-weight:600;color:var(--purple);background:none;border:none;
    padding:0;display:inline-flex;align-items:center;gap:4px;}
  .toggle:hover{color:var(--purple-hi);}
  .detail{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);display:none;}
  .detail.show{display:block;}
  .detail .ans{display:inline-block;font-size:14px;font-weight:700;color:#2a1a06;background:linear-gradient(120deg,var(--gold-hi),var(--gold));
    padding:3px 12px;border-radius:8px;margin-bottom:12px;box-shadow:0 2px 8px rgba(189,154,78,.3);}
  .detail .ans.empty{background:var(--ink-3);color:#fff;box-shadow:none;}
  .detail h4{font-size:12.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;margin:14px 0 5px;font-weight:600;}
  .detail .ana{font-size:14px;color:var(--ink-2);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
  .detail .kpfull{font-size:13.5px;color:var(--ink-2);white-space:pre-wrap;background:var(--bg-soft);
    border-radius:10px;padding:12px 14px;line-height:1.7;}
  .detail .vid{font-size:12.5px;color:var(--ink-3);margin-top:10px;}
  .ribbon{position:absolute;top:13px;right:-32px;transform:rotate(45deg);background:linear-gradient(120deg,var(--gold-hi),var(--gold));color:#2a1a06;
    font-size:10.5px;font-weight:700;padding:3px 36px;letter-spacing:1px;box-shadow:0 2px 6px rgba(189,154,78,.35);}

  .active-bar{display:none;align-items:center;gap:12px;margin:22px 0 4px;background:var(--purple-soft);
    border:1px solid var(--purple-line);border-radius:12px;padding:12px 16px;}
  .active-bar.show{display:flex;}
  .active-bar .txt{font-size:14px;color:var(--ink);}
  .active-bar .txt b{color:var(--purple);font-weight:700;}
  .active-bar .clear{margin-left:auto;font-size:13px;color:var(--purple);background:#fff;border:1px solid var(--purple-line);
    padding:6px 13px;border-radius:8px;transition:.15s;}
  .active-bar .clear:hover{box-shadow:0 2px 8px rgba(102,8,116,.15);}

  .count-line{font-size:13.5px;color:var(--ink-3);margin:22px 0 14px;}
  .empty-state{text-align:center;color:var(--ink-3);padding:60px 0;font-size:14.5px;}

  /* ---------- 弹窗（随机一题） ---------- */
  .modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:100;
    display:none;align-items:center;justify-content:center;padding:24px;}
  .modal-mask.show{display:flex;}
  .modal{background:#fff;border-radius:22px;max-width:580px;width:100%;max-height:86vh;overflow:auto;
    padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.3);position:relative;}
  .modal .close{position:absolute;top:18px;right:18px;background:var(--bg-soft);border:none;border-radius:50%;
    width:32px;height:32px;font-size:16px;color:var(--ink-2);}
  .modal .close:hover{background:var(--line);}
  .modal .tag-random{font-size:12px;font-weight:600;color:var(--purple);letter-spacing:1px;text-transform:uppercase;}

  footer{border-top:1px solid var(--line);margin-top:70px;padding:30px 0 46px;color:var(--ink-3);font-size:13px;}
  footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}

  @media (max-width:720px){
    .hero h1{font-size:40px;}
    .layout{grid-template-columns:1fr;}
    .side{position:static;}
    .stats{gap:30px;}
    .nav-link{display:none;}
    .wrap{padding:0 18px;}
  }
</style>
</head>

<script>
// 408 每日一题 数据文件 —— 由文档解析生成，可手动增删改
// kp = 知识点分类(可点选聚合)；kpTitle = 该题具体专题；date 为占位日期，请替换为真实发布日期
window.QUESTIONS = [
 {
  "num": 1,
  "subject": "ds",
  "stem": "下列程序段的时间复杂度是（  ）\ncount = 0; for(k = 1;k<=n;k*=2) for(j = 1;j<=k;j++)     count++;\n\nA.O(log2n)\n\nB.O(n1/2)\n\nC.O(n)\n\nD.O(nlog2n)",
  "answer": "C",
  "analysis": "整个程序段最深层循环中的语句是 count++，它被重复执行的次数直接决定了程序的时间开销。从最外层开始，k的取值依次为：1、2、22、23、......、2i。若此时外层循环停止，则需满足2i ≤ n < 2i+1。取对数，可知i的数量级即为log₂n，由于内层循环j执行的次数即为k，故count执行次数总和约为1 + 2 + 22 + 23 +......+ 2i = 2i+1 – 1次，将i代入即可得次数约为2n-1。",
  "kpTitle": "时间复杂度的计算方法",
  "kp_full": "时间复杂度的计算方法:\n第1步:找出基本运算(最深层循环的语句，执行次数最多的语句)\n第2步:模拟运行程序，统计基本运算执行次数f(n)\n第3步:忽略其低阶项和常系数，求f(n)的最高阶(数量级)",
  "video": "day01第一题|时间复杂度的计算方法讲解",
  "kp": "基本概念",
  "date": "2026-04-17",
  "day": 1
 },
 {
  "num": 2,
  "subject": "ds",
  "stem": "以下属于逻辑结构的是（  ）\n\nA.顺序表\n\nB.哈希表\n\nC.有序表\n\nD.单链表",
  "answer": "C",
  "analysis": "数据的逻辑结构指的是数据元素之间抽象的逻辑关系，与数据在计算机中如何存储无关。常见的有线性结构（线性表、栈、队列等），树形结构（一般树，二叉树等），图状结构（有向图、无向图）等。\n数据的存储结构指的是数据结构在计算机内存中的实际存放形式，是实现逻辑结构的具体方式。主要有顺序存储，链式存储，索引存储，散列存储四种。\nA、B、D选项均蕴含了数据的实际存放形式，故是存储结构，而C选项仅强调有序，和具体实现无关。",
  "kpTitle": "数据结构的三要素",
  "kp_full": "数据结构的三要素：\n逻辑结构：着眼数据元素间抽象的逻辑关系，独立于存储结构。\n存储结构（物理结构）：数据结构在计算机中的实际存放形式，必须能够体现出逻辑结构。\n数据的运算：施加在数据上的操作，例如增删改查。",
  "video": "day01第二题|数据结构的三要素讲解",
  "kp": "查找",
  "date": "2026-04-18",
  "day": 2
 },
 {
  "num": 3,
  "subject": "ds",
  "stem": "设一个链表最常用的操作是在末尾插入节点和删除尾节点，则选用（  ）最节省时间。\n\nA.单链表\n\nB.单循环链表\n\nC.带尾指针的单循环链表\n\nD.带头节点的双循环链表",
  "answer": "D",

<script>
/* ===================== 配置 ===================== */
const SUBJECTS = {
  ds:{name:"数据结构",mono:"数",desc:"线性表 · 树 · 图 · 查找与排序"},
  co:{name:"计算机组成原理",mono:"组",desc:"数据表示 · 存储 · CPU · 流水线"},
  os:{name:"操作系统",mono:"操",desc:"进程 · 内存 · 文件 · 设备（待补充）"},
  net:{name:"计算机网络",mono:"网",desc:"体系结构 · TCP/IP · 应用层（待补充）"},
};
const WD=["周日","周一","周二","周三","周四","周五","周六"];
const TODAY="2026-07-08";

/* ===================== 状态 ===================== */
const state={view:"home",subject:null,kp:null,subjectCtx:null,search:""};

/* ===================== 工具 ===================== */
const $=s=>document.querySelector(s);
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function bySub(sub){return QUESTIONS.filter(q=>q.subject===sub);}
function kpCounts(list){const m={};list.forEach(q=>{m[q.kp]=(m[q.kp]||0)+1;});return m;}
function fmtDate(iso){const d=new Date(iso+"T00:00:00");return{md:(d.getMonth()+1)+"月"+d.getDate()+"日",wd:WD[d.getDay()]};}
function qid(q){return q.subject+"-"+q.num;}
function clean(s){return (s||"").replace(/\n{2,}/g,"\n").trim();}

/* 收藏 */
function getFav(){try{return JSON.parse(localStorage.getItem("yt408_fav"))||[];}catch(e){return[];}}
function setFav(a){localStorage.setItem("yt408_fav",JSON.stringify(a));}
function isFav(id){return getFav().includes(id);}
function toggleFav(id){let a=getFav();a.includes(id)?a=a.filter(x=>x!==id):a.push(id);setFav(a);updateFavCount();}

function updateFavCount(){$("#favCount").textContent=getFav().length;}

/* ===================== 渲染：题目卡片 ===================== */
function cardHTML(q,opts={}){
  const subj=SUBJECTS[q.subject];
  const f=fmtDate(q.date);
  const _favOn=isFav(qid(q));
  const showBadge=opts.badge;
  const kps=[q.kp].map(k=>`<span class="tag" data-kp="${esc(k)}" data-sub-ctx="${state.subject||""}">${esc(k)}</span>`).join("");
  return `
  <article class="card ${q.date===TODAY?"today":""}" data-id="${esc(qid(q))}">
    ${q.date===TODAY?'<div class="ribbon">今日</div>':""}
    <div class="top">
      <span class="date"><b>${f.md}</b> ${f.wd} · Day ${q.day}</span>
      <button class="star ${_favOn?"on":""}" data-fav="${esc(qid(q))}" title="收藏">${_favOn?"★":"☆"}</button>
    </div>
    ${showBadge?`<span class="badge">${subj.name}</span>`:""}
    <div class="stem">${esc(clean(q.stem))}</div>
    <div class="kps">${kps}</div>
    <button class="toggle" data-toggle="${esc(qid(q))}">查看答案与解析 ›</button>
    <div class="detail" id="d-${esc(qid(q))}">
      <span class="ans ${q.answer?"":"empty"}">${q.answer?("答案 "+esc(q.answer)):"暂无标准答案"}</span>
      ${q.analysis?`<h4>解析</h4><div class="ana">${esc(clean(q.analysis))}</div>`:""}
      ${q.kp_full?`<h4>知识点梳理 · ${esc(q.kpTitle)}</h4><div class="kpfull">${esc(clean(q.kp_full))}</div>`:""}
      ${q.video?`<div class="vid">🎬 配套视频：${esc(clean(q.video))}</div>`:""}
    </div>
  </article>`;
}

/* ===================== 渲染：首页 ===================== */

    const list=bySub(key);
    const topK=Object.entries(kpCounts(list)).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>`<span>${esc(k)}</span>`).join("");
    const empty=list.length===0;
    return `
    <div class="sub-card ${empty?"empty":""}" ${empty?"":`data-sub="${key}"`}>
      <div class="arrow">${empty?"":"›"}</div>
      <div class="mono">${SUBJECTS[key].mono}</div>
      <h3>${SUBJECTS[key].name}</h3>
      <div class="desc">${SUBJECTS[key].desc}</div>
      <div class="cnt"><b>${list.length}</b> 题</div>
      ${empty?"":`<div class="kps">${topK}</div>`}
    </div>`;
  }).join("");

  $("#app").innerHTML=`
    <section class="hero">
      <div class="eyebrow">408 · 计算机专业基础综合</div>
      <h1>每天一题，<br>把 <span class="accent">408</span> 啃透。</h1>
      <p class="lead">按发布日期整理 · 知识点可点选聚合 · 收藏薄弱环节。陪你把四门课，一题一题磨透。</p>
      <div class="hero-subs">
        ${Object.keys(SUBJECTS).map(key=>`<button class="hero-sub" data-sub="${key}"><span class="hm">${SUBJECTS[key].mono}</span>${SUBJECTS[key].name}</button>`).join("")}
      </div>
      <div class="stats">
        <div class="stat"><div class="num">${all.length}<span class="u">题</span></div><div class="label">已整理题目</div></div>
        <div class="stat"><div class="num">${Object.keys(kc).length}<span class="u">个</span></div><div class="label">覆盖知识点</div></div>
        <div class="stat"><div class="num">${getFav().length}<span class="u">题</span></div><div class="label">我的收藏</div></div>
      </div>
    </section>

    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input data-search placeholder="搜索题目或知识点，如：二叉树、补码、Cache…" value="${esc(state.search)}"/>
    </div>

    <section class="sec">
      <div class="sec-head"><h2>四科目录</h2><span class="hint">点击进入对应科目</span></div>
      <div class="sub-grid">${subs}</div>
    </section>

    <section class="sec">
      <div class="sec-head"><h2>高频知识点</h2><span class="hint">点击查看相关题目</span></div>
      <div class="kp-chips">${hot.map(([k,c])=>`<span class="kp" data-kp="${esc(k)}" data-sub-ctx="">${esc(k)}<span class="c">${c}</span></span>`).join("")}</div>
    </section>

    <section class="sec">
      <div class="sec-head"><h2>最新题目</h2><span class="hint">按发布日期倒序</span></div>
      <div class="grid">${[...all].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8).map(q=>cardHTML(q,{badge:true})).join("")}</div>
    </section>
  `;
  bindSearch();
}

/* ===================== 渲染：科目视图 ===================== */
function renderSubject(){
  const key=state.subject;const subj=SUBJECTS[key];const list=bySub(key);

    <div class="back" data-back>‹ 返回首页</div>
    <div class="view-head">

      <input data-search placeholder="在「${subj.name}」中搜索…" value="${esc(state.search)}"/>
    </div>
    <div class="layout">
      <aside class="side">
        <div class="side-title">涉及的知识点</div>
        <ul>
          <li class="all ${!state.kp?"active":""}" data-kp="" data-sub-ctx="${key}">全部题目<span class="n">${list.length}</span></li>
          ${kpItems}
        </ul>
      </aside>
      <div>
        ${state.kp?`<div class="active-bar show"><span class="txt">知识点 <b>${esc(state.kp)}</b> · 共 ${main.length} 题</span><button class="clear" data-clear-kp>清除</button></div>`:""}
        <div class="count-line">${main.length} 道题${state.search?`（搜索“${esc(state.search)}”）`:""}</div>
        ${main.length?`<div class="grid">${main.map(q=>cardHTML(q)).join("")}</div>`:`<div class="empty-state">没有匹配的题目</div>`}
      </div>
    </div>
  `;
  bindSearch();
}

/* ===================== 渲染：知识点聚合视图 ===================== */
function renderKp(){
  const kp=state.kp;
  let main=QUESTIONS.filter(q=>q.kp===kp);
  if(state.subjectCtx) main=main.filter(q=>q.subject===state.subjectCtx);
  if(state.search) main=main.filter(q=>q.stem.includes(state.search)||q.kp.includes(state.search));
  const scope=state.subjectCtx?` · ${SUBJECTS[state.subjectCtx].name}`:"";
  $("#app").innerHTML=`
    <div class="back" data-back>‹ ${state.subjectCtx?"返回科目":"返回首页"}</div>
    <div class="view-head">
      <h1>知识点 · ${esc(kp)}</h1>
      <div class="sub">${scope} · 共 ${main.length} 道题涉及该知识点</div>
    </div>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input data-search placeholder="在该知识点内搜索…" value="${esc(state.search)}"/>
    </div>
    <div class="count-line">${main.length} 道题</div>
    ${main.length?`<div class="grid">${main.map(q=>cardHTML(q,{badge:true})).join("")}</div>`:`<div class="empty-state">暂无题目</div>`}
  `;
  bindSearch();
}

/* ===================== 渲染：收藏视图 ===================== */
function renderFav(){
  const fav=getFav();
  let main=QUESTIONS.filter(q=>fav.includes(qid(q)));
  if(state.search) main=main.filter(q=>q.stem.includes(state.search)||q.kp.includes(state.search));
  $("#app").innerHTML=`
    <div class="back" data-back>‹ 返回首页</div>
    <div class="view-head">
      <h1>我的收藏</h1>
      <div class="sub">已收藏 ${fav.length} 道题 · 数据保存在本地浏览器</div>
    </div>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input data-search placeholder="在收藏中搜索…" value="${esc(state.search)}"/>
    </div>
    <div class="count-line">${main.length} 道题</div>
    ${main.length?`<div class="grid">${main.map(q=>cardHTML(q,{badge:true})).join("")}</div>`:`<div class="empty-state">还没有收藏的题目，点击卡片右上角的 ☆ 即可收藏</div>`}
  `;
  bindSearch();
}

/* ===================== 导航分发 ===================== */
function render(){
  setActiveNav();
  if(state.view==="home")renderHome();
  else if(state.view==="subject")renderSubject();
  else if(state.view==="kp")renderKp();
  else if(state.view==="fav")renderFav();
  window.scrollTo({top:0,behavior:"instant"});
}
function setActiveNav(){
  document.querySelectorAll(".nav-link").forEach(a=>a.classList.toggle("active",a.dataset.go===state.view));
}

/* ===================== 事件 ===================== */
function bindSearch(){
  const s=$("#app").querySelector("[data-search]");
  if(s)s.oninput=e=>{state.search=e.target.value;render();};
}
$("#app").addEventListener("click",e=>{
  const t=e.target.closest("[data-go],[data-sub],[data-kp],[data-fav],[data-toggle],[data-back],[data-clear-kp],[data-random]");
  if(!t)return;
  if(t.dataset.go){state.view=t.dataset.go;state.subject=null;state.kp=null;state.subjectCtx=null;state.search="";render();return;}
  if(t.hasAttribute("data-back")){
    if(state.view==="kp"&&state.subjectCtx){state.view="subject";state.subject=state.subjectCtx;state.kp=null;}
    else{state.view="home";state.subject=null;state.kp=null;state.subjectCtx=null;}
    state.search="";render();return;
  }
  if(t.dataset.sub){state.subject=t.dataset.sub;state.view="subject";state.kp=null;state.subjectCtx=null;state.search="";render();return;}
  if(t.hasAttribute("data-clear-kp")){state.kp=null;render();return;}
  if(t.dataset.kp!==undefined){
    const kp=t.dataset.kp;const ctx=t.dataset.subCtx||"";
    if(!kp){state.kp=null;if(state.view==="kp"){state.view=ctx?"subject":"home";state.subject=ctx||null;}render();return;}
    state.kp=kp;state.subjectCtx=ctx||null;
    // 来自科目侧边栏 → 在该科目内筛选(保留侧边栏与「清除」按钮)；来自首页/弹窗 → 进入知识点聚合视图
    state.view=ctx?"subject":"kp";state.search="";render();
    return;
  }
  if(t.dataset.fav){toggleFav(t.dataset.fav);render();return;}
  if(t.dataset.toggle){
    const d=document.getElementById("d-"+t.dataset.toggle);
    if(d){d.classList.toggle("show");t.textContent=d.classList.contains("show")?"收起 ›":"查看答案与解析 ›";}
    return;
  }
  if(t.dataset.random){showRandom();return;}
});
// 导航栏的随机/首页/收藏也走同一套
document.querySelector(".nav").addEventListener("click",e=>{
  const t=e.target.closest("[data-go],[data-random]");
  if(!t)return;
  if(t.dataset.go){state.view=t.dataset.go;state.subject=null;state.kp=null;state.subjectCtx=null;state.search="";render();}
  if(t.dataset.random)showRandom();
});

/* ===================== 随机一题弹窗 ===================== */
function showRandom(){
  const q=QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)];
  const subj=SUBJECTS[q.subject];const f=fmtDate(q.date);
  $("#modalBody").innerHTML=`
    <button class="close" data-close>✕</button>
    <div class="tag-random">随机一题 · ${subj.name}</div>
    <div class="top" style="margin:10px 0 12px;"><span class="date"><b>${f.md}</b> ${f.wd} · Day ${q.day}</span></div>
    <div class="stem" style="font-size:16px;line-height:1.65;white-space:pre-wrap;word-break:break-word;">${esc(clean(q.stem))}</div>
    <div class="kps" style="display:flex;gap:7px;flex-wrap:wrap;margin:14px 0;">
      ${[q.kp].map(k=>`<span class="tag" data-kp="${esc(k)}" data-sub-ctx="">${esc(k)}</span>`).join("")}
    </div>
    <span class="ans ${q.answer?"":"empty"}">${q.answer?("答案 "+esc(q.answer)):"暂无标准答案"}</span>
    ${q.analysis?`<h4 style="font-size:12.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;margin:14px 0 5px;">解析</h4><div class="ana" style="font-size:14px;color:var(--ink-2);line-height:1.7;white-space:pre-wrap;">${esc(clean(q.analysis))}</div>`:""}
    ${q.kp_full?`<h4 style="font-size:12.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;margin:14px 0 5px;">知识点梳理</h4><div class="kpfull" style="font-size:13.5px;color:var(--ink-2);white-space:pre-wrap;background:var(--bg-soft);border-radius:10px;padding:12px 14px;line-height:1.7;">${esc(clean(q.kp_full))}</div>`:""}
    ${q.video?`<div class="vid" style="font-size:12.5px;color:var(--ink-3);margin-top:10px;">🎬 配套视频：${esc(clean(q.video))}</div>`:""}
  `;
  $("#modal").classList.add("show");
  // 弹窗内知识点点击
  $("#modalBody").querySelectorAll("[data-kp]").forEach(el=>el.onclick=()=>{
    $("#modal").classList.remove("show");
    state.kp=el.dataset.kp;state.subjectCtx=el.dataset.subCtx||"";state.view="kp";state.search="";render();
  });
  $("#modalBody").querySelector("[data-close]").onclick=()=>$("#modal").classList.remove("show");
}
$("#modal").addEventListener("click",e=>{if(e.target.id==="modal")$("#modal").classList.remove("show");});

/* ===================== 启动 ===================== */
updateFavCount();
render();
</script>
</body>
</html>
