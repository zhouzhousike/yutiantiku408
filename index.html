window.QUESTIONS = [{"id":"d_ds_1","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第1章 绪论","num":1,"date":"2026-05-06","stem":"下列程序段的时间复杂度是（ ） count = 0; for(k = 1;k<=n;k*=2) for(j = 1;j<=k;j++) count++;","options":{"A":"O(log2n)","B":"O(n1/2)","C":"O(n)","D":"O(nlog2n)"},"answer":["C"],"analysis":"整个程序段最深层循环中的语句是 count++，它被重复执行的次数直接决定了程序的时间开销。从最外层开始，k的取值依次为：1、2、22、23、......、2i。若此时外层循环停止，则需满足2i ≤ n < 2i+1。取对数，可知i的数量级即为log₂n，由于内层循环j执行的次数即为k，故count执行次数总和约为1 + 2 + 22 + 23 +......+ 2i = 2i+1 – 1次，将i代入即可得次数约为2n-1。","kps":["第1章 绪论","算法与算法评价","时间复杂度"],"video":"day01第一题|时间复杂度的计算方法讲解"},{"id":"d_ds_2","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第1章 绪论","num":2,"date":"2026-05-06","stem":"以下属于逻辑结构的是（ ）","options":{"A":"顺序表","B":"哈希表","C":"有序表","D":"单链表"},"answer":["C"],"analysis":"数据的逻辑结构指的是数据元素之间抽象的逻辑关系，与数据在计算机中如何存储无关。常见的有线性结构（线性表、栈、队列等），树形结构（一般树，二叉树等），图状结构（有向图、无向图）等。\n数据的存储结构指的是数据结构在计算机内存中的实际存放形式，是实现逻辑结构的具体方式。主要有顺序存储，链式存储，索引存储，散列存储四种。\nA、B、D选项均蕴含了数据的实际存放形式，故是存储结构，而C选项仅强调有序，和具体实现无关。","kps":["第1章 绪论","数据结构的三要素","逻辑结构"],"video":"day01第二题|数据结构的三要素讲解"},{"id":"d_ds_3","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第2章 线性表","num":3,"date":"2026-05-07","stem":"设一个链表最常用的操作是在末尾插入节点和删除尾节点，则选用（ ）最节省时间。","options":{"A":"单链表","B":"单循环链表","C":"带尾指针的单循环链表","D":"带头节点的双循环链表"},"answer":["D"],"analysis":"末尾插入节点需要先找到尾节点的位置，删除尾节点需要找到尾节点的前驱节点。\nA选项，单链表只有指向第一个节点的头指针，每个节点只有指向后继的指针。故找到尾节点需要O(n)的时间复杂度，排除A。\nB选项，单循环链表在单链表基础上，仅让尾节点的后继指针指回头节点，形成一个环，由于默认只含有头指针，故找到尾节点依然需要O(n)的时间复杂度，排除B。\nC选项，带尾指针的单循环链表在单循环链表的基础上，多加了一个指针指向尾节点，但是若想删除尾节点，需要找到尾节点的前驱，由于是单循环链表，无法向前搜索，故依然需要O(n)的时间复杂度，排除C。\nD选项，带头指针的双循环链表不仅增加了前驱指针，同时由于循环性质，能直接找到尾节点及其前驱，故在末尾插入节点和删除尾节点时间复杂度都是O(1)。故选D。","kps":["第2章 线性表","单链表","链表的基本操作"],"video":"day02第一题|单链表，双链表，循环链表的结构与性质讲解"},{"id":"d_ds_4","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第2章 线性表","num":4,"date":"2026-05-07","stem":"静态链表中指针表示的是（ ）","options":{"A":"下一元素的地址","B":"下一元素在数组中的位置","C":"内存储器的地址","D":"左链或右链指向的元素的地址"},"answer":["B"],"analysis":"静态链表是一个结构体数组，每个数组的每个元素就是一个节点，包含两部分：data（数据域），next（游标或链域）。next存储的的不是真实的内存地址，而是下一个节点在这个数组中的下标值。故选B。","kps":["第2章 线性表","静态链表","静态链表的概念"],"video":"day02第二题|静态链表的基本概念讲解"},{"id":"d_ds_5","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第2章 线性表","num":5,"date":"2026-05-08","stem":"从一个长度为n的顺序表中删除第i（1≤i≤n）个元素时，需向前移动（ ）个元素。","options":{"A":"n-i","B":"n-i+1","C":"n-i-1","D":"i"},"answer":["A"],"analysis":"1、特值法。设i=n，则无需移动元素，排除BCD，选A。\n        2、常规方法。第i个元素后面还剩n-i个元素，每个元素都要向前移动一个位置，因此需要移动元素的个数为n-i。选A","kps":["第2章 线性表","顺序表","顺序表的基本操作"],"video":"day03第一题|顺序表的定义与存储特点讲解"},{"id":"d_ds_6","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第2章 线性表","num":6,"date":"2026-05-08","stem":"设单循环链表中节点的结构为（data，next），且rear是指向非空的带头节点的单循环链表的尾节点的指针。若要删除链表的第一个节点，正确的操作是（ ）","options":{"A":"s = rear; rear = rear->next; free(s);","B":"rear = rear->next; free(s);","C":"rear = rear->next->next; free(s);","D":"s = rear->next->next; rear->next->next = s->next; free(s);"},"answer":["D"],"analysis":"需要区分头节点与第一个节点。头节点不存放真实数据，它位于链表的最前端。其地址保存在尾节点的 next 域中，因为链表是循环的，所以 rear->next 就是头节点。第一个节点是指第一个包含真实数据的节点，由于有头节点存在，这个节点实际上是头节点的后继，即它的地址保存在头节点的 next 域中。因此，first = rear->next->next。将含义代入选项中画图分析，选D。\n\n(s = rear->next->next)\n\n(rear->next->next = s->next)\n\n(free(s))","kps":["第2章 线性表","循环链表","链表的基本操作"],"video":"day03第二题|单链表，双链表，循环链表的结构与性质讲解"},{"id":"d_ds_7","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第3章 栈和队列","num":7,"date":"2026-05-09","stem":"一个栈的入栈序列为","options":{"A":"ABCDE","B":"EDCBA","C":"DECBA","D":"DCEAB"},"answer":["D"],"analysis":"栈是一种后进先出（LIFO）的数据结构，在任何时刻，最后被压入栈的元素会最先被弹出。\nA选项，按照每个元素入栈后立刻弹出的顺序依次入栈出栈即可。\nB选项，将ABCDE全部入栈再依次弹出即可。\nC选项，入栈ABCD，出栈D，入栈E，出栈E，出栈CBA即可。\nD选项，由于第一个出栈为D，故此时ABC必然按顺序在栈中，那么出栈的时候B必然在A的前面，故D不可能。","kps":["第3章 栈和队列","栈","栈的性质与出栈序列"],"video":"day04第一题|栈的定义与核心特性讲解"},{"id":"d_ds_8","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第3章 栈和队列","num":8,"date":"2026-05-09","stem":"表达式a*(b+c)-d的后缀表达式是（ ）","options":{"A":"abcd*+-","B":"abc+*d-","C":"abc*+d-","D":"-+*abcd"},"answer":["B"],"analysis":"中缀表达式转后缀表达式步骤简要回顾：\n1.操作数（a, b, c, d）：直接按顺序写出。\n2.运算符正优先级：乘 = 除 > 加 = 减。\n3.括号：遇到左括号直接压栈，遇到右括号时，把栈中左括号之上的运算符全部弹出写出，并且同时消去这对左右括号（括号不输出）。\n4.遇到一个运算符，要先看栈顶的运算符，如果栈顶的运算符优先级大于或等于当前的运算符，我们就把栈顶运算符弹出写出。重复此操作，直到栈顶不是运算符（左括号或者为空），或者栈顶的运算符优先级小于该运算符，停止弹出。然后再把新的运算符压栈。\n5.最后把栈里剩下的运算符依次弹出写出。\n故选B","kps":["第3章 栈和队列","栈的应用","中缀转后缀表达式"],"video":"day04第二题|表达式的三种表示形式讲解"},{"id":"d_ds_9","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第3章 栈和队列","num":9,"date":"2026-05-11","stem":"利用栈求表达式的值时，设立操作数栈OPND。设OPND只有两个存储单元，在下列表达式中，不发生上溢的是（ ）","options":{"A":"A-B*(C-D)","B":"(A-B)*C-D","C":"(A-B*C)-D","D":"(A-B)*(C-D)"},"answer":["B"],"analysis":"需要注意题干为由中缀直接算出表达式的值，而非中缀表达式转后缀表达式。 \nA、C选项，由于乘号的优先级大于减号，故不会计算A-B。当扫描到C时，此时OPND里已有A、B两个操作数，故将C加入时OPND发生上溢。\nD选项，扫描到“)”时计算A-B并将其结果压入OPND，扫描到D时，OPND里已有A-B、C两个操作数，故将D加入时OPND发生上溢。 \nB选项，扫描到“)”时计算A-B并将其结果压入OPND，扫描到“-”，计算(A-B)*C并将其结果压入OPND，最后计算(A-B)*C-D，不会发生溢出。","kps":["第3章 栈和队列","栈的应用","表达式求值（双栈法）"],"video":"day05第一题|中缀表达式求值的基本过程（双栈法）讲解"},{"id":"d_ds_10","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第3章 栈和队列","num":10,"date":"2026-05-11","stem":"用一个栈求下列后缀表达式的值， 8 2 3 ^ / 2 3 * + 5 1 * - 其中：+、-、*、/、^分别是加、减、乘、除、幂运算符，当扫描到第一个*时，栈顶部2个元素是（ ）。","options":{"A":"6, 1","B":"5, 7","C":"3, 2","D":"1, 5"},"answer":["C"],"analysis":"由后缀表达式求值需要设置一个操作数栈。 从左到右扫描，遇到操作数就压入栈；遇到运算符，就从栈中连续弹出两个操作数执行运算，再把结果压回栈里。需要注意，由于栈是后进先出，先弹出的是右操作数，后弹出的是左操作数。因此运算过程为8入栈、2入栈、3入栈、遇到^，3出栈、2出栈、计算2^3 = 8、8入栈、遇到/，8出栈、8出栈、计算8/8=1、1入栈、2入栈、3入栈、扫描到*，此时栈顶的两个元素分别是3和2。","kps":["第3章 栈和队列","栈的应用","后缀表达式求值"],"video":"day05第二题|中缀表达式求值的基本过程（双栈法）讲解"},{"id":"d_ds_11","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第3章 栈和队列","num":11,"date":"2026-05-12","stem":"实现时需使用队列的运算是（ ）","options":{"A":"递归","B":"二叉树的中序遍历","C":"图的深度优先搜索","D":"二叉树的层序遍历"},"answer":["D"],"analysis":"队列是一种先进先出的线性表，先进入队列的元素先被处理。在算法中，当我们需要按层、按顺序逐层展开时，通常用队列。\nA.选项，递归函数的调用过程，本质是函数调用栈的工作方式。每次递归调用，都会把当前层的局部变量、返回地址等压入系统栈；递归返回时，从栈顶弹出恢复现场。\nB选项，二叉树的中序遍历有递归和非递归两种实现。递归使用函数调用栈，非递归实现时，需要显式地使用一个栈来暂存经过的节点，整个过程也是后进先出。\nC选项，DFS 与二叉树遍历相似，有递归和非递归，均只涉及到栈结构。\nD选项，二叉树的层序遍历通常采用队列实现，故选D。","kps":["第3章 栈和队列","队列","队列的应用（层序遍历）"],"video":"day07第一题|队列的定义与基本特性讲解"},{"id":"d_ds_12","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第3章 栈和队列","num":12,"date":"2026-05-12","stem":"若以1234作为双端队列的输入序列，则既不能由输入受限的双端队列得到，也不能由输出受限的双端队列得到的输出序列是（ ）","options":{"A":"1234","B":"4123","C":"4231","D":"4213"},"answer":["C"],"analysis":"输入受限的双端队列：设左边可以入队和出队，右边只能出队；按照1、2、3、4依次从左边全部入队，再依次从右边出可以得到1234；1、2、3、4依次从左边全部入队，然后4左边出，1右边出，3左边出，2右边出可以得到4132；若4第一个出队，则1，2，3都已经入队，由于2在1和3中间，因此不可能得到4231和4213。\n输出受限的双端队列：设左边可以入队和出队，右边只能入队；按照1、2、3、4依次从右边全部入队，再依次从左边出可以得到1234；若4第一个出队，则1，2，3都已经入队，由于1和2排在3的前面，所以3不可能在1和2中间出队，因此不可能得到4123和4231；按照1左边进，2左边进，3右边进，4左边进，再依次从左边出可以得到4213。\n综上，只有C符合题意。","kps":["第3章 栈和队列","双端队列","双端队列的输出序列"],"video":"day06第一题|输入受限的双端队列输出序列特征讲解"},{"id":"d_ds_13","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第3章 栈和队列","num":13,"date":"2026-05-13","stem":"现有队列Q与栈S，初始时Q中的元素依次是1，2，3，4，5，6（1在队头），S为空。若仅允许下列三种操作：出队并输出出队元素、出队并将出队元素入栈、出栈并输出出栈元素，则不可能得到的输出序列是（ ）","options":{"A":"1，2，5，6，4，3","B":"2，3，4，5，6，1","C":"3，4，5，6，1，2","D":"6，5，4，3，2，1"},"answer":["C"],"analysis":"由于队列遵循先进先出，且队列Q中元素顺序已经给出，表面上来看这是一道队列+栈的混合输出题，但是仔细观察发现，出队并输出出队元素的操作其实就等同于出队并将出队元素入栈加上出栈并输出出栈元素。故题干可等价转换为已知入栈序列为1、2、3、4、5、6，求不可能的出栈序列。而C选项中，C第一个出栈，则1，2已经入栈，根据出栈规则，1不可能在2前面出栈。","kps":["第3章 栈和队列","栈与队列","栈与队列的混合操作"],"video":"day07第二题|混合结构的操作序列合法性分析讲解"},{"id":"d_ds_14","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第4章 串","num":14,"date":"2026-05-13","stem":"若串S = “software”，则其子串的数目是（ ）","options":{"A":"8","B":"37","C":"36","D":"9"},"answer":["B"],"analysis":"子串是指串中任意个连续的字符组成的子序列。s开头的子串有s、so、sof、soft、......、software，共8个，o开头的子串有o、of、oft、......、oftware，共七个，以此类推，共8+7+6+5+4+3+2+1 = 36，还有一个特殊的子串：空串，因此一共37个子串。","kps":["第4章 串","串的基本操作","子串"],"video":"day08第一题|子串的具体含义讲解"},{"id":"d_ds_15","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第4章 串","num":15,"date":"2026-05-14","stem":"串“aaab”的next数组为（ ）","options":{"A":"0123","B":"1123","C":"1231","D":"1211"},"answer":["A"],"analysis":"首先将next数组的第0位直接置为-1，第1位置为0（next数组从0开始），然后从第2位开始分别计算从头开始的前 j-1 个字符（j=3或4）组成的串的最长相等真前后缀长度（比如，”aaa”对应的next值应填入”aa”的最长相等真前后缀长度，”aaab”对应的next值应填入”aaa”的最长相等真前后缀长度），可得到next数组的值分别为-1,0,1,2。需要注意next数组有两种形式。就该题目而言，一种为-1,0,1,2（串下标从0开始），另一种为0,1,2,3（串下标从1开始，统一加1），故选A。","kps":["第4章 串","串的模式匹配","KMP算法（next数组）"],"video":"day08第二题|快速手算求kmp算法next数组、KMP算法核心思想和优势讲解"},{"id":"d_ds_16","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第4章 串","num":16,"date":"2026-05-14","stem":"已知字符串S为“abaabaabacacaabaabcc”，模式串t为“abaabc”，采用KMP算法进行匹配，第一次出现失配时，i=j=5，则下次开始匹配时，i和j的值分别是（ ）","options":{"A":"i = 1，j = 0","B":"i = 5，j = 0","C":"i = 5，j = 2","D":"i = 6，j = 2"},"answer":["C"],"analysis":"KMP算法中，主串指针 i 不回溯，只根据已匹配的信息，将模式串向右“滑动”适当距离，即发生失配时，i不变，j更新为子串中失配字符的next数值。子串中，字符c的next数值为2，因此选C。","kps":["第4章 串","串的模式匹配","KMP算法（失配处理）"],"video":"day09第一题|快速手算求kmp算法next数组、KMP算法核心思想和优势讲解"},{"id":"d_ds_17","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第2章 线性表","num":17,"date":"2026-05-15","stem":"稀疏矩阵的三元组存储方法（ ）","options":{"A":"实现转置运算很简单，只需要将每个三元组的行标和列标交换","B":"是一种链式存储方法","C":"对矩阵的非零元素个数和位置在操作过程中变化不大时较有效","D":"比十字链表更高效"},"answer":["C"],"analysis":"三元组表默认要求按行优先顺序排列。三元组存储方法实现转置运算除了要将每个三元组的行标和列标交换，还要按照行标进行排序，A错误；稀疏矩阵通常可采用三元组表存储或者十字链表存储。其中，三元组表存储方法采用的是顺序存储，而十字链表存储方法是链式存储。B错误；三元组表存储方法和十字链表法各有优缺点，D错误。","kps":["第2章 线性表","数组的压缩存储","三元组表"],"video":"27数据结构九讲 第5章 数组-上 51:10-结束"},{"id":"d_ds_18","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第2章 线性表","num":18,"date":"2026-05-15","stem":"有一个100*90的稀疏矩阵，非零元素有10个，设每个整型数占2B，则用三元组表示该矩阵时，所需的字节数是（ ）","options":{"A":"60","B":"66","C":"18000","D":"33"},"answer":["B"],"analysis":"存储一个非零元素需要3个整型数，占6B，10个元素共60B。由于三元组表只存放了非零元素的位置和值，如果不记录矩阵的行数和列数，就无法还原出原矩阵的形状。而记录非零元个数可以在遍历三元组表时知道到哪里结束。所以对三元组顺序表而言，还需要矩阵行数、列数、非零元素个数三个属性，占6B，共66B。","kps":["第2章 线性表","数组的压缩存储","三元组表"],"video":"day10第一题|稀疏矩阵的定义与存储动机、三元组顺序表的结构讲解"},{"id":"d_ds_19","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第2章 线性表","num":19,"date":"2026-05-16","stem":"设有一个12×12的对称矩阵M，将其上三角部分的元素M[i,j]（1≤i≤j≤12）按行优先存入C语言的一维数组N[0...144]中，元素M[6,6]在N中的下标是（ ）","options":{"A":"50","B":"51","C":"55","D":"66"},"answer":["A"],"analysis":"目标在第 6 行，且 i=6, j=6，是该行第一个上三角元素（因为上三角从 j=i 开始）。而前5行共存储了 12 + 11 + 10 + 9 + 8 = 50个元素，这50个元素在数组 N 中的下标是 0到 49，故M[6,6]在N中的下标为50。","kps":["第2章 线性表","数组的压缩存储","对称矩阵的压缩"],"video":"27数据结构九讲 第5章 数组-上 15:24-31:45"},{"id":"d_ds_20","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":20,"date":"2026-05-16","stem":"有关二叉树的下列说法中，正确的是（ ）","options":{"A":"二叉树的度为2","B":"一棵二叉树的度可以小于2","C":"二叉树中至少有一个节点的度为2","D":"二叉树中任何一个节点的度都为2"},"answer":["B"],"analysis":"区分二叉树与度为2的树。二叉树规定树中节点的度不能超过2，但并不一定要等于2，可以不存在度为2的节点，故ACD错误，B正确。","kps":["第5章 树与二叉树","二叉树的基本概念","二叉树的性质"],"video":"day11第一题|二叉树的定义与基本性质讲解"},{"id":"d_ds_21","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":21,"date":"2026-05-18","stem":"设树T的度为4，其中度为1，2，3，4的节点数分别为4，2，1，1，则T中的叶子节点数为（ ）","options":{"A":"5","B":"6","C":"7","D":"8"},"answer":["D"],"analysis":"设度为i的节点数为Ni，在一棵树中，节点总数 N 可以从“节点分类”角度求和，由于该树的度为4，故N = N0 + N1 + N2 + N3 + N4 。\n同时N也可以从“边的数量”角度来理解：\n1.树中除根节点外，每个节点都有一条边与其父节点相连，所以总节点数 = 总边数 + 1。\n2.总边数等于所有节点的度之和（因为每个节点贡献的边数等于它的度），即总边数 = 0×N0 + 1×N1 + 2×N2 + 3×N3 + 4×N4\n因此总节点数也可表示为：N = 0×N0 + 1×N1 + 2×N2 + 3×N3 + 4×N4 + 1 \n故有N1 + 2N2 + 3N3 + 4N4 + 1 = N0 + N1 + N2 + N3 + N4，解得N0 = N2+2N3+3N4+1，代入N2 = 2，N3 = 1，N4 = 1得N0 = 8。","kps":["第5章 树与二叉树","树的基本概念","节点的度与叶子数"],"video":"day11第二题|树的节点总数与度的关系讲解"},{"id":"d_ds_22","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":22,"date":"2026-05-18","stem":"以下说法中，（ ）是正确的。","options":{"A":"完全二叉树中，叶节点的双亲的左兄弟（如果存在）一定不是叶节点","B":"任何一棵二叉树，终端节点数为度为2的节点数减1","C":"二叉树不适合用顺序存储结构","D":"节点按层序编号的二叉树，第i个节点的左孩子（如果存在）的编号为2i"},"answer":["A"],"analysis":"完全二叉树有一个非常重要的特征：按层序编号是连续的，中间不能有空缺位置。如果某个节点有左兄弟，意味着这个节点不是父节点的第一个孩子。现在假设叶节点 x 的双亲为 p，p 有左兄弟 q。如果 q 是叶节点，那么 q 的孩子位置就是空的，而排在其后的 p 却有了孩子，这就破坏了完全二叉树的规则，A正确。终端节点就是叶节点。根据N0 = N2 + 1，终端节点数为度为2的节点数加1，B错误；完全二叉树和满二叉树适合用顺序存储结构，C错误；节点按层序从1开始编号的完全二叉树（包括满二叉树），第i个节点的左孩子（如果存在）的编号为2i，D错误。","kps":["第5章 树与二叉树","二叉树的性质","完全二叉树"],"video":"day12第一题|二叉树的定义与基本性质讲解"},{"id":"d_ds_23","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":23,"date":"2026-05-19","stem":"一棵完全二叉树上有1001个节点，其中叶节点的个数是（ ）","options":{"A":"250","B":"500","C":"254","D":"501"},"answer":["D"],"analysis":"一棵完全二叉树，除了最底层外，上面每一层都是满的，且最底层的节点都靠左连续排列，中间不能有空缺。这说明完全二叉树中，度为 1 的节点（即N1）最多只有 1 个（即某个节点只有左孩子没有右孩子的情况），而且只可能出现在最底层或倒数第二层的最右边。\n法1：节点数1001，因此该二叉树有10层，前9层有511个节点，第10层有1001-511 = 490个节点，第9层的叶子节点数为256-490/2 = 11，因此叶子节点数为11+490 = 501。\n法2：节点总数N=N0+N1+N2。由二叉树的核心公式N0 = N2 + 1，可得N = 2N0+N1-1。2N0恒为偶数，故由奇偶性可得N1=0，且N0=501。","kps":["第5章 树与二叉树","二叉树的性质","完全二叉树"],"video":"day12第二题|二叉树的定义与基本性质讲解"},{"id":"d_ds_24","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":24,"date":"2026-05-19","stem":"某二叉树的先序遍历序列为IJKLMNO，中序遍历序列为JLKINMO，则后序遍历序列是（ ）","options":{"A":"JLKMNOI","B":"LKNJOMI","C":"LKJNOMI","D":"LKNOJMI"},"answer":["C"],"analysis":"先序遍历按照根左右的顺序遍历树，中序遍历按照左根右的顺序遍历树，故由先序序列和中序序列可以唯一确定一棵二叉树。由于先序遍历的第一个节点是I，所以I是根节点，同时由I在中序遍历中的位置可知，JLK是I的左子树，NMO是I的右子树。再对每个子树进行同样的先先序确定根，再中序确定左右子树的方法，可构造出整棵树。最终根据后序遍历左右根的顺序即可得到后序遍历序列为LKJNOMI。","kps":["第5章 树与二叉树","二叉树的遍历","先序/中序/后序遍历"],"video":"27数据结构九讲 第6章 树与二叉树-2 57:48-01:10:33"},{"id":"d_ds_25","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":25,"date":"2026-05-20","stem":"一棵非空二叉树的先序序列和后序序列正好相反，当且仅当（ ）","options":{"A":"二叉树任意一节点都无左孩子","B":"二叉树任意一节点都无右孩子","C":"二叉树只有一个叶子节点","D":"二叉树只有一个根节点"},"answer":["C"],"analysis":"由于先序遍历按照根左右的顺序遍历，后序遍历按照左右根的顺序遍历，若存在某一个节点同时有左孩子和右孩子，由于左孩子的访问顺序不管在哪种遍历方式中都早于右孩子，所以不符合条件。故满足“先序与后序相反”的二叉树，必然是所有分支节点都只有一个孩子，即树中没有任何度为 2 的节点。此时整棵树只有一个叶子节点。","kps":["第5章 树与二叉树","二叉树的遍历","遍历序列的关系"],"video":"day13第二题|三种经典的深度优先遍历、二叉树先序与后序序列关系讲解"},{"id":"d_ds_26","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":26,"date":"2026-05-20","stem":"下述编码中（ ）不是前缀码。","options":{"A":"{00，01，10，11}","B":"{0，1，00，11}","C":"{0，10，110，111}","D":"{10，110，1110，1111}"},"answer":["B"],"analysis":"前缀码是指在一组编码中，任意一个编码都不是另一个编码的前缀。B选项中0是00的前缀，因此不是前缀码。","kps":["第5章 树与二叉树","哈夫曼树与编码","前缀码"],"video":"day14第一题|前缀码的二叉树判断法讲解"},{"id":"d_ds_27","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":27,"date":"2026-05-21","stem":"对n个互不相同的符号进行哈夫曼编码，若生成的哈夫曼编码共有115个节点，则n的值是（ ）","options":{"A":"56","B":"57","C":"58","D":"60"},"answer":["C"],"analysis":"给定 n 个互不相同的符号（权值），构造哈夫曼树的典型方法是：每次从集合中选出两个权值最小的根节点，合并成一棵新树（新根的权值为两者之和），重复选取合并，直到只剩下一棵树为止。每一次合并操作，会增加1个新节点作为两个孩子的双亲。从 n 棵树合并成1棵树，需要合并n-1次。因此n个互不相同的符号构造出的哈夫曼树共有2n-1个节点，由2n-1 = 115得，n=58。","kps":["第5章 树与二叉树","哈夫曼树与编码","哈夫曼树的性质"],"video":"day14第二题|哈夫曼树的结构特性讲解"},{"id":"d_ds_28","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":28,"date":"2026-05-21","stem":"若X是后序线索二叉树中的叶节点，且X存在左兄弟节点Y，则X的右线索指向的是（ ）","options":{"A":"X的父节点","B":"以Y为根的子树的最左下节点","C":"X的左兄弟节点Y","D":"以Y为根的子树的最右下节点"},"answer":["A"],"analysis":"普通二叉树的节点有左右孩子指针，但很多指针是空的（指向 NULL）。线索二叉树利用这些空指针，指向该节点在某种遍历序列中的前驱和后继，便于快速遍历。若节点没有左孩子，则左指针指向前驱；若没有右孩子，则右指针指向后继。由于X是后序线索二叉树中的叶节点且存在左兄弟节点，故X是其父节点的右孩子。根据后序遍历的左右根顺序，X的后继就是它的父节点。","kps":["第5章 树与二叉树","线索二叉树","线索二叉树的性质"],"video":"day15第一题|线索二叉树的基本概念讲解"},{"id":"d_ds_29","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":29,"date":"2026-05-22","stem":"将 ( 2, 1, 4, 5, 9, 3, 6, 7 ) 顺序插入一棵初始为空的 AVL 树。下列句子中哪句是错的？（ ）","options":{"A":"4 是根节点","B":"3 和 7 是兄弟","C":"2 和 6 是兄弟","D":"9 是 7 的父节点"},"answer":["B"],"analysis":"平衡二叉树（AVL树）是满足二叉树中任何一个节点的左右子树高度之差的绝对值不超过1的二叉树。向AVL树中插入新节点后，从插入位置向上回溯，找到第一个平衡因子变成+2或-2的节点A，然后根据新节点插入在A的哪一侧子树的哪一侧，分四种情况（LL、RR、LR、RL）旋转。插入过程如下图所示","kps":["第5章 树与二叉树","二叉搜索树与平衡树","AVL树的插入"],"video":"27数据结构九讲 第8章 查找-4-平衡二叉树 09:33-结束"},{"id":"d_ds_30","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第7章 图","num":30,"date":"2026-05-22","stem":"无向图G有23条边，度为4的顶点有5个，度为3的顶点有4个，其余都是度为2的顶点，则图G有（）个顶点。","options":{"A":"11","B":"12","C":"15","D":"16"},"answer":["D"],"analysis":"对于无向图，所有顶点的度数之和等于边数的两倍。所以图G的度数为23×2 = 46设度为2的顶点有x个，所有顶点度之和=5×4+4×3+x×2 = 46，解得x = 7，所以图G中共有5+4+7 = 16个顶点。","kps":["第6章 图","图的基本概念","度与边数的关系"],"video":"day16第一题|列方程解图相关问题讲解"},{"id":"d_ds_31","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第7章 图","num":31,"date":"2026-05-23","stem":"下列选项中，（ ）方法可以判断一个有向图中是否有环。","options":{"A":"广度优先遍历","B":"拓扑排序","C":"求最短路径","D":"求关键路径"},"answer":["B"],"analysis":"在有向图中，如果存在一条路径，从某个顶点出发，沿着有向边最终能回到该顶点自身，则称有向图中存在环。\nBFS（广度优先遍历）是从一个起点出发，按层次逐层访问邻接顶点。对于无向图，BFS可以通过检查是否遇到已访问且不是父节点的顶点来判断是否有环。但对于有向图，仅仅用BFS遍历所得到的关系，无法判断是否存在有向环。\n拓扑排序是将有向无环图（DAG）中所有顶点排成一个线性序列，使得图中任意一条从 u 到 v 的有向边，u 都在 v 之前。若拓扑排序算法执行结束，整个图中还存在没有访问过的顶点，则说明图中存在环。\n最短路径算法用于计算两顶点之间的最短距离，它们并不以判断环为目标。\n关键路径算法本身就假设图中无环。如果图中有环，关键路径算法无法进行。因此，求关键路径不能用来判断环，反而是要先确保无环才能应用。","kps":["第6章 图","图的应用","拓扑排序"],"video":"day16第二题|BFS与DFS在图遍历中的不同应用讲解"},{"id":"d_ds_32","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第7章 图","num":32,"date":"2026-05-23","stem":"n个顶点的无向图的邻接表最多有（ ）个边节点。","options":{"A":"n*n","B":"n(n-1)","C":"n(n+1)","D":"n(n-1)/2"},"answer":["B"],"analysis":"一个具有n个顶点的无向图，边数达到最大时为完全图。在完全图中，任意两个不同顶点之间都有边相连，因此边数为组合数 = n(n - 1) / 2。其对应的邻接表中，每条边存储两次，对应两个边节点，因此选B。","kps":["第6章 图","图的存储","邻接表"],"video":"day17第一题|图的邻接表存储结构讲解"},{"id":"d_ds_33","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第7章 图","num":33,"date":"2026-05-25","stem":"采用邻接表存储的图的深度优先遍历算法类似二叉树的（ ）算法","options":{"A":"前序遍历","B":"中序遍历","C":"后序遍历","D":"层序遍历"},"answer":["A"],"analysis":"以邻接表存储的图，从某一顶点 V 出发，深度优先遍历的过程是：先访问顶点 V，并标记为已访问。然后依次检查 V 的邻接表，对于每个邻接点 W，如果 W 未被访问过，则从 W 出发递归进行深度优先遍历。即：先访问当前顶点，然后立即深入到第一个未访问的邻接点，直到无路可走再回溯。而二叉树的前序遍历规则是：先访问根，然后进入左子树（第一个“邻接”子树），深入下去，回溯后再处理右子树。因此两者类似。","kps":["第6章 图","图的遍历","深度优先遍历（DFS）"],"video":"day17第二题|图的深度优先遍历（DFS）算法讲解"},{"id":"d_ds_34","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第7章 图","num":34,"date":"2026-05-25","stem":"下列选项中，不是下图深度优先搜索序列的是（ ）","options":{"A":"V1、V5、V4、V3、V2","B":"V1、V3、V2、V5、V4","C":"V1、V2、V5、V4、V3","D":"V1、V2、V3、V4、V5"},"answer":["D"],"analysis":"各选项均从V1出发。从起点 V1 开始，深度优先搜索的规则是：\n1.访问 V1，并标记已访问。\n2.从 V1 的邻接点中选一个未访问的顶点 w，立即从 w 开始递归进行 DFS。\n3.当 w 所在路径的所有顶点均被访问后（即回溯到 V1），再选 V1 的下一个未访问邻接点继续。\nD选项，V1 开始，选 V2，访问。此时 V2 有一个未访问的邻接点 V5。按照 DFS 规则，访问 V2 后必须立即处理 V5，即下一步只能是 V5。","kps":["第6章 图","图的遍历","深度优先遍历（DFS）"],"video":"day18第一题|DFS序列的性质与回溯时机讲解"},{"id":"d_ds_35","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第7章 图","num":35,"date":"2026-05-26","stem":"下列选项中，不是下图所示有向图的拓扑序列的是（ ）","options":{"A":"1，5，2，3，6，4","B":"5，1，2，6，3，4","C":"5，1，2，3，6，4","D":"5，2，1，6，3，4"},"answer":["D"],"analysis":"拓扑排序可以看作是一个不断“删除入度为 0 的顶点及从它出发的边”的过程：\n1.从图中选一个入度为 0 的顶点输出。\n2.在图中删除该顶点，以及以它为起点的所有有向边（即所有邻接顶点的入度减 1）。\n3.重复上述两步，直到所有顶点都被输出，或无法再找到入度为 0 的顶点（此时说明图中有环，无法继续）。\nD选项，若先输出5，则只有1入度为0，不可能输出2。","kps":["第6章 图","图的应用","拓扑排序"],"video":"day18第二题|拓扑排序的算法讲解"},{"id":"d_ds_36","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第7章 图","num":36,"date":"2026-05-26","stem":"下列关于最小生成树的叙述中，正确的是（ ） I.最小代价生成树的代价唯一 II.所有权值最小的边一定会出现在所有的生成树中 III.使用普里姆（Prim）算法从不同顶点开始得到的最小生成树一定相同 IV.使用普里姆（Prim）算法和克鲁斯卡尔（Kruskal）算法得到的最小生成树总不相同","options":{"A":"仅I","B":"仅II","C":"仅I、III","D":"仅II、IV"},"answer":["A"],"analysis":"最小生成树不一定唯一，但是其代价唯一，I正确；所有权值最小的边可能构成环，这时必然存在一些边不会全部出现在最小生成树中，II错误；当图中存在多条权值相同的边时，Prim算法从不同顶点出发得到的最小代价生成树可能也不相同，III错误；如果每条边的权值都不同，那不管用什么方法，得到的最小代价生成树都是一样的，IV错误。","kps":["第6章 图","图的应用","最小生成树"],"video":"day19第一题|最小生成树的代价唯一性讲解"},{"id":"d_ds_37","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第7章 图","num":37,"date":"2026-05-27","stem":"若G是一个具有36条边的非连通无向图，则G的顶点数至少是（ ）","options":{"A":"12","B":"11","C":"10","D":"9"},"answer":["C"],"analysis":"要让总顶点数最少，方法是：让绝大多数顶点构成一个边数尽可能多的连通分量（完全图），再用一个孤立顶点把整个图变成非连通图。设图G有n个顶点，由于有36条边，故可列得方程 ( n - 1)( n - 2)/2 = 36，解得n=10。","kps":["第6章 图","图的基本概念","连通性"],"video":"day19第一题|连通图与非连通图讲解"},{"id":"d_ds_38","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第8章 查找","num":38,"date":"2026-05-27","stem":"具有12个关键字的有序表，折半查找的平均查找长度（ ）","options":{"A":"3.1","B":"4","C":"2.5","D":"5"},"answer":["A"],"analysis":"折半查找针对有序顺序表，每次与区间中间位置的元素比较。对于长度为 n 的有序表，查找过程可以表示为一棵判定树，并且是一颗平衡的二叉搜索树，树中每个节点代表一个元素，节点的深度代表查找该元素所需的比较次数。\n对于 12 个关键字的有序表（不妨设为 1 ~ 12），判定树的构造过程如下：\n1.中间位置 mid = ⌊(1+12)/2⌋ = 6，因此根节点是 6。\n2.左半区间 [1,5] 的中间是 3；右半区间 [7,12] 的中间是 9。\n3.以此递归划分，直到区间长度为 1。\n所构造的判定树如下：\n\\\n因此平均长度为（1+2×2+4×3+5×4）/12 = 3.1（实际为3.0833333....）。","kps":["第7章 查找","折半查找","判定树与平均查找长度"],"video":"day20第一题|折半查找判定树的构造与性质讲解"},{"id":"d_ds_39","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第8章 查找","num":39,"date":"2026-05-28","stem":"折半查找过程所对应的判定树是一棵（ ）","options":{"A":"最小生成树","B":"平衡二叉树","C":"完全二叉树","D":"哈夫曼树"},"answer":["B"],"analysis":"折半查找（二分查找）是在有序顺序表上进行的。每次选取当前查找区间的中间位置的关键字，与目标值比较。若相等，查找成功；若目标值更小，则进入左半区间继续查找；若目标值更大，则进入右半区间继续查找。将整个查找过程中所有可能的关键字比较路径用树形结构表示出来，就是判定树。判定树是一棵二叉树，每个节点代表一个关键字。因为每次都是取中间位置，所以划分出的左、右子区间的长度最多相差 1。这决定了判定树是一棵平衡的二叉树。","kps":["第7章 查找","折半查找","判定树"],"video":"day20第二题|折半查找判定树的构造与性质讲解"},{"id":"d_ds_40","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第8章 查找","num":40,"date":"2026-05-28","stem":"当采用分块查找时，数据的组织方式为（ ）","options":{"A":"数据分成若干块，每块内数据有序","B":"数据分成若干块，每块内数据不必有序，但块间必须有序，每块内最大（或最小）的数据组成索引块","C":"数据分成若干块，每块内数据有序，每块内最大（或最小）的数据组成索引块","D":"数据分成若干块，每块（除最后一块外）种数据个数需相同"},"answer":["B"],"analysis":"分块查找又称索引顺序查找，它吸取了顺序查找和折半查找的优点。其数据组织分为两级：\n1.索引表：为每一块建立一个索引项，通常包含该块的最大关键字和该块的起始地址。\n2.查找表本身：被分成若干块（子表）。\n分块查找的过程：先在索引表中查找（顺序或折半），确定待查关键字可能在哪一块。再在对应的块内进行顺序查找。\n为了保证索引表能有效定位，块间必须有序，即前一块中所有关键字的最大值 ≤ 后一块中所有关键字的最小值。而块内数据不必有序，因为块内查找通常采用顺序查找。同时，实际应用中，为了平均查找长度较优，通常让每块元素个数大致相同，但这不是必须遵守的规则。","kps":["第7章 查找","分块查找","分块查找的组织"],"video":"day21第一题|块查找与顺序查找、折半查找的对比讲解"},{"id":"d_ds_41","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第8章 查找","num":41,"date":"2026-05-29","stem":"在构造哈希表方面，下面的说法（ ）是正确的。","options":{"A":"再散列在处理冲突时不会产生“聚集”","B":"散列表的装载因子越大，说明空间利用率越好，因此应使装载因子尽量大","C":"散列函数选的好可减少冲突现象","D":"对于任何具体关键字都不可能找到不产生冲突的散列函数"},"answer":["C"],"analysis":"再散列法（又称开放定址法）中的线性探测法是指当某地址发生冲突时，依次探测下一个位置，直到找到一个空闲位置为止。而这会导致原本不属于同一散列地址的元素被迫挤在一起，沿着探测路径形成连续的“聚集”区，A错误；装填因子α越大确实意味着空间利用率越好，但冲突的概率也急剧增大。因此，不是“越大越好”，而是要在时间和空间之间取得平衡，B错误；如果关键字集合是已知且固定的，则可以设计出一个散列函数，使得该集合中的每一个关键字都映射到不同的地址，不发生任何冲突。比如散列函数是单调函数，例如H(key) = a×key+b，则不会产生冲突，D错误。","kps":["第7章 查找","散列表","冲突处理方法"],"video":"day21第二题|冲突与冲突处理方法、同义词与冲突讲解"},{"id":"d_ds_42","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第8章 查找","num":42,"date":"2026-05-29","stem":"哈希表构建时采用线性探测法处理冲突，某关键字查找成功的情况下，所探测的多个位置上的关键字（ ）","options":{"A":"不一定都是同义词","B":"一定是同义词","C":"一定都不是同义词","D":"必然有序"},"answer":["A"],"analysis":"若两个不同的关键字 key1 和 key2 满足 H(key1) = H(key2)，则它们互为同义词。假设散列表长度为 10，散列函数 H(key) = key % 10。我们按照线性探测的处理冲突方法按顺序插入key1 = 10、key2 = 20、key3 = 1。可得key1，key2，key3分别存入位置0、1、2。此时查找关键字key2 = 20，初始映射到位置0，而此位置上的关键字10是同义词。再查找关键字1，初始映射到位置1，而此位置上的关键字20不是同义词。故选择A。","kps":["第7章 查找","散列表","冲突与同义词"],"video":"day22第一题|冲突与冲突处理方法、同义词与冲突讲解"},{"id":"d_ds_43","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第6章 树与二叉树","num":43,"date":"2026-05-30","stem":"若平衡二叉树高度为6，且所有非叶节点的平衡因子均为1，则该平衡二叉树的节点总数为（ ）","options":{"A":"12","B":"20","C":"32","D":"33"},"answer":["B"],"analysis":"由于该AVL树所有非叶节点的平衡因子均为1，这形成了一种递归的构造规律：若一棵满足条件的树高度为 h，则其左子树高度为 h-1，右子树高度为 h-2，且两棵子树也满足相同条件。由此可得高为h的所有非叶节点的平衡因子均为1的AVL树节点总数的递推公式：Nh= Nh-1 + Nh-2 + 1。这正是高为h的AVL树最少节点总数的递推公式。而N1 = 1，N2 = 2，故可得N6 = 20。示意图如下所示：","kps":["第5章 树与二叉树","二叉搜索树与平衡树","AVL树的定义"],"video":"day22第二题|平衡二叉树（AVL树）的定义讲解"},{"id":"d_ds_44","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第8章 查找","num":44,"date":"2026-05-30","stem":"下列关于m阶B树的说法错误的是（ ）","options":{"A":"根节点至多有m棵子树","B":"所有叶子都在同一层","C":"非叶节点至少有m/2（m为偶数）或m/2+1（m为奇数）棵子树","D":"根节点中的数据是有序的"},"answer":["C"],"analysis":"C选项即为B树定义中的⌈m/2⌉。但需要注意，这个公式仅对于“除根以外的非叶节点”是正确的。对于非空B树根节点来说，至少有两棵子树。","kps":["第7章 查找","B树与B+树","B树的定义"],"video":"day23第一题|阶B树的定义、B树的定义与阶数m讲解"},{"id":"d_ds_45","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第8章 查找","num":45,"date":"2026-06-01","stem":"一棵高度为2的5阶B树中，所含关键字最少是（ ）","options":{"A":"5","B":"7","C":"8","D":"14"},"answer":["A"],"analysis":"根据 B树定义，除根结点外的非叶结点，至少有 ⌈5/2⌉ = 3 棵子树，即至少包含 2 个关键字。根结点若不是叶子，至少有 2 棵子树，即至少包含 1 个关键字。故当根节点有1个关键字与2棵子树，2棵子树各有一个节点，而每个节点中有2个关键字时，总关键字数最少，为5个。","kps":["第7章 查找","B树与B+树","B树的阶与关键字"],"video":"day23第二题|阶B树的定义、B树的定义与阶数m讲解"},{"id":"d_ds_46","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第9章 排序","num":46,"date":"2026-06-01","stem":"对初始序列（8，3，9，11，2，1，4，7，5，10，6）进行希尔排序。若第一趟排序结果为（1，3，7，5，2，6，4，9，11，10，8），第二趟排序结果为（1，2，6，4，3，7，5，8，11，10，9），则两趟排序采用的增量依次是（ ）","options":{"A":"3，1","B":"3，2","C":"5，2","D":"5，3"},"answer":["D"],"analysis":"希尔排序每趟按某个增量将序列分组，对各组进行直接插入排序。通过观察初始序列与各趟结果之间元素的位置变化，可以反推出所用的增量。第一趟排序中，1从位置6移到位置1，8 从位置1移到位置 11，两者初始间隔为5，移动之后的距离相差也是5的倍数，将5代入验证可得成立。同理，第二趟3和2换了位置，相差距离为3，将3代入验证成立。","kps":["第8章 排序","希尔排序","希尔排序的过程"],"video":"day24第一题|希尔排序的基本原理讲解"},{"id":"d_ds_47","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第9章 排序","num":47,"date":"2026-06-02","stem":"下列算法中，（ ）每一趟都能选出一个元素放在其最终位置上，并且是不稳定的。","options":{"A":"冒泡排序","B":"希尔排序","C":"简单选择排序","D":"快速排序"},"answer":["C"],"analysis":"冒泡排序满足“每一趟都能选出一个元素放在其最终位置上”。但是，冒泡排序是稳定的排序算法，当相邻两元素相等时，不会交换它们，因此相同关键字的相对顺序保持不变。排除A。\n希尔排序通过增量分组进行排序。每趟排序只是让组内有序，并不保证任何一个元素到达最终位置。排除B。\n简单选择排序的第i趟从待排序序列中选出最小（或最大）的元素，与第i个位置的元素交换。满足“每一趟都能选出一个元素放在其最终位置上”。同时简单选择排序是不稳定的。C正确\n在408真题中，一趟排序≠一次划分。一次划分指的是对某个子集进行一次Partition，即将一个枢纽元素放到其最终位置上。而一趟排序指的是将上一趟划分的各个无序子表的枢纽元素放到其最终位置上。故一趟排序可能不止选出一个元素放在最终位置。排除D。","kps":["第8章 排序","排序的基本概念","排序的稳定性"],"video":"day24第一题|排序算法的稳定性讲解"},{"id":"d_ds_48","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第9章 排序","num":48,"date":"2026-06-02","stem":"已知序列25，13，10，12，9是大根堆，在序列尾部插入新元素18，将其再调整为大根堆，调整过程中元素之间进行的比较次数是（ ）","options":{"A":"1","B":"2","C":"4","D":"5"},"answer":["B"],"analysis":"初始大根堆、插入调整过程如下图所示：\n\n将18插入后，首先父节点10比较，违反了大根堆的定义，需要进行自底向上的调整，故交换。交换后18继续和父节点25比较，不需要交换，调整完成。共比较2次。","kps":["第8章 排序","堆排序","堆的调整"],"video":"day24第二题|排序算法的稳定性讲解"},{"id":"d_ds_49","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第9章 排序","num":49,"date":"2026-06-03","stem":"对序列{15，9，7，8，20，-1，4}进行排序，进行一趟后数据的排列变为{4，9，-1，8，20，7，15}，则采用的是（ ）排序。","options":{"A":"选择","B":"快速","C":"希尔","D":"冒泡"},"answer":["C"],"analysis":"简单选择排序的每一趟会在当前未排序序列中选出关键字最小（或最大）的元素，将其与未排序部分的第一个元素交换位置。所以排序后第一个元素应该是20或者-1。A错误。\n快速排序的第一趟划分会选一个枢轴元素，通过交换将序列分成两部分，左边所有元素≤枢轴，右边所有元素≥枢轴，枢轴到达最终位置。而题目中一趟后的序列不存在这样的枢轴元素。B错误。\n希尔排序的每一趟会将序列按某个增量 d 分组，对每组进行直接插入排序。当d=3时，满足题目序列。C正确。\n冒泡排序的每一趟会从前往后（或从后往前）依次比较相邻元素，若不满足顺序则交换，使当前未排序部分的最大（或最小）元素“冒泡”到一端。故20或-1应出现在两端。D错误。","kps":["第8章 排序","排序算法比较","根据一趟结果判断算法"],"video":"day25第一题|排序算法的稳定性讲解"},{"id":"d_ds_50","source":"daily","subject":"ds","subjectName":"数据结构","lecture":"第9章 排序","num":50,"date":"2026-06-03","stem":"有组记录的排序码为 { 46，69，56，28，30，84 }，采用快速排序（以位于最左位置的对象为基准）得到的第一次划分结果为（ ）","options":{"A":"{ 28,46,69,56,30,84 }","B":"{ 28,69,56,46,30,84 }","C":"{ 28,46,56,69,30,84 }","D":"{ 30,28,46,56,69,84 }"},"answer":["D"],"analysis":"初始状态：{ 46，69，56，28，30，84 }\n调整过程：\n{ 30，69，56，28，30，84 }\n{ 30，69，56，28，69，84 }\n{ 30，28，56，28，69，84 }\n{ 30，28，56，56，69，84 }\n{ 30，28，46，56，69，84 }","kps":["第8章 排序","交换排序","快速排序（划分）"],"video":"day25第二题|快速排序的划分（Partition）常见做法（升序）讲解"},{"id":"d_co_1","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第1章 计算机系统概述","num":1,"date":"2026-06-09","stem":"下列关于冯·诺依曼型计算机的描述，不正确的是（ ）。","options":{"A":"计算机硬件系统由运算器、存储器、控制器、输入设备、输出设备五大部件组成","B":"指令和数据在存储器中都是二进制码存储","C":"指令存储器和数据存储器独立分设在不同的存储器","D":"存储程序并按地址顺序执行是CPU自动工作的关键"},"answer":["C"],"analysis":"冯·诺依曼型计算机最根本的特征是“存储程序”概念。即，把要执行的程序（指令序列）和需要处理的数据，都以二进制形式预先存入同一个存储器中。CPU 工作时，按地址依次从该存储器中取出指令并执行，整个过程自动进行。这一思想直接决定了它的硬件组成和工作方式。故C选项错误。","kps":["第1章 计算机系统概述","计算机系统的组成","冯·诺依曼结构"],"video":"计算机组成原理·六讲 第1章 概述-1-计算机系统的基本组成和计算机语言 14:08-23:20"},{"id":"d_co_2","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第2章 数据的表示和运算","num":2,"date":"2026-06-09","stem":"下列数中最大的数是（ ）","options":{"A":"(10011001)2","B":"(227)8","C":"(98)16","D":"(152)10"},"answer":["A"],"analysis":"比较不同进制数的大小，最稳妥的方法是全部转为同一进制（通常选十进制），再比数值。A选项，二进制位权从右向左依次是 20，21，22……求和：128 + 0 + 0 + 16 + 8 + 0 + 0 + 1 = 153。B选项，八进制位权从右向左依次是 80，81，82……求和：128 + 16 + 7 = 151。C选项同理，求和：144 + 8 = 152。故A选项正确。","kps":["第2章 数据的表示和运算","数制与编码","进制转换"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-1-进制转换 04:02-23:33"},{"id":"d_co_3","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第2章 数据的表示和运算","num":3,"date":"2026-06-09","stem":"下列有关补码的描述中，正确的是（ ） I.在计算机中用来表示无符号数 II.0的表示形式唯一 III.符号位和数值位一起参与运算 IV.实现了加减法的统一 V.机器数的大小可以直观地反映真值的大小","options":{"A":"仅I、III、V","B":"仅I、II、III","C":"仅II、III、IV","D":"仅I、II、V"},"answer":["C"],"analysis":"补码是专门为有符号数设计的一种编码方式，目的是简化运算。无符号数根本不需要符号位，也就不存在“补码表示”这一说。描述 I 错误。补码相对于原码的一个重要改进就是0的表示唯一，消除了原码的二义性。描述 II 正确。补码运算规则即在做加法时，符号位和数值位被同等对待，一起送入ALU进行加法运算。描述 III 正确。利用补码，减法可以转化为加法：[A]补 - [B]补 = [A]补 + [-B]补。计算机里只需要一套加法器就能同时完成加法和减法。大大简化了运算器的设计。描述 IV 正确。补码中，负数的高位全是1，直接按位比较大小会出错。描述 V 错误。","kps":["第2章 数据的表示和运算","定点数的表示","补码"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-3-补码 00:00-14:30"},{"id":"d_co_4","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第2章 数据的表示和运算","num":4,"date":"2026-06-10","stem":"已知[X]补=0110 0011，则[-X]补等于（）。","options":{"A":"0001 1100","B":"1001 1100","C":"1001 1101","D":"以上都不是"},"answer":["C"],"analysis":"给出 [X]补 求 [-X]补的核心转换规则是：将 [X]补 的每一位（包括符号位）全部取反，然后在末位加 1。对 [X]补 取反后得到1001 1100，末位加1得到1001 1101。故选C。","kps":["第2章 数据的表示和运算","定点数的表示","补码运算"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-3-补码 05:20-12:19"},{"id":"d_co_5","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第2章 数据的表示和运算","num":5,"date":"2026-06-10","stem":"设X为定点小数，[X]补 = 1.x6x5x4x3x2x1x0，最高位为符号位，若要-1/2≤X＜-1/4，x6x5x4x3x2x1x0应该满足什么条件（ ）","options":{"A":"x6x5必须为10，x4～x0任意","B":"x6x5必须为01，x4～x0任意","C":"x6x5必须为10，x4～x0至少有一个是1","D":"x6x5必须为01，x4～x0至少有一个是1"},"answer":["A"],"analysis":"要-1/2≤X＜-1/4，则 |X| 需满足 1/4< |X|≤1/2，则 |X| 的原码需满足 0.01B​< ∣X∣ ≤0.10B​，故有两种情况：\n1、0.1000000，即x6=1, x5=0, x4∼x0全0。（满足等于1/2）\n2、0.01xxxxx ，x5=1，且x4~x0 不全为 0。（满足大于1/4且小于1/2）\n\n故X只需将其符号位改为1，即以下两种情况：\n1、[X]原 = 1.1000000\n2、[X]原 = 1.01... ， x5=1, x4~x0 至少一个 1。\n\n接下来将X由原码转为补码。\n第一种情况的[X]补 = 1.1000000\n第二种情况的[X]补 = 1.10xxxxx，且x4~x0 至少一个 1。\n故综上，x6x5必须为10，x4~x0任意，故选A","kps":["第2章 数据的表示和运算","定点数的表示","补码与取值范围"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-3-补码 00:00-23:18"},{"id":"d_co_6","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第2章 数据的表示和运算","num":6,"date":"2026-06-11","stem":"若寄存器内容为FCH，若它等于-4，则为（ ）。","options":{"A":"原码","B":"补码","C":"反码","D":"移码"},"answer":["B"],"analysis":"FCH 转换为 8 位二进制是：1111 1100。\nA选项，若为原码，则真值为-（0111 1100）= -124，排除。\nB选项，若为补码，则将其除符号位外按位取反，末位加1，得到原码为1000 0100，真值即为 -4\nC选项，若为反码，则将其除符号位外按位取反，得到原码为1000 0011，真值即为-3。\nD选项，若为移码，则将其视为无符号数，得到其值为252，再将其减去偏移量128，得到真值124。\n故选B。","kps":["第2章 数据的表示和运算","定点数的表示","机器数与真值"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-2-原码 00:00-10:39 + 第2章 数据的表示和运算-3-补码 05:20-08:51 +第2章 数据的表示和运算-4-反码和移码 00:00-02:06+08:34-15:08"},{"id":"d_co_7","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第2章 数据的表示和运算","num":7,"date":"2026-06-11","stem":"某8位计算机中，两个带符号整数变量x，y的机器数分别为34H、2DH，则x-2y的机器数以及溢出标志OF分别是（ ）","options":{"A":"8EH、0","B":"8EH、1","C":"DAH、0","D":"DAH、1"},"answer":["C"],"analysis":"题干说是8位计算机，故x = 34H = 0011 0100  y = 2DH = 0010 1101。在补码中，2y即将y进行算术左移一位，得到2y = 0101 1010 ，未超过表示范围。补码系统将减法转化为加法处理，故将2y的连同符号位按位取反加1，得到[-2y]补 = 1010 0110。故x-2y = x+ [-2y] = 0011 0100 + 1010 0110 =  1101 1010 = DAH。由于x的真值为52，y的真值为45。x-2y的真值为-38，处于8为补码的表示范围以内，故没有溢出，OF=0。故选C","kps":["第2章 数据的表示和运算","定点数的运算","溢出的判断"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-5-定点数的加减计算&加法器&移位运算 00:00-20:58"},{"id":"d_co_8","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第2章 数据的表示和运算","num":8,"date":"2026-06-12","stem":"已知float型变量用IEEE 754单精度浮点数格式表示。若float型变量x的机器数为8020 0000H，则x的值是（ ）","options":{"A":"-2-128","B":"-1.01*2-127","C":"-1.01*2-126","D":"非数（NaN）"},"answer":["A"],"analysis":"将机器数 8020 0000H 展开为二进制：1 00000000 01000000000000000000000 其中符号位为1，代表负数，阶码全0，尾数不全为0，所以是非规格化浮点数，无隐含位，真值公式为：x = (-1)^S × (0.M) × 2^-126故真值 = - (0.01B) × 2⁻¹²⁶ = -2⁻¹²⁸。故选A。","kps":["第2章 数据的表示和运算","浮点数的表示","IEEE 754单精度"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-8-IEEE754标准表示浮点数 16:58-26:42"},{"id":"d_co_9","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第2章 数据的表示和运算","num":9,"date":"2026-06-12","stem":"假定变量i、f和d的数据类型分别为int、float和double(int用补码表示，float和double分别用IEEE754单精度和双精度浮点数格式表示)，已知i=785，f=1.5678e3，d=1.5e100。若在32位机器中执行下列关系表达式，则结果为“真”的是（ ）。 (I)i==(int)(float)i (II)f==(float)(int)f (III)f==(float)(double)f (IV)(d+f)-d==f","options":{"A":"仅I和II","B":"仅I和III","C":"仅II和III","D":"仅III和IV"},"answer":["B"],"analysis":"这道题考察 C 语言中不同数据类型转换时的精度损失问题。\nI. float单精度浮点数的尾数有 24 位有效位（含隐含1），785在此范围内，可被float精确表示。(int)(float)i 再将这个float值转换回int，得到整数785。结果为“真”\nII. (int)f 将 float 转换为 int，因int型没有小数部分，数据会向0方向截断（仅保留整数部分），发生舍入，得到1567。(float)(int)f 再将int 转换回float。1567 在float可精确表示范围内，值为 1567.0。与原f不同，故结果不为“真”。\nIII. (double)f将float值1567.8转换为double型。由于double型的有效位数更多，因此能保留精确值。(float)(double)f 再将这个double转换回float。由于原始值就来自float，且double 表示的值就是该float所代表的确切数值，转换回来时必然精确得到原来的float。结果为“真”\nIV. d的阶码为100，而f的阶码仅为3。浮点数加减法要进行对阶操作。由于两者的阶码相差97，f的尾数需要右移97位，会导致在加法中被忽略，故d + f 的结果等于 d。于是 (d+f) - d = 0.0。故结果不为“真”。","kps":["第2章 数据的表示和运算","浮点数的表示","类型转换与精度"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-4-反码和移码 24:39-结束"},{"id":"d_co_10","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第2章 数据的表示和运算","num":10,"date":"2026-06-13","stem":"考虑下列C语言程序代码: int i=65535; short si=i; int j=si; 假定上述程序段在某32位机器上执行，sizeof(int)=4，则变量i、si和j的值分别是（ ）。","options":{"A":"65535、65535、65535","B":"65535、1、-1","C":"65535、-1、-1","D":"65535、-1、1"},"answer":["C"],"analysis":"sizeof(int)=4，即int为32位。故65535用32位补码表示为：0000 0000 0000 0000 1111 1111 1111 1111。将32位int赋值给16位short时，会发生截断：直接保留低16位，高 16位被丢弃。故si的机器数为：1111 1111 1111 1111。由于si是有符号数，故按照补码来解释。其真值为-1。\n将short类型（16位）转换给int类型（32位），属于有符号整数拓宽，遵循的规则为符号扩展，即用原数的符号位填充多出来的高位。故j的机器数为：1111 1111 1111 1111 1111 1111 1111 1111，其真值为-1。","kps":["第2章 数据的表示和运算","数据的截断与转换","有符号数的截断"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-4-反码和移码 24:39-结束"},{"id":"d_co_11","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第1章 计算机系统概述","num":11,"date":"2026-06-13","stem":"在按字节编址，采用小端方式的32位计算机中，按边界对齐方式为以下C语言结构型变量a分配存储空间。 struct record { short x1； int x2； } a； 若a的首地址为2020 FE00H，a的成员变量x2的机器数为1234 0000H，则其中34H所在存储单元的地址是( )。","options":{"A":"2020 FE03H","B":"2020 FE04H","C":"2020 FE05H","D":"2020 FE06H"},"answer":["D"],"analysis":"按边界对齐方式要求其数据存放的存储地址是自身大小的整数倍。例如short型数据的地址一定是2的整数倍，int型数据的地址一定是4的整数倍。a的首地址为2020 FE00H，第一个成员x1是 short 型，占2字节。因此x1占用地址 FE00H 和 FE01H。由于第二个成员x2是int型，故起始地址需为4的整数倍，因此需要在 x1 之后填充2个字节（地址 FE02H 和 FE03H），使 x2 从 FE04H 开始。故 x2 占用地址 FE04H、FE05H、FE06H、FE07H。\n小端方式是指数据在内存中先存储低位字节，后存储高位字节。字中的字节顺序和原序列的相反。将该数按字节从高到低拆分为：12H、34H、00H、00H。故最低有效字节 00H 存在 FE04H，次低字节 00H 存在 FE05H，次高字节 34H 存在 FE06H，最高字节 12H 存在 FE07H。选D。","kps":["第1章 计算机系统概述","数据的存储","内存对齐（边界对齐）"],"video":"计算机组成原理·六讲 第4章 指令系统-4-边界对齐&大小端&CISC和RISC 00:00-13:36"},{"id":"d_co_12","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第3章 存储器层次结构","num":12,"date":"2026-06-15","stem":"关于SRAM和DRAM的特点，以下选项中不正确的是（ ） I.SRAM不需要刷新，而DRAM需要刷新，因此DRAM的功耗更高 II.DRAM比SRAM集成度更高，因此读写速度也更快 III.SRAM是易失性存储器，而DRAM是非易失性存储器 IV.Cache由SRAM构成，主存由DRAM构成","options":{"A":"II、III、IV","B":"I、III、IV","C":"I、II、III","D":"全部"},"answer":["D"],"analysis":"I. SRAM 使用双稳态触发器存储信息，只要不掉电，信息就能稳定保持，不需要刷新。DRAM 使用电容存储电荷，电荷会泄漏，因此必须定时刷新。尽管 DRAM 需要刷新，但通常 SRAM 的功耗比 DRAM 更高，因为 SRAM 的存储单元（6 个晶体管）在静态时也有持续的电流，而 DRAM 的电容充放电功耗和刷新功耗平均下来相对较小。I错误\nII. DRAM 的存储单元通常只需 1 个晶体管和 1 个电容，比 SRAM 的 6 管单元简单得多，所以集成度更高，相同面积下容量更大。但DRAM的读写速度远慢于SRAM。II错误。\nIII.易失性指断电后数据丢失。SRAM和DRAM都属于易失性存储器，断电后存储的信息都会消失。III错误。\nIV. 现代计算机的主存的物理构成中除了DRAM外，还包括 ROM（只读存储器），用来固化系统启动程序。它在主存统一编址的地址空间中占有一定区域。IV错误。","kps":["第3章 存储器层次结构","半导体存储器","SRAM与DRAM"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-1-存储器基本概念 37:41-46:13-"},{"id":"d_co_13","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第3章 存储器层次结构","num":13,"date":"2026-06-15","stem":"下面有关存储器的说法哪一个是正确的? （ ）","options":{"A":"设置Cache的目的是扩大主存的容量,提高主存访问速度","B":"双端口存储器有左右两个独立的读写端口,是会发生冲突的","C":"程序可在辅助存储器中直接运行","D":"多体交叉存储器中,地址相邻的存储单元位于不同的存储体中"},"answer":["C"],"analysis":"Cache 的主要目的是解决CPU与主存之间的速度差异，通过存放主存中频繁访问的指令和数据的副本，提高 CPU 访问存储器的速度，它并不会扩大主存的容量。A错误。\n双端口存储器有两个独立的读写端口，允许两个控制器同时访问不同地址，从而提高并行性。若两个端口访问不同地址则无冲突，只有当两个端口同时访问同一存储单元（或同一地址）且至少有一个端口为读数据时，就会发生读写冲突（硬件需仲裁）。B错误。\n程序必须先加载到主存（RAM）中，由CPU通过内存地址读取指令执行。辅存仅作为长期存储和交换空间。C错误。\n多体交叉存储器一般指低位交叉编址。在这种组织方式下，连续的地址被依次分配到不同的存储模块中，每个存储器模块内的地址是不连续的，主存地址的划分与连续编址相反。D正确。","kps":["第3章 存储器层次结构","Cache存储器","Cache的作用"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-1-存储器基本概念 26:36-37:12 + 第3章 存储器层次结构-2-内存 43:29-50:04"},{"id":"d_co_14","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第3章 存储器层次结构","num":14,"date":"2026-06-16","stem":"假定用若干 16K×8位的存储器芯片组成一个64K×8位的存储器，芯片各单元交叉编址，则地址 BFFF 所在芯片的最小地址为（）。","options":{"A":"0000H","B":"0001H","C":"0002H","D":"0003H"},"answer":["D"],"analysis":"交叉编址指的是低位交叉编址。由于存储器总容量是单个存储器芯片容量的4倍，所以需要用最低2位作为芯片号，高14位作为片内地址。将 BFFFH 展开为 16 位二进制得到 1011 1111 1111 1111，最低2位是11，所以该地址位于 第 3 号芯片。令该芯片内的片内地址为全0，得到最小地址为0000 0000 0000 0011 = 0003H，选D。","kps":["第3章 存储器层次结构","主存的编址与扩容","多体交叉存储器"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-2-内存 32:20-52:34"},{"id":"d_co_15","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第3章 存储器层次结构","num":15,"date":"2026-06-16","stem":"假设主存按字节编址，Cache 共有64行，采用直接映射方式，主存块大小为32字节，所有编号都从0开始。现已知主存第3000号单元现在Cache中，那么其所在Cache的行号为（ ）。","options":{"A":"13","B":"26","C":"29","D":"58"},"answer":["C"],"analysis":"主存块大小为32字节，按字节编址，块内偏移需要 log₂32 = 5 位，在地址构成中位于最低位。Cache共有64行，直接映射方式下，行索引需要 log₂64 = 6 位，在地址构成中位于块内偏移的左侧。将3000转换为二进制：1011 1011 1000。故块内偏移为11000。中间6位011101是cache行号，计算得29，故选C。","kps":["第3章 存储器层次结构","Cache的映射方式","直接映射"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-5-直接映射 00:00-18:00"},{"id":"d_co_16","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第3章 存储器层次结构","num":16,"date":"2026-06-17","stem":"容量为64块的Cache采用组相联映射方式，字块大小为128个字，每4块为一组。如果主存为4K块，且按字编址，那么主存地址和主存标记的位数分别为( )。","options":{"A":"16，6","B":"17，6","C":"18，8","D":"19，8"},"answer":["D"],"analysis":"主存块数为4K块，1K = 1024，故4K = 4096块。每块字数为128个字，故主存总字数 = 4096 × 128 = 2¹² × 2⁷ = 2¹⁹ 字。由于按字编址，故主存地址需要19位。同时，由每块为128字可得块内偏移量为7位，cache容量为64块，每4块为一组，故总共有64/4 = 16组，需用4位存储。故按照组相联映射方式，剩下即为主存标记位，共有19-7-4=8位。故选D","kps":["第3章 存储器层次结构","Cache的映射方式","组相联映射"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-7-组相联映射 00:00-18:31"},{"id":"d_co_17","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第3章 存储器层次结构","num":17,"date":"2026-06-17","stem":"下述有关Cache与虚拟存储器的说法中错误的有（ ） I.一次访存中，页表不命中，则Cache一定也不命中 II.Cache不命中的损失要大于页表不命中的损失 III.Cache和TLB缺失后的处理都是由硬件完成 IV.虚拟存储器的容量可以大于主存和辅存的容量之和","options":{"A":"I和IV","B":"III和IV","C":"II和IV","D":"I、II和IV"},"answer":["I、III"],"analysis":"页表不命中（缺页） 代表要访问的指令或数据所在的页面不在主存中，需要从磁盘（辅存）调入。而Cache 是主存的缓存，存放的是主存中部分块的副本。如果页表不命中，说明数据根本不在主存，那么它也一定不在 Cache 中。因为数据必须先进入主存，才可能被调入 Cache。I正确。\nCache不命中说明数据在主存而不在Cache，需要从主存调入Cache（需要访问cache说明可以从页表或者TLB中找到数据的物理地址，故数据一定在主存里）。页表不命中（缺页）说明数据不在主存，需要从磁盘调入。从磁盘调入数据的时间比访问主存的时间要大几个数量级。因此，缺页的损失远大于Cache不命中。II错误\nCache的查找、缺失后的块替换与调入等操作，均由硬件自动完成，对程序员透明。TLB缺失后，硬件自动查找页表，若页表命中则自动更新TLB，整个过程由硬件完成。III正确。\n虚拟存储器不是指虚拟地址空间，而是指由主存-辅存层次构成的、实际在工作的虚拟存储系统。这个系统的总容量受限于物理硬件的实际大小，程序整个运行过程中，所有必须保存在物理介质上的数据，其总量不能超过实际拥有的主存+磁盘的总容量。IV错误。","kps":["第3章 存储器层次结构","虚拟存储器与Cache","TLB与Cache"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-11-页式虚拟存储器 01:15:14-01:23:38"},{"id":"d_co_18","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第3章 存储器层次结构","num":18,"date":"2026-06-18","stem":"假定编译器将赋值语句“x=x+3;”转换为指令“add xaddr, 3”，其中xaddr是x对应的存储单元地址。若执行该指令的计算机采用页式虚拟存储管理方式，并配有相应的 TLB，且 Cache 使用直写（Write Through）方式，则完成该指令功能需要访问主存的次数至少是（ ）","options":{"A":"0","B":"1","C":"2","D":"3"},"answer":["B"],"analysis":"由于题目要求是访问主存的最少次数，当TLB与Cache均命中时，从地址 xaddr 处读取变量x的当前值就无需问内存，而是可以直接从Cache中获得。 由于Cache使用直写（Write Through）方式，每次写访Cache时，必须同时把数据写入主存，以保证主存和 Cache 的一致性。所以在执行x+3后需要把更新后的x值写回内存，此时需要一次访存。故总访存次数 =读操作数(0) + 写结果(1) = 1 次。","kps":["第3章 存储器层次结构","Cache的写策略","写回与写直达"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-9-Cache替换算法和Cache写策略 09:14-16:15"},{"id":"d_co_19","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第4章 指令系统","num":19,"date":"2026-06-18","stem":"关于标志寄存器的叙述中，错误的是（ ）","options":{"A":"主要用于反映处理器的状态和ALU运算结果的某些特征","B":"不需要对标志寄存器进行编号","C":"标志寄存器对用户是完全透明的","D":"条件转移指令需要根据标志寄存器的值确定PC的值"},"answer":["C"],"analysis":"标志寄存器的核心作用就是保存ALU运算后的状态特征，如零标志ZF、进位标志CF、符号标志SF、溢出标志OF等，同时也包含一些处理器控制标志（如中断允许标志IF）。A正确。\n标志寄存器不同于通用寄存器（如 EAX、EBX），它不参与通用寄存器的编号寻址。在指令中，标志寄存器的访问是隐式的，由特定指令自动操作。B正确。\n在计算机系统中，\"对用户透明\"意味着用户完全感知不到它的存在，也无需关心它的状态，即用户不可见，如地址寄存器MAR、数据寄存器MDR。而“不透明”意味着程序员可按汇编语言（或机器语言）访问，如程序计数器PC。PSW对用户是可见且必须关心的，不是完全透明。C错误。\n条件转移指令的执行逻辑就是：检测标志寄存器中特定的一个或多个标志位，若条件成立，则修改程序计数器PC为目标地址；否则顺序执行下一条指令。D正确","kps":["第4章 指令系统","指令系统概述","标志寄存器"],"video":"计算机组成原理·六讲 第5章 中央处理器-1-CPU的功能和基本结构 04:50-12:22"},{"id":"d_co_20","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第4章 指令系统","num":20,"date":"2026-06-19","stem":"在指令格式中，采用扩展操作码设计的目的是（ ）","options":{"A":"减少指令长度","B":"增加指令长度","C":"保持指令长度不变而增加指令的数量","D":"保持指令长度不变而增加寻址空间"},"answer":["C"],"analysis":"在指令格式中，操作码和地址码共同占用指令字长。固定操作码格式下，操作码位数固定，可表示的指令条数就固定了。扩展操作码则是一种操作码长度可变的设计：当指令需要的地址字段较短时（如零地址或一地址指令），将原本属于地址字段的位借给操作码使用，从而增加可表示的指令数量。它的核心目的就是在保持指令字总长度不变的前提下，增加指令的总数，解决操作码位数不足的困境。故选C","kps":["第4章 指令系统","指令格式","扩展操作码"],"video":"计算机组成原理·六讲 第4章 指令系统-2-指令格式 8:44-13:04"},{"id":"d_co_21","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第4章 指令系统","num":21,"date":"2026-06-19","stem":"假设某指令的一个操作数采用变址寻址的寻址方式，变址寄存器中的值为1000H，地址1000H中的内容是0002H，指令中给出的形式地址是2022H，地址2022H的内容是2048H，那么该操作数的有效地址是（ ）。","options":{"A":"2050H","B":"3022H","C":"3048H","D":"204AH"},"answer":["B"],"analysis":"变址寻址的有效地址计算公式为：有效地址 (EA) = 变址寄存器 (IX) 的内容 + 指令中的形式地址 (A)。故1000H + 2022H = 3022H，选B。","kps":["第4章 指令系统","寻址方式","变址寻址"],"video":"计算机组成原理·六讲 第4章 指令系统-3-寻址方式 14:29-结束"},{"id":"d_co_22","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第4章 指令系统","num":22,"date":"2026-06-19","stem":"寄存器R1，R2均为16位，指令MOV R1，[R2]的功能是把内存数据送到R1中，R2的内容是1234H，内存中地址1234H的内容是56H，地址1235H的内容是78H，数据采用小端方式存储，则指令执行后R1的内容是（ ）","options":{"A":"5678H","B":"7856H","C":"8765H","D":"6578H"},"answer":["B"],"analysis":"指令 MOV R1, [R2] 的含义是：以寄存器R2中的值作为有效地址，从该地址开始读取数据，送入寄存器R1。数据采用小端方式存储，即低地址存放数据的低字节，高地址存放数据的高字节。故拼接后的16位数据为 78H（高字节）+ 56H（低字节） = 7856H。","kps":["第4章 指令系统","寻址方式","寄存器间接寻址"],"video":"计算机组成原理·六讲 第4章 指令系统-3-寻址方式 09:13-10:12 + 指令系统-4-边界对齐&大小端&CISC和RISC 00:00-13:36"},{"id":"d_co_23","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第4章 指令系统","num":23,"date":"2026-06-20","stem":"某指令系统指令字长为8位，每一地址码长3位，用扩展操作码技术。若指令系统具有两条二地址指令、10条零地址指令，则最多有（ ）条一地址指令。","options":{"A":"20","B":"14","C":"108","D":"6"},"answer":["B"],"analysis":"指令字长8位，每个地址码3位。故二地址指令中操作码占 8 - 3 - 3 = 2 位，可表示 4 种状态；一地址指令中操作码可扩展到 8 - 3 = 5 位；零地址指令操作码扩展到 8 位。由于指令系统有2条二地址指令，故剩余2个编码作为扩展标志，供一地址指令使用，使一地址指令可用 2 × 2³ = 16个编码。设一地址指令实际有 x 条，则留给零地址指令的扩展标志数为16 – x。由于零地址指令有10条，需要满足：8(16 - x) ≥ 10，故可解得x最多为14。","kps":["第4章 指令系统","指令格式","扩展操作码"],"video":"计算机组成原理·六讲 第4章 指令系统-2-指令格式 8:44-13:04 + 26:41-结束"},{"id":"d_co_24","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第1章 计算机系统概述","num":24,"date":"2026-06-20","stem":"数值数据和逻辑数据在形式上没有任何差别，计算机区分数值数据和逻辑数据的主要方法是（）。","options":{"A":"将数值数据和逻辑数据分开存放在不同的寄存器中","B":"在数据中用专门的标识位指出是数值数据还是逻辑数据","C":"用不同的指令操作码来区分本指令处理的是哪种数据","D":"用不同的时间段来区分当时处理的是哪种数据"},"answer":["C"],"analysis":"在计算机存储器（主存、寄存器）中，无论是数值数据（如整数、浮点数）还是逻辑数据（如布尔值、位掩码），都以二进制位串的形式存在。CPU在取指译码阶段，根据指令的操作码决定如何处理操作数。对于算术指令（如 ADD、SUB、MUL），会把操作数当作数值数据来处理，运算结果会触发进位标志 CF、溢出标志 OF 等；对于逻辑指令（如 AND、OR、XOR），会把操作数当作逻辑数据来处理，按位进行逻辑运算，并固定使CF=0、OF=0 等。故选C","kps":["第1章 计算机系统概述","冯·诺依曼结构","指令与数据的无差别性"],"video":"计算机组成原理·六讲"},{"id":"d_co_25","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第4章 指令系统","num":25,"date":"2026-06-22","stem":"下列关于RISC说法中，错误的是（ ）","options":{"A":"RISC普遍采用微程序控制器","B":"RISC大多数指令在一个时钟周期内完成","C":"RISC的内部通用寄存器数量相对CISC多","D":"RISC的指令数，寻址方式和指令合适种类相对CISC少"},"answer":["A"],"analysis":"RISC追求高速度、高执行效率，其指令功能简单、格式规整，适合用硬布线控制器（组合逻辑控制器） 实现，译码快，便于流水线。微程序控制器是CISC的典型特征。A错误。","kps":["第4章 指令系统","CISC与RISC","RISC的特征"],"video":"计算机组成原理·六讲 第4章 指令系统-4-边界对齐&大小端&CISC和RISC 27:23-33:05"},{"id":"d_co_26","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第5章 中央处理器","num":26,"date":"2026-06-22","stem":"流水线计算机中，下列语句发生的数据相关类型（ ）。 ADD R1，R2，R3:(R2)+(R3)→R1 ADD R4，R1，R5;(R1)+(R5)→R4","options":{"A":"写后写","B":"读后写","C":"写后读","D":"读后读"},"answer":["C"],"analysis":"ADD R1, R2, R3 这条指令会写入寄存器 R1，而ADD R4, R1, R5这条指令需要读取寄存器 R1 的值，构成“先写后读”的依赖关系。故选C","kps":["第5章 中央处理器","指令流水线","数据相关（数据冒险）"],"video":"计算机组成原理·六讲 第5章 中央处理器-7-指令流水线 28:15-35:58"},{"id":"d_co_27","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第5章 中央处理器","num":27,"date":"2026-06-23","stem":"某机共有70个微控制信号（即微命令)，构成6个互斥的微命令组，各组分别是8、11、3、16、7、25个微命令。如果采用字段直接编码方式，微指令的控制字段需要（）位。","options":{"A":"21","B":"22","C":"23","D":"25"},"answer":["C"],"analysis":"字段直接编码法中，每个字段还需要考虑一个nop状态，因此，每段需要编码的状态数 = 组内微命令数 + 1。故各组需要的状态数分别为9、12、4、17、8、26，分别需要4、4、2、5、3、5位，故控制字段总位数 = 4 + 4 + 2 + 5 + 3 + 5 = 23 位。","kps":["第5章 中央处理器","微程序控制器","微指令的编码"],"video":"计算机组成原理·六讲 第5章 中央处理器-4-微程序控制器 18:58-29:55"},{"id":"d_co_28","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第5章 中央处理器","num":28,"date":"2026-06-23","stem":"假定不采用Cache和指令预取技术，且机器处于“开中断”状态，则在下列有关指令执行的叙述中，错误的是（ ）。","options":{"A":"每个指令周期中CPU都至少访问内存一次","B":"每个指令周期一定大于或等于一个CPU时钟周期","C":"空操作指令的指令周期中任何寄存器的内容都不会被改变","D":"当前程序在每条指令执行结束时都可能被外部中断打断"},"answer":["C"],"analysis":"没有采用Cache和指令预取技术时，CPU要执行指令，第一步必须到内存中取指令。因此，每个指令周期至少包含一次访存取指操作。A正确。\nCPU 时钟周期是时序的最小单位。一个指令周期由若干个机器周期组成，每个机器周期又包含若干时钟周期。即使是最简单的单周期处理器，完成一条指令也至少需要一个时钟周期。B正确。\n对于空操作指令，CPU在取址后，程序计数器PC会自动“+1”，指向下一条指令的地址。C错误。\n在“开中断”状态下，CPU 在每条指令执行结束的时刻，都会采样中断请求线。如果有外部中断请求信号，且满足优先级等条件，CPU 就会响应中断，转去执行中断服务程序。因此，每条指令结束后都有可能被打断。D正确。","kps":["第5章 中央处理器","指令执行过程","指令周期"],"video":"计算机组成原理·六讲 第5章 中央处理器-2-指令的执行过程 00:00-07:11"},{"id":"d_co_29","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第5章 中央处理器","num":29,"date":"2026-06-24","stem":"下列关于CPU中的数据通路和控制器的叙述中,错误的是（ ）","options":{"A":"通用寄存器组中应该包含程序计数器","B":"控制器中一定包含指令操作码的译码电路","C":"单周期CPU中的控制器比多周期CPU中的更简单","D":"流水线CPU需解决数据相关和控制相关等冒险问题"},"answer":["A"],"analysis":"通用寄存器组是CPU中一组可被程序员直接访问的寄存器，用于暂存数据、地址或作为累加器、变址寄存器等，如x86的EAX、EBX、ECX、EDX等。程序计数器PC是一个专用寄存器，用于存放下一条将要执行的指令的地址，不包含在通用寄存器组内。A错误。\n控制器的核心任务之一就是译码。取指后，指令寄存器IR中的操作码字段必须经过译码电路，产生对应的控制信号序列，用来指挥运算器和数据通路完成指定操作。无论采用硬布线控制器还是微程序控制器，译码电路都是必不可少的部分。B正确。\n单周期CPU所有指令都在一个固定时钟周期内完成，控制信号在一个周期内一次性生成。其控制单元是一个纯组合逻辑电路，没有内部状态，设计相对直接。多周期CPU指令被分成若干步骤在不同周期完成，需要控制器记住当前处于哪个步骤，并依次发出对应的控制信号，因此需要控制器来管理时序和状态转换，复杂度明显高于单周期的组合逻辑。C正确。\n数据相关（冒险）是指后续指令需要用到前面指令尚未写回的结果（RAW等）；控制相关（冒险）是指因为转移指令执行顺序改变而引起的流水线阻塞。流水线 CPU 同时并行执行多条指令的不同阶段，这必然带来指令间的依赖冲突，需要解决冒险问题，D正确。","kps":["第5章 中央处理器","CPU的功能与结构","数据通路与寄存器"],"video":"计算机组成原理·六讲 第5章 中央处理器-7-指令流水线 04:24-11:17+24:04-24:43"},{"id":"d_co_30","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第5章 中央处理器","num":30,"date":"2026-06-24","stem":"下列关于单周期数据通路和多周期数据通路的说法中，正确的是（ ）","options":{"A":"单周期处理器的CPI总比多周期处理器的CPI大","B":"单周期处理器的时钟周期通常比多周期处理器的时钟周期短","C":"在一条指令执行过程中，单周期处理器中的每个控制信号取值一直不变，而多周期处理器中的控制信号可能会发生改变","D":"在一条指令执行过程中，单周期数据通路中和多周期数据通路中的每个部件都可使用多次"},"answer":["D"],"analysis":"CPI即每条指令平均需要的时钟周期数。单周期处理器的所有指令都在一个固定时钟周期内完成，故 CPI = 1。多周期处理器的不同指令被分解为不同数量的执行步骤，每个步骤占一个时钟周期。故 CPI > 1。A错误。\n单周期处理器的时钟周期必须容纳下最慢的那条指令的全部执行时间，这个时钟周期会非常长，严重限制了处理器主频。而多周期处理器把一条指令的执行切成多个时钟周期，每个时钟周期只完成一个相对简单的微操作，耗时远小于整条指令。B错误。\n单周期处理器的控制器是纯组合逻辑电路，在一条指令执行的这一个时钟周期内，输入（操作码）不变，组合逻辑产生的所有控制信号就维持恒定，多周期处理器的控制器需要依据当前处于指令的哪个阶段（状态）来输出不同的控制信号，在同一条指令的不同执行阶段，控制信号是动态变化的。C正确。\n单周期处理器中的一条指令在一个时钟周期内完成，这意味着一套硬件部件在一次指令执行中最多只能被用一次。D错误。","kps":["第5章 中央处理器","数据通路","单周期与多周期数据通路"],"video":"计算机组成原理·六讲 第5章 中央处理器-9-习题 16:58-19:58"},{"id":"d_co_31","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第5章 中央处理器","num":31,"date":"2026-06-25","stem":"在微程序控制方式中，由（ ）形成微程序的入口地址。","options":{"A":"机器指令的地址码","B":"机器指令的操作码","C":"微指令的微地址","D":"微指令的操作码"},"answer":["B"],"analysis":"微程序控制方式中，每一条机器指令都对应一段微程序（由若干条微指令组成），存放在控制存储器中。当CPU取出一条机器指令后，控制器首先要做的就是把这条机器指令的操作码转换为该指令对应微程序的入口地址，这个转换通常由一个专门的硬件——微地址形成部件完成。该部件接收操作码，通过查表或组合逻辑生成微程序入口地址，送入微地址寄存器，从而从控制存储器中读取第一条微指令。故选B。","kps":["第5章 中央处理器","微程序控制器","微程序的入口地址"],"video":"计算机组成原理·六讲 第5章 中央处理器-4-微程序控制器 07:55-08:41"},{"id":"d_co_32","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第5章 中央处理器","num":32,"date":"2026-06-25","stem":"下面有关微指令、指令和微程序、程序的说法中，正确的是()。","options":{"A":"每一条指令对应着一条微指令。","B":"每一条指令就是由一段微程序来解释执行的。","C":"程序就是由微程序构成的，指令就是由微指令构成的。","D":"程序是指令的有序集合，而指令是微程序的有序集合。"},"answer":["D"],"analysis":"程序由一系列机器指令组成，一条机器指令的功能由一段微程序解释，实现一段微程序由若干条微指令组成。A错误。\nCPU 将机器指令的操作码转换为一段微程序的入口地址，然后顺序执行该微程序中的各条微指令，通过它们的控制信号一步步完成指令功能。B正确。\n程序的上层是软件，它只能由同层次的指令构成，与硬件层的微程序无关。指令和微指令分属不同层次，是“解释”关系，不是“构成”关系。C错误。\n微程序是微指令的有序集合。微程序存在的目的是为了解释指令，而不是指令由微程序组成。D错误。","kps":["第5章 中央处理器","微程序控制器","微程序与机器指令"],"video":"计算机组成原理·六讲 第5章 中央处理器-4-微程序控制器 00:00-03:21"},{"id":"d_co_33","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第5章 中央处理器","num":33,"date":"2026-06-26","stem":"某计算机中，各种指令的CPI平均为8，CPU采用5级流水线方式执行指令，流水线每拍为2个时钟周期。执行程序A时，共执行2000条指令，此时流水线的加速比约为（ ）","options":{"A":"4","B":"5","C":"8","D":"10"},"answer":["A"],"analysis":"对于 k 级流水线，完成 n 条指令的总时间为：T = (k + n - 1) × 1拍时间。故采用流水线后的指令执行总时间为(5 + 2000 - 1) × 2T = 4008T。由于各种指令的CPI平均为8，故非流水线的执行总时间为2000 × 8T = 16000T。故加速比 S = 非流水线执行时间 / 流水线执行时间 = 16000T / 4008T ≈ 4。","kps":["第5章 中央处理器","指令流水线","流水线的性能（加速比）"],"video":"计算机组成原理·六讲 第5章 中央处理器-7-指令流水线 16:54-23:43"},{"id":"d_co_34","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第6章 输入/输出系统","num":34,"date":"2026-06-26","stem":"下列有关I/O接口的叙述中，错误的是（ ）","options":{"A":"状态端口和控制端口可以合用同一个寄存器","B":"I/O接口中CPU可访问的寄存器称为I/O端口","C":"采用独立编址方式时，I/O端口地址和主存地址可能相同","D":"采用统一编址方式时，CPU不能用访存指令访问I/O端口"},"answer":["D"],"analysis":"I/O 端口是指在I/O接口中能够被CPU直接读或写（通过地址译码选中）的寄存器，包括数据寄存器、状态寄存器和控制寄存器等。因为状态端口是读操作，控制端口是写操作，二者在操作方向上互斥，且在访问时间上也是错开的，因此，接口电路中可以让它们共用一个寄存器地址（即一个端口号）。A、B正确。\n根据编址方式的不同，I/O编址主要分为独立编址和统一编址。独立编址是指对所有的I/O端口进行编号，使它们成为一个独立的I/O地址空间，这个地址空间与主存地址空间相互独立、互不重叠，CPU需设置专门的I/O指令来访问端口。统一编址是指将I/O端口与主存存储单元进行统一编号，在这种方式下，不需要专门的I/O指令，所偶有能够访问主存的指令都可以用来访问I/O端口。C正确，D错误。","kps":["第7章 输入/输出系统","I/O接口","I/O编址方式"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-2-IO接口 全部"},{"id":"d_co_35","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第6章 输入/输出系统","num":35,"date":"2026-06-27","stem":"下列选项中，发生中断请求的条件有（ ）。 I.一条指令执行结束II.机器内部发生故障 III.一次I/O操作结束IV.一次DMA操作结束 V.每个机器周期结束","options":{"A":"仅I、II","B":"II、III、IV","C":"I、II、III","D":"仅IV、V"},"answer":["B"],"analysis":"中断请求指由硬件或软件事件触发，发出请求信号，让CPU知道有事情需要处理。这个请求可以在任何时候发生。中断响应是指CPU收到请求后，在满足条件时暂停当前程序，转去执行中断服务程序。I是响应中断的时机，而不是发生中断请求的条件。II、III、IV均是中断请求的条件。V只是CPU工作流程的一个节点，并不自动产生中断请求。故选B。","kps":["第7章 输入/输出系统","中断系统","中断的分类"],"video":"计算机组成原理·六讲 第5章 中央处理器-6-异常和中断机制 全部"},{"id":"d_co_36","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第6章 输入/输出系统","num":36,"date":"2026-06-27","stem":"某计算机有4级中断，其响应优先级从高到低分别为A>B>C>D。若要将中断处理优先级的顺序修改为C>A>D>B，则","options":{"A":"1111、1011、0011、0001","B":"1101、0100、1111、0101","C":"1101、1111、0001、1001","D":"1001、0001、1111、1101"},"answer":["B"],"analysis":"屏蔽字的每一位从高到低对应响应优先级顺序，即从左到右依次代表 A、B、C、D。某位为 1 表示屏蔽该中断，0 表示开放。C 的处理优先级最高，处理 C 时，不允许被任何其他中断打断，因此必须屏蔽所有其他中断及自身。故C的屏蔽字为1111。A 的处理优先级次高，处理 A 时，只有比它更高的 C 可以打断，因此需屏蔽 A 自身、D、B，开放 C。故A的中断屏蔽字为1101。其余同理，故选B。","kps":["第7章 输入/输出系统","中断系统","中断优先级与屏蔽"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-3-程序查询方式和中断方式 29:12-33:49"},{"id":"d_co_37","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第6章 输入/输出系统","num":37,"date":"2026-06-29","stem":"下列有关中断I/O方式和DMA方式比较的叙述中，不正确的是（ ）。","options":{"A":"中断I/O方式请求的是CPU处理时间，DMA方式请求的是总线使用权","B":"中断响应发生在一条指令执行结束后，DMA响应发生在一个总线事务完成后","C":"中断I/O方式下数据传送通过软件完成，DMA方式下数据传送由硬件完成","D":"中断I/O方式适用于所有外部设备，DMA方式仅适用于快速外部设备"},"answer":["D"],"analysis":"中断I/O方式适用于慢速或中低速外设（如键盘、鼠标、打印机等）。这些设备数据率低，CPU有足够时间在两次中断之间处理其他任务。对于高速外设（如磁盘、固态硬盘），若采用中断方式，每次传送一个字节或一个字就产生一次中断，CPU会被频繁打断，大量时间耗费在保存和恢复现场上，效率极低，甚至可能来不及响应导致数据丢失。因此，中断方式不适用于高速外设。同时，多路型DMA控制器也适合同时为多个慢速外设服务。D错误。其余选项正确。","kps":["第7章 输入/输出系统","I/O方式比较","中断与DMA的比较"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-4-DMA方式 00:00-13:12"},{"id":"d_co_38","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第6章 输入/输出系统","num":38,"date":"2026-06-29","stem":"某设备以中断方式与CPU进行数据交换，CPU主频为1GHz，设备接口的数据缓冲寄存器为32位，设备的数据传输率为50KB/s。若每次中断开销（包括中断响应和中断处理）为1000个时钟周期，则CPU用于该设备输入/输出的时间占整个CPU时间的百分比最多是（ ）","options":{"A":"1.25%","B":"2.5%","C":"5%","D":"12.5%"},"answer":["A"],"analysis":"设备每秒需要传送的总字节数为50000字节。每中断一次可以传送4字节，故每秒中断次数 = 总字节数 ÷ 每次传送字节数 = 12500次。每次中断消耗 1000 个时钟周期，则每秒用于中断的时钟周期数为12,500,000 个周期。故CPU用于该设备输入/输出的时间占整个CPU时间的百分比最多是12500000/1G = 1.25%","kps":["第7章 输入/输出系统","中断系统","中断方式的数据传送"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-3-程序查询方式和中断方式 04:12-13:49 + 第6章 总线和IO系统-5-习题 39:01-39:55"},{"id":"d_co_39","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第6章 输入/输出系统","num":39,"date":"2026-06-30","stem":"下列设备中，适合采用DMA输入输出的设备是（ ） Ⅰ键盘 Ⅱ网卡 Ⅲ固态硬盘 Ⅳ针式打印机","options":{"A":"Ⅰ、Ⅱ","B":"Ⅱ、Ⅲ","C":"Ⅱ、Ⅳ","D":"Ⅲ、Ⅳ"},"answer":["B"],"analysis":"DMA 适合高速、批量数据传送的外部设备，而低速、字符型设备通常用中断或程序查询方式。\n键盘是典型的慢速字符设备，SSD是典型的高速块设备。现代网卡（尤其千兆、万兆网卡）需要高速、连续地传送大量网络数据包，适合采用DMA方式。针式打印机是一种慢速字符输出设备，打印速度以字符每秒或行每分计算，数据率很低，不适合使用DMA。故选B。","kps":["第7章 输入/输出系统","DMA方式","DMA适用的设备"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-4-DMA方式 00:00-07:31"},{"id":"d_co_40","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第6章 输入/输出系统","num":40,"date":"2026-06-30","stem":"下列关于程序中断方式和DMA方式的表述中，正确的是（）。 I. 程序中断的优先级比DMA的优先级要高 II. 程序中断方式需要保护现场，而DMA方式不需要保护现场 III. 程序中断方式需要用到中断，而DMA方式不需要用到中断 IV. 两种方式都需要用到中断，但目的不同","options":{"A":"I、III","B":"II、III","C":"I、IV","D":"II、IV"},"answer":["D"],"analysis":"DMA优先级高于中断，I错误；程序中断需要保护现场，DMA方式不涉及CPU寄存器，无需保护现场，II正确；DMA方式在传输结束时也会触发中断通知CPU，III错误；程序中断用于数据传输，DMA中断用于报告传输完成，目的不同，IV正确，D正确。","kps":["第7章 输入/输出系统","I/O方式比较","程序中断与DMA的对比"],"video":""},{"id":"b_ds_1_第一讲 绪论","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第一章 绪论","num":1,"date":"","stem":"以下逻辑结构中哪一个属于非线性结构（ ）","options":{"A":"队列","B":"栈","C":"线性表","D":"二叉树"},"answer":["D"],"analysis":"","kps":["数据结构","第一讲 绪论"],"video":""},{"id":"b (function(){

  };
  const read = (k,def)=>{ try{const v=localStorage.getItem(k);return v==null?def:JSON.parse(v);}catch(e){return def;} };

  let fav = new Set(read(LS.fav,[]));

  const isWrong = id=>wrong.has(id);

    pList:[],

  const esc = s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const isFav = id=>fav.has(id);

  function chapterNum(s){
    if(!s) return 9999;
    let m=s.match(/第\s*(\d+)\s*章/); if(m) return parseInt(m[1],10);
    m=s.match(/第\s*([一二三四五六七八九十]+)\s*章/);
    if(m){ const map={一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10}; let v=0; for(const c of m[1]) v+=map[c]||0; return v; }
    return 9999;
  }
  function lecturesFor(subjKey, module){
    const out=[];
    Q.forEach(q=>{
      if(module==="daily" && q.source!=="daily") return;
      if(module==="bank" && q.source!=="bank500") return;
      if(module==="wrong" && !wrong.has(q.id)) return;
      if(module==="done" && !prog[q.id]) return;
      if(subjKey!=="all" && q.subject!==subjKey) return;
      if(q.lecture && !out.includes(q.lecture)) out.push(q.lecture);
    });
    return out.sort((a,b)=>chapterNum(a)-chapterNum(b));
  }

  function filtered(){
    const kw = state.search.trim().toLowerCase();
    return Q.filter(q=>{
      if(state.module==="daily" && q.source!=="daily") return false;
      if(state.module==="bank" && q.source!=="bank500") return false;
      if(state.module==="wrong" && !wrong.has(q.id)) return false;
      if(state.module==="done" && !prog[q.id]) return false;
      if(state.subject!=="all" && q.subject!==state.subject) return false;
      if(state.lecture!=="all" && q.lecture!==state.lecture) return false;
      if(kw){
        const hay=(q.stem+" "+(q.kps||[]).join(" ")+(q.lecture||"")).toLowerCase();
        if(!hay.includes(kw)) return false;
      }
      return true;
    });
  }

  // 进入刷题：按当前筛选快照本组题目（错题区会冻结本场，过程中不再重建/移位）
  function startPractice(){

    state.pIdx=0; state.revealed=false; state.selected=null;

  // 已练习列表（由 prog 记录派生，遵循当前 subject/lecture/search 筛选）
  function doneArr(){
    const kw=state.search.trim().toLowerCase();
    return Object.keys(prog).map(id=>Q.find(q=>q.id===id)).filter(Boolean).filter(q=>{
      if(state.subject!=="all" && q.subject!==state.subject) return false;
      if(state.lecture!=="all" && q.lecture!==state.lecture) return false;
      if(kw){ const hay=(q.stem+" "+(q.kps||[]).join(" ")+(q.lecture||"")).toLowerCase(); if(!hay.includes(kw)) return false; }
      return true;
    });
  }

  // ---------- render: stats ----------
  function renderStats(){
    const dCount = Q.filter(q=>q.source==="daily").length;
    const bCount = Q.filter(q=>q.source==="bank500").length;

    const okCount = Object.values(prog).filter(v=>v==="ok").length;

    const defs = [

      ["每日一题", dCount, "daily", "每日一题 · 点击进入刷题"],
      ["基础必刷", bCount, "bank", "基础必刷500题 · 点击进入刷题"],
      ["已练习", doneCount, "done", "已练习 · 点击查看"],
      ["错题", wrong.size, "wrong", "错题区 · 点击进入刷题"]
    ];
    $("#stats").innerHTML = defs.map(([l,n,mod,title])=>`

        <div class="n">${n}</div>
        ${mod==="done" && doneCount?`<div class="rate">正确率 ${rate}%</div>`:""}
        <div class="l">${l}</div>
      </div>`).join("");
    $("#footTotal").textContent = Q.length;
    $("#favCount").textContent = fav.size;
    $("#stats").querySelectorAll(".stat.clickable").forEach(s=>{
      s.onclick=()=>openModuleView(s.dataset.mod);
    });
  }

  // 点击统计块 -> 进入对应模块（刷题模式，已练习/错题特殊处理）
  function openModuleView(mod){
    $("#tabs").querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    if(["daily","bank","wrong"].includes(mod)){
      const tab=$(`#tabs .tab[data-mod="${mod}"]`);
      if(tab) tab.classList.add("active");
    }
    state.subject="all"; state.lecture="all"; state.search="";
    if(mod==="done"){
      state.module="done"; state.view="browse";
    } else if(mod==="wrong"){
      state.module="wrong"; state.view="practice";
    } else {
      state.module=mod; state.view="practice";
    }
    startPractice();
    renderControls(); renderMain(); renderStats();
  }

  // ---------- render: controls ----------
  function renderControls(){
    const c = $("#controls");
    c.innerHTML="";
    if(state.module==="real"){ return; }

    // view segmented（已练习模块仅浏览，不显示刷题切换）
    if(state.module!=="done"){
      const seg = el("div","seg");
      seg.innerHTML = `
        <button data-view="browse" class="${state.view==='browse'?'on':''}">🗂 浏览</button>
        <button data-view="practice" class="${state.view==='practice'?'on':''}">⚡ 刷题</button>`;
      seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{
        state.view=b.dataset.view;
        if(state.view==="practice"){ startPractice(); }
        renderControls(); renderMain();
      });
      c.appendChild(seg);
    }

    // subject chips
    const chips=el("div","chips");
    const allChip=el("button","chip"+(state.subject==="all"?" on":""),"全部");
    allChip.onclick=()=>setSubject("all");
    chips.appendChild(allChip);
    SUBJ.forEach(s=>{
      const inModule = state.module==="daily"?q=>q.source==="daily":state.module==="wrong"?q=>wrong.has(q.id):state.module==="done"?q=>!!prog[q.id]:q=>q.source==="bank500";
      const n=Q.filter(q=>inModule(q)&&q.subject===s.key).length;
      if(!n) return;
      const b=el("button","chip"+(state.subject===s.key?" on":""),s.name.replace("计算机组成与系统结构","计组").replace("操作系统","操作系统"));
      b.onclick=()=>setSubject(s.key);
      chips.appendChild(b);
    });
    c.appendChild(chips);

    // lecture select
    const lects = lecturesFor(state.subject, state.module);
    if(lects.length>1){
      const sel=el("select","sel");
      sel.innerHTML=`<option value="all">全部章节</option>`+lects.map(l=>`<option value="${esc(l)}" ${state.lecture===l?"selected":""}>${esc(l)}</option>`).join("");
      sel.onchange=()=>{ state.lecture=sel.value; if(state.view==="practice"){ startPractice(); } renderMain(); };
      c.appendChild(sel);
    }

    // search
    const sw=el("div","search");
    sw.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="searchInput" placeholder="搜索题干 / 知识点…" value="${esc(state.search)}"/>`;
    c.appendChild(sw);
    const inp=$("#searchInput",sw);
    inp.oninput=()=>{ state.search=inp.value;
      if(state.view==="practice"){ startPractice(); }
      renderMain(); };
  }

  function setSubject(k){
    state.subject=k; state.lecture="all";
    if(state.view==="practice"){ startPractice(); }
    renderControls(); renderMain();
  }

  // ---------- render: main ----------
  function renderMain(){
    const m=$("#main");
    m.innerHTML="";
    if(state.module==="real"){ m.appendChild(renderReal()); return; }
    if(state.module==="fav"){ renderFav(m); return; }
    if(state.module==="done"){ renderDone(m); return; }
    if(state.module==="wrong"){
      if(state.view==="practice"){
        // 关键：错题区刷题冻结本场列表，不再在此重建/移位，避免"题干与答案错位"
        if(!state.pList.length){ state.pList=filtered(); }
        if(state.pIdx >= state.pList.length) state.pIdx = Math.max(0, state.pList.length-1);
        const head=wrongHeadEl();
        if(head) m.appendChild(head);
        renderPractice(m);
        return;
      }
      renderWrong(m); return;
    }
    if(state.view==="practice"){ renderPractice(m); return; }
    renderBrowse(m);
  }

  // ---------- BROWSE ----------
  function renderBrowse(m){
    const list=filtered();
    const wrap=el("div","list");
    if(!list.length){ wrap.appendChild(el("div","fav-empty",`<div class="big">🔍</div><div>没有匹配的题目，换个筛选条件试试～</div>`)); m.appendChild(wrap); return; }
    list.forEach((q,i)=>wrap.appendChild(card(q,i)));
    m.appendChild(wrap);
    observeCards();
  }

  function card(q,i){
    const c=el("div","card");
    c.dataset.id=q.id;
    const head=el("div","card-head");
    head.innerHTML = badge("b-subj",q.subjectName)
      + (q.lecture?badge("b-lect",q.lecture):"")
      + (q.date?badge("b-date",q.date):"")
      + `<span class="b-num">No.${q.num}</span>`;
    const star=el("button","fav-star"+(isFav(q.id)?" on":""), isFav(q.id)?"★":"☆");
    star.title="收藏";
    star.onclick=()=>toggleFav(q.id,star);
    head.appendChild(star);
    c.appendChild(head);

    c.appendChild(el("div","stem",esc(q.stem)));
    const opts=el("div","opts");
    Object.keys(q.options||{}).sort().forEach(k=>{
      opts.appendChild(el("div","opt",`<span class="k">${k}</span><span>${esc(q.options[k])}</span>`));
    });
    c.appendChild(opts);

    const ans=el("div","analysis");
    const ansTxt=normAns(q.answer).join("、");
    ans.innerHTML=`<div class="ttl">✓ 正确答案：${esc(ansTxt)}</div><div class="body">${esc(q.analysis||"（暂无解析）")}</div>`
      + (q.kps&&q.kps.length?`<div class="kp-row">${q.kps.map(k=>`<span class="kp">${esc(k)}</span>`).join("")}</div>`:"");
    c.appendChild(ans);

    const acts=el("div","card-actions");
    const tog=el("button","btn","🔍 查看解析");
    tog.onclick=()=>{ const o=ans.classList.toggle("open"); tog.textContent=o?"收起解析":"🔍 查看解析"; };
    acts.appendChild(tog);
    c.appendChild(acts);
    return c;
  }

  function observeCards(){
    const cards=document.querySelectorAll(".card:not(.in)");
    if(typeof IntersectionObserver==="undefined"){
      cards.forEach(c=>c.classList.add("in")); return;
    }
    const io=new IntersectionObserver((ents)=>{
      ents.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} });
    },{threshold:.08, rootMargin:"0px 0px -40px 0px"});
    cards.forEach(c=>io.observe(c));
  }

  // ---------- PRACTICE ----------
  function renderPractice(m){
    const list = state.pList.length? state.pList : filtered();
    state.pList=list;
    if(!list.length){
      m.appendChild(el("div","empty-practice","⚡<br><br>当前筛选条件下没有题目，去调整一下筛选吧～"));
      return;
    }
    if(state.pIdx>=list.length) state.pIdx=list.length-1;
    if(state.pIdx<0) state.pIdx=0;
    const q=list[state.pIdx];

    const wrap=el("div","practice");
    // progress
    const pbar=el("div","pbar");
    const fillPct = list.length? Math.round((state.pIdx+1)/list.length*100):0;
    const doneInList = list.filter(x=>prog[x.id]).length;
    pbar.innerHTML=`<div class="track"><div class="fill" style="width:${fillPct}%"></div></div>
      <div class="ptxt">第 <b>${state.pIdx+1}</b>/${list.length} 题 · 本组已练 <b>${doneInList}</b></div>`;
    wrap.appendChild(pbar);

    const pc=el("div","pcard"); pc.id="pcard";
    const head=el("div","card-head");
    head.innerHTML = badge("b-subj",q.subjectName)
      + (q.lecture?badge("b-lect",q.lecture):"")
      + (q.date?badge("b-date",q.date):"")
      + `<span class="b-num">No.${q.num}</span>`;
    const star=el("button","fav-star"+(isFav(q.id)?" on":""), isFav(q.id)?"★":"☆");
    star.title="收藏"; star.onclick=()=>toggleFav(q.id,star);
    head.appendChild(star);
    pc.appendChild(head);
    pc.appendChild(el("div","pstem",esc(q.stem)));

    const opts=el("div","popts"); opts.id="popts";
    const correct=normAns(q.answer);
    Object.keys(q.options||{}).sort().forEach(k=>{
      const o=el("div","popt"); o.dataset.k=k;
      const st = state.revealed ? (correct.includes(k) ? '<span class="popt-status ok">✓</span>' : (state.selected===k ? '<span class="popt-status no">✗</span>' : '')) : '';
      o.innerHTML=`<span class="k">${k}</span><span>${esc(q.options[k])}</span>${st}`;
      if(!state.revealed){
        o.onclick=()=>selectOpt(k);
      }else{
        o.classList.add("locked");
        if(correct.includes(k)) o.classList.add("ok");
        if(state.selected===k && !correct.includes(k)) o.classList.add("no");
      }
      if(state.selected===k && !state.revealed) o.classList.add("sel");
      opts.appendChild(o);
    });
    pc.appendChild(opts);

    // result
    const res=el("div","presult"+(state.revealed?" open":"")); res.id="presult";
    if(state.revealed){
      const isOk = state.selected && correct.includes(state.selected);
      const verdict=el("div","verdict "+(isOk?"ok":"no"), isOk?"🎉 回答正确":"✗ 回答错误");
      res.appendChild(verdict);
      const ansTxt=correct.join("、");
      const block=el("div");
      block.innerHTML=`<div class="ttl" style="font-size:12.5px;font-weight:800;letter-spacing:1px;color:var(--accent);margin-bottom:7px">✓ 正确答案：${esc(ansTxt)}</div>
        <div class="body" style="font-size:14.5px;color:var(--text-2);line-height:1.8;white-space:pre-wrap">${esc(q.analysis||"（暂无解析）")}</div>`
        + (q.kps&&q.kps.length?`<div class="kp-row">${q.kps.map(k=>`<span class="kp">${esc(k)}</span>`).join("")}</div>`:"");
      res.appendChild(block);
    }
    pc.appendChild(res);

    // nav
    const nav=el("div","pnav");
    const prev=el("button","pnbtn","‹"); prev.title="上一题"; prev.disabled=state.pIdx<=0;
    prev.onclick=()=>goSlide(-1);
    const next=el("button","pnbtn","›"); next.title="下一题"; next.disabled=state.pIdx>=list.length-1;
    next.onclick=()=>goSlide(1);
    const grow=el("div","grow");
    if(!state.revealed){
      const rev=el("button","btn primary","✨ 揭晓答案");
      rev.style.width="100%"; rev.onclick=reveal;
      grow.appendChild(rev);
    }else{
      const again=el("button","btn accent","🔀 换一批/重做");
      again.onclick=()=>{ if(state.module==="wrong") state.wrongCelebrated=false; startPractice(); renderMain(); };
      grow.appendChild(again);
    }
    nav.appendChild(prev); nav.appendChild(grow); nav.appendChild(next);
    pc.appendChild(nav);

    wrap.appendChild(pc);
    m.appendChild(wrap);
  }

  function selectOpt(k){
    state.selected=k;
    document.querySelectorAll("#popts .popt").forEach(o=>{
      o.classList.toggle("sel", o.dataset.k===k);
    });
  }

  function reveal(){
    const q=state.pList[state.pIdx];
    if(!state.selected){ // nothing selected -> just show answer
      flashSelectHint(); return;
    }
    const correct=normAns(q.answer);
    const isOk = correct.includes(state.selected);
    prog[q.id]= isOk?"ok":"no"; write(LS.prog,prog);
    if(isOk){
      wrong.delete(q.id);
      // 记录最后一次答对来自哪个模块（错题区攻克单独标注）
      doneFrom[q.id]= state.module; write(LS.doneFrom,doneFrom);
    } else {
      wrong.add(q.id);
    }
    write(LS.wrong,[...wrong]);
    state.revealed=true;
    renderStats();
    renderControls();
    let celebrated=false;
    if(state.module==="wrong"){
      // 错题区：必须"本场全部作答正确"才弹恭喜（答对的题仍留在本场供回顾，list 不重建）
      if(!state.wrongCelebrated && state.pList.length && state.pList.every(x=>prog[x.id]==="ok")){
        celebrated=true; state.wrongCelebrated=true;
        celebrate("🎉","错题清空！","你已掌握全部错题，太强了");
      }
    } else if(state.pList.length && state.pIdx===state.pList.length-1){
      // 非错题区：揭晓本组最后一道 -> 恭喜通关
      celebrated=true;
      celebrate("🏆","恭喜通关！","你已完成本组全部 "+state.pList.length+" 道题目");
    }
    renderMain();
  }
  function flashSelectHint(){
    const pc=$("#pcard"); if(!pc) return;
    pc.animate([{transform:"translateX(0)"},{transform:"translateX(-7px)"},{transform:"translateX(7px)"},{transform:"translateX(0)"}],{duration:260});
  }

  function goSlide(dir){
    const list=state.pList;
    const ni=state.pIdx+dir;
    if(ni<0||ni>=list.length) return;
    state.pIdx=ni; state.revealed=false; state.selected=null;
    renderMain();
    const pc=$("#pcard");
    if(pc){ pc.classList.add(dir>0?"slide-next":"slide-prev"); }
  }

  // ---------- RANDOM ONE ----------
  let randState={q:null,selected:null,revealed:false};
  function openRandom(){
    randState={q:Q[Math.floor(Math.random()*Q.length)],selected:null,revealed:false};
    renderRandom();
    $("#modal").classList.add("show");
  }
  function closeRandom(){ $("#modal").classList.remove("show"); }
  function flashSelectHintModal(){
    const c=$("#modalCard"); if(c)c.animate([{transform:"translateX(0)"},{transform:"translateX(-7px)"},{transform:"translateX(7px)"},{transform:"translateX(0)"}],{duration:260});
  }
  function renderRandom(){
    const m=$("#modalCard"); const q=randState.q;
    const correct=normAns(q.answer);
    const favOn=isFav(q.id);
    m.innerHTML=`<button class="modal-close" id="modalClose">✕</button>
      <div class="card-head">${badge("b-subj",q.subjectName)}${q.lecture?badge("b-lect",q.lecture):""}${q.date?badge("b-date",q.date):""}<span class="b-num">No.${q.num}</span>
        <button class="fav-star${favOn?" on":""}" id="rFav">${favOn?"★":"☆"}</button></div>
      <div class="stem">${esc(q.stem)}</div>
      <div class="r-opts" id="rOpts"></div>
      <div class="r-result" id="rResult"></div>
      <div class="card-actions"><button class="btn" id="rNext">🔀 换一题</button></div>`;
    const ro=$("#rOpts",m);
    Object.keys(q.options||{}).sort().forEach(k=>{
      const o=el("div","r-opt"); o.dataset.k=k;
      const st = randState.revealed ? (correct.includes(k) ? '<span class="r-opt-status ok">✓</span>' : (randState.selected===k ? '<span class="r-opt-status no">✗</span>' : '')) : '';
      o.innerHTML=`<span class="k">${k}</span><span>${esc(q.options[k])}</span>${st}`;
      if(!randState.revealed){
        o.onclick=()=>{ randState.selected=k; ro.querySelectorAll(".r-opt").forEach(x=>x.classList.toggle("sel",x.dataset.k===k)); };
      }else{
        if(correct.includes(k)) o.classList.add("ok");
        else if(randState.selected===k) o.classList.add("no");
        else o.classList.add("locked");
      }
      ro.appendChild(o);
    });
    if(randState.revealed){
      const isOk=randState.selected&&correct.includes(randState.selected);
      const res=$("#rResult",m);
      res.innerHTML=`<div class="verdict ${isOk?"ok":"no"}" style="margin-bottom:12px">${isOk?"🎉 回答正确":"✗ 回答错误"}</div>
        <div class="ttl" style="font-size:12.5px;font-weight:800;letter-spacing:1px;color:var(--accent);margin-bottom:7px">✓ 正确答案：${esc(correct.join("、"))}</div>
        <div class="body" style="font-size:14.5px;color:var(--text-2);line-height:1.8;white-space:pre-wrap">${esc(q.analysis||"（暂无解析）")}</div>`
        + (q.kps&&q.kps.length?`<div class="kp-row">${q.kps.map(k=>'<span class="kp">'+esc(k)+'</span>').join("")}</div>`:"");
      res.classList.add("open");
    }else{
      const rev=el("button","btn primary","✨ 揭晓答案"); rev.style.marginTop="4px";
      rev.onclick=()=>{
        if(!randState.selected){ flashSelectHintModal(); return; }
        const isOk=correct.includes(randState.selected);
        prog[q.id]=isOk?"ok":"no"; write(LS.prog,prog);
        if(isOk) wrong.delete(q.id); else wrong.add(q.id);
        write(LS.wrong,[...wrong]);
        randState.revealed=true; renderRandom(); renderStats();
      };
      m.querySelector(".card-actions").appendChild(rev);
    }
    $("#modalClose",m).onclick=closeRandom;
    $("#rNext",m).onclick=openRandom;
    $("#rFav",m).onclick=()=>toggleFav(q.id,$("#rFav",m));
  }

  // ---------- FAV ----------
  function renderFav(m){
    const list=Q.filter(q=>fav.has(q.id));
    const wrap=el("div","list");
    if(!list.length){
      wrap.appendChild(el("div","fav-empty",`<div class="big">⭐</div><div>还没有收藏的题目。<br>在任意题目卡片右上角点 ☆ 即可加入收藏～</div>`));
      m.appendChild(wrap); return;
    }
    list.forEach((q,i)=>wrap.appendChild(card(q,i)));
    m.appendChild(wrap);
    observeCards();
  }

  // ---------- WRONG ZONE ----------
  function wrongHeadEl(){
    const list=Q.filter(q=>wrong.has(q.id));
    if(!list.length) return null;
    const head=el("div","wrong-head");
    const mastered=list.filter(q=>prog[q.id]==="ok").length;
    const pct=Math.round(mastered/list.length*100);
    const info=el("div","wh-info");
    info.innerHTML=`<div class="wh-title">错题集 · <b>${list.length}</b> 道</div>
      <div class="wh-bar"><div class="wh-fill" style="width:${pct}%"></div></div>
      <div class="wh-sub">已掌握 ${mastered} / ${list.length} · 答对后自动移出错题集</div>`;
    head.appendChild(info);
    const clearBtn=el("button","btn ghost","🗑 清空错题");
    clearBtn.onclick=()=>{
      if(confirm("确定清空所有错题？（不可撤销）")){
        wrong.clear(); write(LS.wrong,[]);
        renderStats(); renderControls(); renderMain();
      }
    };
    head.appendChild(clearBtn);
    return head;
  }

  function renderWrong(m){
    const list=Q.filter(q=>wrong.has(q.id));
    const wrap=el("div","list");
    if(!list.length){
      wrap.appendChild(el("div","fav-empty",`<div class="big">📝</div><div>还没有错题。<br>刷题时答错的题目会自动出现在这里～</div>`));
      m.appendChild(wrap); return;
    }
    const head=wrongHeadEl();
    if(head) wrap.appendChild(head);
    list.forEach((q,i)=>wrap.appendChild(card(q,i)));
    m.appendChild(wrap);
    observeCards();
  }

  // ---------- DONE (已练习) ----------
  function renderDone(m){
    const list = doneArr();
    const wrap=el("div","list");
    if(!list.length){
      wrap.appendChild(el("div","fav-empty",`<div class="big">✅</div><div>还没有练习记录。<br>去任意模块点「⚡ 刷题」作答，完成后的题目会汇总到这里～</div>`));
      m.appendChild(wrap); return;
    }
    const okN = list.filter(q=>prog[q.id]==="ok").length;
    const rate = Math.round(okN/list.length*100);
    const head=el("div","done-head");
    head.innerHTML=`<div class="dh-info">
        <div class="dh-title">已练习 · <b>${list.length}</b> 题 · 正确率 <b>${rate}%</b></div>
        <div class="dh-sub">这些是你作答过的题目，✓ 表示当时答对了（答对会自动移出错题库），✗ 表示当时答错了</div>
      </div>`;
    const clearBtn=el("button","btn ghost","🗑 清空已练");
    clearBtn.onclick=()=>{
      if(confirm("确定清空全部练习记录？（已练习、正确率统计将重置，不可撤销）")){
        prog={}; write(LS.prog,{});
        doneFrom={}; write(LS.doneFrom,{});
        renderStats(); renderControls(); renderMain();
      }
    };
    head.appendChild(clearBtn);
    wrap.appendChild(head);
    list.forEach((q,i)=>{
      const c=card(q,i);
      const ok = prog[q.id]==="ok";
      let tagText, tagCls;
      if(ok){
        if(doneFrom[q.id]==="wrong"){ tagText="✓ 错题区攻克"; tagCls="ok from-wrong"; }
        else { tagText="✓ 当时答对"; tagCls="ok"; }
      } else {
        tagText="✗ 当时答错"; tagCls="no";
      }
      const tag=el("div","done-tag "+tagCls, tagText);
      c.querySelector(".card-head").appendChild(tag);
      wrap.appendChild(c);
    });
    m.appendChild(wrap);
    observeCards();
  }

  // ---------- fav toggle ----------
  function toggleFav(id,btn){
    if(fav.has(id)){ fav.delete(id); if(btn)btn.classList.remove("on"),btn.textContent="☆"; }
    else{ fav.add(id); if(btn)btn.classList.add("on"),btn.textContent="★"; }
    write(LS.fav,[...fav]);
    $("#favCount").textContent=fav.size;
  }

  // ---------- module tabs ----------
  $("#tabs").querySelectorAll(".tab").forEach(t=>{
    t.onclick=()=>{
      $("#tabs").querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      t.classList.add("active");
      const mod=t.dataset.mod;
      if(mod==="fav"){ state.module="fav"; }
      else{ state.module=mod; state.view="browse"; state.subject="all"; state.lecture="all"; state.search=""; }
      if(state.view==="practice"){ startPractice(); }
      renderControls(); renderMain(); renderStats();
    };
  });
  // fav button (special tab)
  $("#favBtn").onclick=()=>{
    $("#tabs").querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    state.module="fav";
    renderControls(); renderMain(); renderStats();
  };

  // random one
  $("#randBtn").onclick=openRandom;
  $("#modal").onclick=(e)=>{ if(e.target===$("#modal")) closeRandom(); };

  // hero buttons: 开始刷题 -> 基础必刷刷题，每日一题 -> 每日一题刷题
  $("#heroStart").onclick=()=>openModuleView("bank");
  $("#heroDaily").onclick=()=>openModuleView("daily");

  // ---------- theme ----------
  const themeBtn=$("#themeBtn");
  function applyTheme(th){
    document.documentElement.setAttribute("data-theme",th);
    themeBtn.textContent = th==="dark"?"🌙":"☀️";
    write(LS.theme,th);
  }
  themeBtn.onclick=()=>{
    const cur=document.documentElement.getAttribute("data-theme");
    applyTheme(cur==="dark"?"light":"dark");
  };
  applyTheme(read(LS.theme,"dark"));

  // ---------- contact FAB (常驻悬浮入口) ----------
  const contactFab=$("#contactFab");
  const contactPop=$("#contactPop");
  if(contactFab){
    contactFab.onclick=()=>contactPop.classList.toggle("show");
    const cpClose=$("#cpClose");
    if(cpClose) cpClose.onclick=()=>contactPop.classList.remove("show");
    contactPop.onclick=(e)=>{ if(e.target===contactPop) contactPop.classList.remove("show"); };
  }

  // ---------- init ----------
  renderStats();
  renderControls();
  renderMain();
})();
</script>
</body>
</html>
