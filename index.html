码。"},{"id":"d_co_3","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":3,"date":"2026-06-09","stem":"下列有关补码的描述中，正确的是（ ） I.在计算机中用来表示无符号数 II.0的表示形式唯一 III.符号位和数值位一起参与运算 IV.实现了加减法的统一 V.机器数的大小可以直观地反映真值的大小","options":{"A":"仅I、III、V","B":"仅I、II、III","C":"仅II、III、IV","D":"仅I、II、V"},"answer":["C"],"analysis":"补码是专门为有符号数设计的一种编码方式，目的是简化运算。无符号数根本不需要符号位，也就不存在“补码表示”这一说。描述 I 错误。补码相对于原码的一个重要改进就是0的表示唯一，消除了原码的二义性。描述 II 正确。补码运算规则即在做加法时，符号位和数值位被同等对待，一起送入ALU进行加法运算。描述 III 正确。利用补码，减法可以转化为加法：[A]补 - [B]补 = [A]补 + [-B]补。计算机里只需要一套加法器就能同时完成加法和减法。大大简化了运算器的设计。描述 IV 正确。补码中，负数的高位全是1，直接按位比较大小会出错。描述 V 错误。","kps":["第2章 数据的表示和运算","定点数的表示","补码"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-3-补码 00:00-14:30","kpSummary":"补码的几个重要性质：\n一、用补码表示的数，若其最高位为0，则此数为正数；若其最高位为1，则此数为负数，这一点和原码相同\n二、0的表示唯一。这是补码相对于原码的一个重要改进\n三、表示范围比原码多一个数。若机器字长为n位，总共有 2n 个码点，对应着2n 个不同的真值。\n四、符号位参与运算。在补码加法中，符号位如同数值位一样参与运算，产生的进位按照模运算规则自然丢弃，结果自动正确，这使得硬件实现更加简单高效。"},{"id":"d_co_4","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":4,"date":"2026-06-10","stem":"已知[X]补=0110 0011，则[-X]补等于（）。","options":{"A":"0001 1100","B":"1001 1100","C":"1001 1101","D":"以上都不是"},"answer":["C"],"analysis":"给出 [X]补 求 [-X]补的核心转换规则是：将 [X]补 的每一位（包括符号位）全部取反，然后在末位加 1。对 [X]补 取反后得到1001 1100，末位加1得到1001 1101。故选C。","kps":["第2章 数据的表示和运算","定点数的表示","补码运算"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-3-补码 05:20-12:19","kpSummary":"负数原码求补码的方法：除符号位以外，其余位按位取反，末位加1\n求相反数补码的方法：连同符号位在内，全部位按位取反，末位加1。\n两者注意区分。"},{"id":"d_co_5","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":5,"date":"2026-06-10","stem":"设X为定点小数，[X]补 = 1.x6x5x4x3x2x1x0，最高位为符号位，若要-1/2≤X＜-1/4，x6x5x4x3x2x1x0应该满足什么条件（ ）","options":{"A":"x6x5必须为10，x4～x0任意","B":"x6x5必须为01，x4～x0任意","C":"x6x5必须为10，x4～x0至少有一个是1","D":"x6x5必须为01，x4～x0至少有一个是1"},"answer":["A"],"analysis":"要-1/2≤X＜-1/4，则 |X| 需满足 1/4< |X|≤1/2，则 |X| 的原码需满足 0.01B​< ∣X∣ ≤0.10B​，故有两种情况：\n1、0.1000000，即x6=1, x5=0, x4∼x0全0。（满足等于1/2）\n2、0.01xxxxx ，x5=1，且x4~x0 不全为 0。（满足大于1/4且小于1/2）\n\n故X只需将其符号位改为1，即以下两种情况：\n1、[X]原 = 1.1000000\n2、[X]原 = 1.01... ， x5=1, x4~x0 至少一个 1。\n\n接下来将X由原码转为补码。\n第一种情况的[X]补 = 1.1000000\n第二种情况的[X]补 = 1.10xxxxx，且x4~x0 至少一个 1。\n故综上，x6x5必须为10，x4~x0任意，故选A","kps":["第2章 数据的表示和运算","定点数的表示","补码与取值范围"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-3-补码 00:00-23:18","kpSummary":"由取值范围求各二进制位满足的条件的通用解法：\n1.由真值的范围求绝对值的范围\n2.写出绝对值的原码表示及其数值位约束\n绝对值是一个正数，它的原码符号位为零，数值位就是其自身的二进制表示。根据绝对值的取值范围，分析数值位最高几位必须满足的特征。\n3.由绝对值的原码得到X的原码（选）\n若X是负数，直接将绝对值原码的符号位从零改为一，数值位保持不变，就得到了X的原码形式。若X是正数则无需更改\n4.将X的原码转换为补码\n利用原码转补码的规则：符号位保持不变，数值位按位取反，然后在最低位加一。根据这个规则，从原码的数值位特征推导出补码数值位各位的约束。\n5.合并所有情况得出最终条件\n将边界值和内部区间得到的补码位值条件合并。"},{"id":"d_co_6","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":6,"date":"2026-06-11","stem":"若寄存器内容为FCH，若它等于-4，则为（ ）。","options":{"A":"原码","B":"补码","C":"反码","D":"移码"},"answer":["B"],"analysis":"FCH 转换为 8 位二进制是：1111 1100。\nA选项，若为原码，则真值为-（0111 1100）= -124，排除。\nB选项，若为补码，则将其除符号位外按位取反，末位加1，得到原码为1000 0100，真值即为 -4\nC选项，若为反码，则将其除符号位外按位取反，得到原码为1000 0011，真值即为-3。\nD选项，若为移码，则将其视为无符号数，得到其值为252，再将其减去偏移量128，得到真值124。\n故选B。","kps":["第2章 数据的表示和运算","定点数的表示","机器数与真值"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-2-原码 00:00-10:39 + 第2章 数据的表示和运算-3-补码 05:20-08:51 +第2章 数据的表示和运算-4-反码和移码 00:00-02:06+08:34-15:08","kpSummary":"四种机器数的真值计算规则\n原码：符号位独立，数值位直接为绝对值。\n反码：负数时数值位取反得绝对值。\n补码：负数时除符号位其余位按位取反加一得到原码，再将其转化为真值。也可以直接将全部位按位取反加1得到其绝对值。\n移码：将整个机器数视为无符号数，减去固定偏移量得真值。"},{"id":"d_co_7","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":7,"date":"2026-06-11","stem":"某8位计算机中，两个带符号整数变量x，y的机器数分别为34H、2DH，则x-2y的机器数以及溢出标志OF分别是（ ）","options":{"A":"8EH、0","B":"8EH、1","C":"DAH、0","D":"DAH、1"},"answer":["C"],"analysis":"题干说是8位计算机，故x = 34H = 0011 0100  y = 2DH = 0010 1101。在补码中，2y即将y进行算术左移一位，得到2y = 0101 1010 ，未超过表示范围。补码系统将减法转化为加法处理，故将2y的连同符号位按位取反加1，得到[-2y]补 = 1010 0110。故x-2y = x+ [-2y] = 0011 0100 + 1010 0110 =  1101 1010 = DAH。由于x的真值为52，y的真值为45。x-2y的真值为-38，处于8为补码的表示范围以内，故没有溢出，OF=0。故选C","kps":["第2章 数据的表示和运算","定点数的运算","溢出的判断"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-5-定点数的加减计算&加法器&移位运算 00:00-20:58","kpSummary":"溢出标志 OF 的判断方法：\n对于补码加法，溢出仅发生在“两个同号数相加，结果符号相反”时。异号数相加永远不会溢出。本题中 x 为正，-2y 为负，故 OF = 0。实际题目中也可以先将机器数转换成真值，判断计算结果是否落在补码能表示的范围内来判断，这点在判断乘法结果是否溢出时最为方便。"},{"id":"d_co_8","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":8,"date":"2026-06-12","stem":"已知float型变量用IEEE 754单精度浮点数格式表示。若float型变量x的机器数为8020 0000H，则x的值是（ ）","options":{"A":"-2-128","B":"-1.01*2-127","C":"-1.01*2-126","D":"非数（NaN）"},"answer":["A"],"analysis":"将机器数 8020 0000H 展开为二进制：1 00000000 01000000000000000000000 其中符号位为1，代表负数，阶码全0，尾数不全为0，所以是非规格化浮点数，无隐含位，真值公式为：x = (-1)^S × (0.M) × 2^-126故真值 = - (0.01B) × 2⁻¹²⁶ = -2⁻¹²⁸。故选A。","kps":["第2章 数据的表示和运算","浮点数的表示","IEEE 754单精度"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-8-IEEE754标准表示浮点数 16:58-26:42","kpSummary":"IEEE 754 单精度浮点数格式：\n1位符号位S、8位阶码E、23位尾数M。根据 E 的不同取值区间，分别表示规格化数、非规格化数、无穷大和 NaN。这是浮点数表示的基础框架。\n当E为全0，M为全0时，代表+0或-0\n当E为全0，M不全为0时，代表非规格数（无隐含位，同时乘以2）\n当E为全1，M为全0时，代表+INF或-INF（正无穷大或负无穷大）\n当E为全1，M不全为0时，代表NaN（非数）"},{"id":"d_co_9","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":9,"date":"2026-06-12","stem":"假定变量i、f和d的数据类型分别为int、float和double(int用补码表示，float和double分别用IEEE754单精度和双精度浮点数格式表示)，已知i=785，f=1.5678e3，d=1.5e100。若在32位机器中执行下列关系表达式，则结果为“真”的是（ ）。 (I)i==(int)(float)i (II)f==(float)(int)f (III)f==(float)(double)f (IV)(d+f)-d==f","options":{"A":"仅I和II","B":"仅I和III","C":"仅II和III","D":"仅III和IV"},"answer":["B"],"analysis":"这道题考察 C 语言中不同数据类型转换时的精度损失问题。\nI. float单精度浮点数的尾数有 24 位有效位（含隐含1），785在此范围内，可被float精确表示。(int)(float)i 再将这个float值转换回int，得到整数785。结果为“真”\nII. (int)f 将 float 转换为 int，因int型没有小数部分，数据会向0方向截断（仅保留整数部分），发生舍入，得到1567。(float)(int)f 再将int 转换回float。1567 在float可精确表示范围内，值为 1567.0。与原f不同，故结果不为“真”。\nIII. (double)f将float值1567.8转换为double型。由于double型的有效位数更多，因此能保留精确值。(float)(double)f 再将这个double转换回float。由于原始值就来自float，且double 表示的值就是该float所代表的确切数值，转换回来时必然精确得到原来的float。结果为“真”\nIV. d的阶码为100，而f的阶码仅为3。浮点数加减法要进行对阶操作。由于两者的阶码相差97，f的尾数需要右移97位，会导致在加法中被忽略，故d + f 的结果等于 d。于是 (d+f) - d = 0.0。故结果不为“真”。","kps":["第2章 数据的表示和运算","浮点数的表示","类型转换与精度"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-4-反码和移码 24:39-结束","kpSummary":"浮点数与小数之间转换的精度分析：\n1.int型转换为float型时，不会发生溢出，但是float型尾数只有24 位有效位（含隐含1），所以对于大数可能需要舍入处理，影响精度。\n2.int型或float型转换为double型时，能无条件保留精确值，不会发生溢出或者损失精度。\n3.double型转换为float型时，大数转换可能会发生溢出，此外，由于尾数变少，高精度数转换时会发生舍入，损失精度。\n4.float型或者double型转换位int型时，大数转换可能会发生溢出。同时，因为int型没有小数，所以数据会向0方向截断，发生舍入。"},{"id":"d_co_10","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":10,"date":"2026-06-13","stem":"考虑下列C语言程序代码: int i=65535; short si=i; int j=si; 假定上述程序段在某32位机器上执行，sizeof(int)=4，则变量i、si和j的值分别是（ ）。","options":{"A":"65535、65535、65535","B":"65535、1、-1","C":"65535、-1、-1","D":"65535、-1、1"},"answer":["C"],"analysis":"sizeof(int)=4，即int为32位。故65535用32位补码表示为：0000 0000 0000 0000 1111 1111 1111 1111。将32位int赋值给16位short时，会发生截断：直接保留低16位，高 16位被丢弃。故si的机器数为：1111 1111 1111 1111。由于si是有符号数，故按照补码来解释。其真值为-1。\n将short类型（16位）转换给int类型（32位），属于有符号整数拓宽，遵循的规则为符号扩展，即用原数的符号位填充多出来的高位。故j的机器数为：1111 1111 1111 1111 1111 1111 1111 1111，其真值为-1。","kps":["第2章 数据的表示和运算","数据的截断与转换","有符号数的截断"],"video":"计算机组成原理·六讲 第2章 数据的表示和运算-4-反码和移码 24:39-结束","kpSummary":"长数据向短数据转换的截断规则：\n将高位宽的整数赋值给低位宽变量时，直接保留低位部分，高位丢弃。如果原值超出目标类型范围，则会发生数值改变，这称为“溢出”或“截断效应”。\n短数据向长数据转换的符号扩展：\n将有符号的短整数（如 short）转换为更长类型（如 int）时，为保持数值不变，高位全部填充符号位。若为负数则补 1，若为正数则补 0。无符号数拓宽则高位补 0（零扩展）。"},{"id":"d_co_11","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第一章 计算机系统概述","num":11,"date":"2026-06-13","stem":"在按字节编址，采用小端方式的32位计算机中，按边界对齐方式为以下C语言结构型变量a分配存储空间。 struct record { short x1； int x2； } a； 若a的首地址为2020 FE00H，a的成员变量x2的机器数为1234 0000H，则其中34H所在存储单元的地址是( )。","options":{"A":"2020 FE03H","B":"2020 FE04H","C":"2020 FE05H","D":"2020 FE06H"},"answer":["D"],"analysis":"按边界对齐方式要求其数据存放的存储地址是自身大小的整数倍。例如short型数据的地址一定是2的整数倍，int型数据的地址一定是4的整数倍。a的首地址为2020 FE00H，第一个成员x1是 short 型，占2字节。因此x1占用地址 FE00H 和 FE01H。由于第二个成员x2是int型，故起始地址需为4的整数倍，因此需要在 x1 之后填充2个字节（地址 FE02H 和 FE03H），使 x2 从 FE04H 开始。故 x2 占用地址 FE04H、FE05H、FE06H、FE07H。\n小端方式是指数据在内存中先存储低位字节，后存储高位字节。字中的字节顺序和原序列的相反。将该数按字节从高到低拆分为：12H、34H、00H、00H。故最低有效字节 00H 存在 FE04H，次低字节 00H 存在 FE05H，次高字节 34H 存在 FE06H，最高字节 12H 存在 FE07H。选D。","kps":["第1章 计算机系统概述","数据的存储","内存对齐（边界对齐）"],"video":"计算机组成原理·六讲  第4章 指令系统-4-边界对齐&大小端&CISC和RISC 00:00-13:36","kpSummary":"结构体的内存对齐规则：\n每个成员相对于结构体首地址的偏移量必须为其自身对齐值的整数倍。例如short 对齐 2 字节，int 对齐 4 字节。编译器会在成员间插入填充字节以满足对齐，结构体大小也会是最大对齐值的整数倍。\n大端小端存储模式：\n小端方式：低位字节存入低地址，高位字节存入高地址，直观上数据“逆序”存储，便于机器处理。\n大端方式：低位字节存入高地址，高位字节存入低地址，便于人类阅读。"},{"id":"d_co_12","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":12,"date":"2026-06-15","stem":"关于SRAM和DRAM的特点，以下选项中不正确的是（ ） I.SRAM不需要刷新，而DRAM需要刷新，因此DRAM的功耗更高 II.DRAM比SRAM集成度更高，因此读写速度也更快 III.SRAM是易失性存储器，而DRAM是非易失性存储器 IV.Cache由SRAM构成，主存由DRAM构成","options":{"A":"II、III、IV","B":"I、III、IV","C":"I、II、III","D":"全部"},"answer":["D"],"analysis":"I. SRAM 使用双稳态触发器存储信息，只要不掉电，信息就能稳定保持，不需要刷新。DRAM 使用电容存储电荷，电荷会泄漏，因此必须定时刷新。尽管 DRAM 需要刷新，但通常 SRAM 的功耗比 DRAM 更高，因为 SRAM 的存储单元（6 个晶体管）在静态时也有持续的电流，而 DRAM 的电容充放电功耗和刷新功耗平均下来相对较小。I错误\nII. DRAM 的存储单元通常只需 1 个晶体管和 1 个电容，比 SRAM 的 6 管单元简单得多，所以集成度更高，相同面积下容量更大。但DRAM的读写速度远慢于SRAM。II错误。\nIII.易失性指断电后数据丢失。SRAM和DRAM都属于易失性存储器，断电后存储的信息都会消失。III错误。\nIV. 现代计算机的主存的物理构成中除了DRAM外，还包括 ROM（只读存储器），用来固化系统启动程序。它在主存统一编址的地址空间中占有一定区域。IV错误。","kps":["第3章 存储器层次结构","半导体存储器","SRAM与DRAM"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-1-存储器基本概念 37:41-46:13-","kpSummary":"SRAM与DRAM的基本原理与对比：\nSRAM 用触发器存储，速度快、无需刷新、功耗较高、集成度低、是非破坏性读出；DRAM 用电容存储，速度慢、需刷新、功耗较低、集成度高、是破坏性读出。两者都是易失性存储器。"},{"id":"d_co_13","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":13,"date":"2026-06-15","stem":"下面有关存储器的说法哪一个是正确的? （ ）","options":{"A":"设置Cache的目的是扩大主存的容量,提高主存访问速度","B":"双端口存储器有左右两个独立的读写端口,是会发生冲突的","C":"程序可在辅助存储器中直接运行","D":"多体交叉存储器中,地址相邻的存储单元位于不同的存储体中"},"answer":["C"],"analysis":"Cache 的主要目的是解决CPU与主存之间的速度差异，通过存放主存中频繁访问的指令和数据的副本，提高 CPU 访问存储器的速度，它并不会扩大主存的容量。A错误。\n双端口存储器有两个独立的读写端口，允许两个控制器同时访问不同地址，从而提高并行性。若两个端口访问不同地址则无冲突，只有当两个端口同时访问同一存储单元（或同一地址）且至少有一个端口为读数据时，就会发生读写冲突（硬件需仲裁）。B错误。\n程序必须先加载到主存（RAM）中，由CPU通过内存地址读取指令执行。辅存仅作为长期存储和交换空间。C错误。\n多体交叉存储器一般指低位交叉编址。在这种组织方式下，连续的地址被依次分配到不同的存储模块中，每个存储器模块内的地址是不连续的，主存地址的划分与连续编址相反。D正确。","kps":["第3章 存储器层次结构","Cache存储器","Cache的作用"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-1-存储器基本概念 26:36-37:12 + 第3章 存储器层次结构-2-内存 43:29-50:04","kpSummary":"Cache 的作用与性质：\nCache 是介于 CPU 和主存之间的高速小容量存储器，利用程序访问的局部性原理，缓存主存中活跃的数据块，目的是提高访问速度，而不是扩充主存容量。它对用户和程序员透明。\n存储器的编址方式：\n低位交叉（交叉编址）：存储体号由低位地址决定，地址相邻的单元位于不同的体，可并行访问，提高带宽。\n高位交叉（连续编址）：存储体号由高位地址决定，地址相邻的单元在同一体内，主要用于扩容，无法提高并发度。"},{"id":"d_co_14","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":14,"date":"2026-06-16","stem":"假定用若干 16K×8位的存储器芯片组成一个64K×8位的存储器，芯片各单元交叉编址，则地址 BFFF 所在芯片的最小地址为（）。","options":{"A":"0000H","B":"0001H","C":"0002H","D":"0003H"},"answer":["D"],"analysis":"交叉编址指的是低位交叉编址。由于存储器总容量是单个存储器芯片容量的4倍，所以需要用最低2位作为芯片号，高14位作为片内地址。将 BFFFH 展开为 16 位二进制得到 1011 1111 1111 1111，最低2位是11，所以该地址位于 第 3 号芯片。令该芯片内的片内地址为全0，得到最小地址为0000 0000 0000 0011 = 0003H，选D。","kps":["第3章 存储器层次结构","主存的编址与扩容","多体交叉存储器"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-2-内存 32:20-52:34","kpSummary":"多体交叉存储器的编址方式：\n低位交叉编址：用地址低位区分存储体，地址相邻的单元分布在不同体中，可流水线并行访问，提高带宽。\n高位交叉编址：用地址高位区分存储体，地址相邻的单元在同一体内，主要用于扩容。\n题目中“交叉编址”默认指低位交叉。"},{"id":"d_co_15","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":15,"date":"2026-06-16","stem":"假设主存按字节编址，Cache 共有64行，采用直接映射方式，主存块大小为32字节，所有编号都从0开始。现已知主存第3000号单元现在Cache中，那么其所在Cache的行号为（ ）。","options":{"A":"13","B":"26","C":"29","D":"58"},"answer":["C"],"analysis":"主存块大小为32字节，按字节编址，块内偏移需要 log₂32 = 5 位，在地址构成中位于最低位。Cache共有64行，直接映射方式下，行索引需要 log₂64 = 6 位，在地址构成中位于块内偏移的左侧。将3000转换为二进制：1011 1011 1000。故块内偏移为11000。中间6位011101是cache行号，计算得29，故选C。","kps":["第3章 存储器层次结构","Cache的映射方式","直接映射"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-5-直接映射 00:00-18:00","kpSummary":"三种 Cache 映射方式：\n全相联映射：主存中的任意一块，可以装入 Cache 中的任意一行。没有“行号/组号”字段，因为不固定位置。CPU访存时，需要将地址中的Tag与Cache中所有行的标记同时比较，才能判断是否命中。\n直接映射：主存中的每一块，只能放入 Cache 中唯一固定的一行。映射关系为：Cache 行号 = 主存块号 mod (Cache总行数)。CPU访存时，直接用地址中的Index字段找到对应行，只比较该行的标记和地址中的Tag是否相等，命中即可读出。\n组相联映射：将Cache的行分成若干组，每组包含若干行（路数）。主存块先映射到唯一固定的组，但在组内可以放置到任意一行。设 Cache 有S组，每组W行，则总行数 = S × W。Cache 组号 = 主存块号 mod S。访存时，用Index找到对应组，然后同时与该组内所有W 行的标记比较。若其中之一命中即可。"},{"id":"d_co_16","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":16,"date":"2026-06-17","stem":"容量为64块的Cache采用组相联映射方式，字块大小为128个字，每4块为一组。如果主存为4K块，且按字编址，那么主存地址和主存标记的位数分别为( )。","options":{"A":"16，6","B":"17，6","C":"18，8","D":"19，8"},"answer":["D"],"analysis":"主存块数为4K块，1K = 1024，故4K = 4096块。每块字数为128个字，故主存总字数 = 4096 × 128 = 2¹² × 2⁷ = 2¹⁹ 字。由于按字编址，故主存地址需要19位。同时，由每块为128字可得块内偏移量为7位，cache容量为64块，每4块为一组，故总共有64/4 = 16组，需用4位存储。故按照组相联映射方式，剩下即为主存标记位，共有19-7-4=8位。故选D","kps":["第3章 存储器层次结构","Cache的映射方式","组相联映射"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-7-组相联映射 00:00-18:31","kpSummary":"组相联映射的地址结构：\n主存地址分为三个字段：\n标记(Tag)：高位，用于区分映射到同一组的各个主存块。\n组号(Index)：中间位，用于选择 Cache 中的组。组数 = Cache总块数 ÷ 每组块数（路数）。\n块内偏移(Offset)：低位，用于选择块内的具体存储单元。\n位数关系：| Tag | Index | Offset |，总位数 = 三部分位数之和。"},{"id":"d_co_17","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":17,"date":"2026-06-17","stem":"下述有关Cache与虚拟存储器的说法中错误的有（ ） I.一次访存中，页表不命中，则Cache一定也不命中 II.Cache不命中的损失要大于页表不命中的损失 III.Cache和TLB缺失后的处理都是由硬件完成 IV.虚拟存储器的容量可以大于主存和辅存的容量之和","options":{"A":"I和IV","B":"III和IV","C":"II和IV","D":"I、II和IV"},"answer":["I、III"],"analysis":"页表不命中（缺页） 代表要访问的指令或数据所在的页面不在主存中，需要从磁盘（辅存）调入。而Cache 是主存的缓存，存放的是主存中部分块的副本。如果页表不命中，说明数据根本不在主存，那么它也一定不在 Cache 中。因为数据必须先进入主存，才可能被调入 Cache。I正确。\nCache不命中说明数据在主存而不在Cache，需要从主存调入Cache（需要访问cache说明可以从页表或者TLB中找到数据的物理地址，故数据一定在主存里）。页表不命中（缺页）说明数据不在主存，需要从磁盘调入。从磁盘调入数据的时间比访问主存的时间要大几个数量级。因此，缺页的损失远大于Cache不命中。II错误\nCache的查找、缺失后的块替换与调入等操作，均由硬件自动完成，对程序员透明。TLB缺失后，硬件自动查找页表，若页表命中则自动更新TLB，整个过程由硬件完成。III正确。\n虚拟存储器不是指虚拟地址空间，而是指由主存-辅存层次构成的、实际在工作的虚拟存储系统。这个系统的总容量受限于物理硬件的实际大小，程序整个运行过程中，所有必须保存在物理介质上的数据，其总量不能超过实际拥有的主存+磁盘的总容量。IV错误。","kps":["第3章 存储器层次结构","虚拟存储器与Cache","TLB与Cache"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-11-页式虚拟存储器 01:15:14-01:23:38","kpSummary":"TLB、page、cache命中或者缺失的几种不同情况\n1.TLB命中、page命中、cache命中：可能，TLB命中则页一定命中，信息在主存，就可能在cache中。\n2.TLB命中、page命中、cache缺失：可能，TLB命中则页一定命中，信息在主存，但可能不在cache中。\n3.TLB缺失、page命中、cache命中：可能，TLB缺失但页可能命中，信息在主存，就可能在cache中。\n4.TLB缺失、page命中、cache缺失：可能，TLB缺失但页可能命中，信息在主存，但可能不在cache中。\n5.TLB缺失、page缺失、cache缺失：可能，TLB缺失，则页也可能缺失，信息不在主存，一定也不在cache中。\n6. TLB命中、page缺失、cache缺失：不可能，页缺失，说明信息不在主存，TLB中一定没有该页表项。\n7.TLB命中、page命中、cache命中：不可能，页缺失，说明信息不在主存，TLB中一定没有该页表项。\n8.TLB缺失、page缺失、cache命中：不可能，页缺失，说明信息不在主存，cache中一定也没有该信息。"},{"id":"d_co_18","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":18,"date":"2026-06-18","stem":"假定编译器将赋值语句“x=x+3;”转换为指令“add xaddr, 3”，其中xaddr是x对应的存储单元地址。若执行该指令的计算机采用页式虚拟存储管理方式，并配有相应的 TLB，且 Cache 使用直写（Write Through）方式，则完成该指令功能需要访问主存的次数至少是（ ）","options":{"A":"0","B":"1","C":"2","D":"3"},"answer":["B"],"analysis":"由于题目要求是访问主存的最少次数，当TLB与Cache均命中时，从地址 xaddr 处读取变量x的当前值就无需问内存，而是可以直接从Cache中获得。 由于Cache使用直写（Write Through）方式，每次写访Cache时，必须同时把数据写入主存，以保证主存和 Cache 的一致性。所以在执行x+3后需要把更新后的x值写回内存，此时需要一次访存。故总访存次数 =读操作数(0) + 写结果(1) = 1 次。","kps":["第3章 存储器层次结构","Cache的写策略","写回与写直达"],"video":"计算机组成原理·六讲 第3章 存储器层次结构-9-Cache替换算法和Cache写策略 09:14-16:15","kpSummary":"Cache写策略的分类和梳理：\n直写法（全写法）：写命中时，同时更新Cache块和下一级存储（这里是主存）。保证了主存和Cache数据始终一致，实现简单，但每次写操作都会引发一次主存访问，增加了读主存块的开销。\n回写法（写回法）：写命中时，只更新 Cache 块而不被写入主存，只有当Cache行中的块被替换时，才将该块内容一次性写回主存。减少了写的次数，但需要在每个Cache行设置一个修改位，来标记该块是否需要在被替换时写入内存。"},{"id":"d_co_19","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第四章 指令系统","num":19,"date":"2026-06-18","stem":"关于标志寄存器的叙述中，错误的是（ ）","options":{"A":"主要用于反映处理器的状态和ALU运算结果的某些特征","B":"不需要对标志寄存器进行编号","C":"标志寄存器对用户是完全透明的","D":"条件转移指令需要根据标志寄存器的值确定PC的值"},"answer":["C"],"analysis":"标志寄存器的核心作用就是保存ALU运算后的状态特征，如零标志ZF、进位标志CF、符号标志SF、溢出标志OF等，同时也包含一些处理器控制标志（如中断允许标志IF）。A正确。\n标志寄存器不同于通用寄存器（如 EAX、EBX），它不参与通用寄存器的编号寻址。在指令中，标志寄存器的访问是隐式的，由特定指令自动操作。B正确。\n在计算机系统中，\"对用户透明\"意味着用户完全感知不到它的存在，也无需关心它的状态，即用户不可见，如地址寄存器MAR、数据寄存器MDR。而“不透明”意味着程序员可按汇编语言（或机器语言）访问，如程序计数器PC。PSW对用户是可见且必须关心的，不是完全透明。C错误。\n条件转移指令的执行逻辑就是：检测标志寄存器中特定的一个或多个标志位，若条件成立，则修改程序计数器PC为目标地址；否则顺序执行下一条指令。D正确","kps":["第4章 指令系统","指令系统概述","标志寄存器"],"video":"计算机组成原理·六讲 第5章 中央处理器-1-CPU的功能和基本结构 04:50-12:22","kpSummary":"标志寄存器的功能与分类：\n标志寄存器用于存放 ALU 运算结果的特征和处理器控制状态。通常分为两类：\n状态标志：由运算自动设置，如 CF、ZF、SF、OF等，供后续指令判断使用。\n控制标志：由程序主动设置，用于控制处理器的工作模式，如 IF（中断允许）、DF（方向标志）等。\n透明性在计算机系统中的含义：\n对某层用户透明：该层用户看不到、感知不到该组件的存在和运作。例如Cache对程序员透明。\n不透明：用户必须了解并显式管理。例如标志寄存器对汇编/系统程序员不透明。"},{"id":"d_co_20","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第四章 指令系统","num":20,"date":"2026-06-19","stem":"在指令格式中，采用扩展操作码设计的目的是（ ）","options":{"A":"减少指令长度","B":"增加指令长度","C":"保持指令长度不变而增加指令的数量","D":"保持指令长度不变而增加寻址空间"},"answer":["C"],"analysis":"在指令格式中，操作码和地址码共同占用指令字长。固定操作码格式下，操作码位数固定，可表示的指令条数就固定了。扩展操作码则是一种操作码长度可变的设计：当指令需要的地址字段较短时（如零地址或一地址指令），将原本属于地址字段的位借给操作码使用，从而增加可表示的指令数量。它的核心目的就是在保持指令字总长度不变的前提下，增加指令的总数，解决操作码位数不足的困境。故选C","kps":["第4章 指令系统","指令格式","扩展操作码"],"video":"计算机组成原理·六讲 第4章 指令系统-2-指令格式 8:44-13:04","kpSummary":"指令字长与操作码设计：\n指令字长通常为字节的整数倍，操作码字段用于区分指令功能。固定长操作码译码简单但指令数量受限；扩展操作码译码稍复杂但可增加指令数，是定长指令字下的常见优化手段。"},{"id":"d_co_21","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第四章 指令系统","num":21,"date":"2026-06-19","stem":"假设某指令的一个操作数采用变址寻址的寻址方式，变址寄存器中的值为1000H，地址1000H中的内容是0002H，指令中给出的形式地址是2022H，地址2022H的内容是2048H，那么该操作数的有效地址是（ ）。","options":{"A":"2050H","B":"3022H","C":"3048H","D":"204AH"},"answer":["B"],"analysis":"变址寻址的有效地址计算公式为：有效地址 (EA) = 变址寄存器 (IX) 的内容 + 指令中的形式地址 (A)。故1000H + 2022H = 3022H，选B。","kps":["第4章 指令系统","寻址方式","变址寻址"],"video":"计算机组成原理·六讲 第4章 指令系统-3-寻址方式 14:29-结束","kpSummary":"变址寻址与其它寻址方式的区分\n变址寻址：有效地址EA=寄存器内容+形式地址。\n寄存器间接寻址：有效地址就在寄存器里，需要根据这个地址去访问内存取操作数。\n间接寻址：形式地址给出的是一个指针的地址，需要先去这个地址取指针，再根据指针去取操作数。\n基址寻址：与变址类似，有效地址EA也是寄存器加形式地址，但基址寄存器通常由操作系统管理，用于程序重定位；变址寄存器由程序员使用。"},{"id":"d_co_22","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第四章 指令系统","num":22,"date":"2026-06-19","stem":"寄存器R1，R2均为16位，指令MOV R1，[R2]的功能是把内存数据送到R1中，R2的内容是1234H，内存中地址1234H的内容是56H，地址1235H的内容是78H，数据采用小端方式存储，则指令执行后R1的内容是（ ）","options":{"A":"5678H","B":"7856H","C":"8765H","D":"6578H"},"answer":["B"],"analysis":"指令 MOV R1, [R2] 的含义是：以寄存器R2中的值作为有效地址，从该地址开始读取数据，送入寄存器R1。数据采用小端方式存储，即低地址存放数据的低字节，高地址存放数据的高字节。故拼接后的16位数据为 78H（高字节）+ 56H（低字节） = 7856H。","kps":["第4章 指令系统","寻址方式","寄存器间接寻址"],"video":"计算机组成原理·六讲 第4章 指令系统-3-寻址方式 09:13-10:12 + 指令系统-4-边界对齐&大小端&CISC和RISC 00:00-13:36","kpSummary":"寄存器间接寻址：\n指令中给出的寄存器不是操作数本身，而是操作数的有效地址。CPU需要先读取寄存器的值，再以此值为地址去访问主存，取出真正的操作数。本题中 [R2] 即为寄存器间接寻址。\n大端小端存储模式：\n小端方式：低位字节存入低地址，高位字节存入高地址，直观上数据“逆序”存储，便于机器处理。\n大端方式：低位字节存入高地址，高位字节存入低地址，便于人类阅读。"},{"id":"d_co_23","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第四章 指令系统","num":23,"date":"2026-06-20","stem":"某指令系统指令字长为8位，每一地址码长3位，用扩展操作码技术。若指令系统具有两条二地址指令、10条零地址指令，则最多有（ ）条一地址指令。","options":{"A":"20","B":"14","C":"108","D":"6"},"answer":["B"],"analysis":"指令字长8位，每个地址码3位。故二地址指令中操作码占 8 - 3 - 3 = 2 位，可表示 4 种状态；一地址指令中操作码可扩展到 8 - 3 = 5 位；零地址指令操作码扩展到 8 位。由于指令系统有2条二地址指令，故剩余2个编码作为扩展标志，供一地址指令使用，使一地址指令可用 2 × 2³ = 16个编码。设一地址指令实际有 x 条，则留给零地址指令的扩展标志数为16 – x。由于零地址指令有10条，需要满足：8(16 - x) ≥ 10，故可解得x最多为14。","kps":["第4章 指令系统","指令格式","扩展操作码"],"video":"计算机组成原理·六讲 第4章 指令系统-2-指令格式 8:44-13:04 + 26:41-结束","kpSummary":"编码空间的分层分配：\n短操作码剩余的未用编码作为下一级长操作码的前缀。每多扩展 k 位地址字段，可扩展的指令数量就乘以 2ᵏ。必须在各级指令数量之间合理分配，确保所有指令都能被唯一解码。"},{"id":"d_co_24","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第一章 计算机系统概述","num":24,"date":"2026-06-20","stem":"数值数据和逻辑数据在形式上没有任何差别，计算机区分数值数据和逻辑数据的主要方法是（）。","options":{"A":"将数值数据和逻辑数据分开存放在不同的寄存器中","B":"在数据中用专门的标识位指出是数值数据还是逻辑数据","C":"用不同的指令操作码来区分本指令处理的是哪种数据","D":"用不同的时间段来区分当时处理的是哪种数据"},"answer":["C"],"analysis":"在计算机存储器（主存、寄存器）中，无论是数值数据（如整数、浮点数）还是逻辑数据（如布尔值、位掩码），都以二进制位串的形式存在。CPU在取指译码阶段，根据指令的操作码决定如何处理操作数。对于算术指令（如 ADD、SUB、MUL），会把操作数当作数值数据来处理，运算结果会触发进位标志 CF、溢出标志 OF 等；对于逻辑指令（如 AND、OR、XOR），会把操作数当作逻辑数据来处理，按位进行逻辑运算，并固定使CF=0、OF=0 等。故选C","kps":["第1章 计算机系统概述","冯·诺依曼结构","指令与数据的无差别性"],"video":"计算机组成原理·六讲","kpSummary":"冯·诺依曼结构中数据与指令的无差别性：\n指令和数据均以二进制形式存储在存储器中。同时，从存储形式上看，无法区分一个位串是数值还是逻辑数据，这由执行的指令来解释。\nCPU对数据的解释机制：\nCPU本身不知道操作数是什么类型，它完全依据指令操作码来执行相应的微操作序列。加法器电路按数值运算规则处理；逻辑运算电路按位处理并直接设置标志位。类型由指令决定。"},{"id":"d_co_25","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第四章 指令系统","num":25,"date":"2026-06-22","stem":"下列关于RISC说法中，错误的是（ ）","options":{"A":"RISC普遍采用微程序控制器","B":"RISC大多数指令在一个时钟周期内完成","C":"RISC的内部通用寄存器数量相对CISC多","D":"RISC的指令数，寻址方式和指令合适种类相对CISC少"},"answer":["A"],"analysis":"RISC追求高速度、高执行效率，其指令功能简单、格式规整，适合用硬布线控制器（组合逻辑控制器） 实现，译码快，便于流水线。微程序控制器是CISC的典型特征。A错误。","kps":["第4章 指令系统","CISC与RISC","RISC的特征"],"video":"计算机组成原理·六讲 第4章 指令系统-4-边界对齐&大小端&CISC和RISC 27:23-33:05","kpSummary":"RISC 的主要特征：\n精简指令集，指令数量少，功能简单。寻址方式少，指令格式规整，长度固定。有大量通用寄存器，采用Load/Store结构（只有取数和存数指令访问主存）。绝大多数指令可在单周期内完成，便于实现流水线。采用硬布线控制，强调编译器的优化配合。\nCISC 的主要特征：\n指令数量庞大，功能复杂（一条指令可完成多步操作）。寻址方式多样，指令格式可变长。通用寄存器数量相对较少。指令执行时间差异大，采用微程序控制，不易流水线实现。"},{"id":"d_co_26","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第五章 中央处理器","num":26,"date":"2026-06-22","stem":"流水线计算机中，下列语句发生的数据相关类型（ ）。 ADD R1，R2，R3:(R2)+(R3)→R1 ADD R4，R1，R5;(R1)+(R5)→R4","options":{"A":"写后写","B":"读后写","C":"写后读","D":"读后读"},"answer":["C"],"analysis":"ADD R1, R2, R3 这条指令会写入寄存器 R1，而ADD R4, R1, R5这条指令需要读取寄存器 R1 的值，构成“先写后读”的依赖关系。故选C","kps":["第5章 中央处理器","指令流水线","数据相关（数据冒险）"],"video":"计算机组成原理·六讲 第5章 中央处理器-7-指令流水线 28:15-35:58","kpSummary":"流水线中的三种数据相关（数据冒险）：\nRAW（写后读）：真数据相关，最常见，后一条指令依赖前一条指令的结果。必须通过阻塞或转发解决。\nWAW（写后写）：输出相关，静态流水线中不会出现。在乱序执行流水线中可能出现。\nWAR（读后写）：反相关，静态流水线中不会出现，乱序执行时可能因寄存器重命名而消除。"},{"id":"d_co_27","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第五章 中央处理器","num":27,"date":"2026-06-23","stem":"某机共有70个微控制信号（即微命令)，构成6个互斥的微命令组，各组分别是8、11、3、16、7、25个微命令。如果采用字段直接编码方式，微指令的控制字段需要（）位。","options":{"A":"21","B":"22","C":"23","D":"25"},"answer":["C"],"analysis":"字段直接编码法中，每个字段还需要考虑一个nop状态，因此，每段需要编码的状态数 = 组内微命令数 + 1。故各组需要的状态数分别为9、12、4、17、8、26，分别需要4、4、2、5、3、5位，故控制字段总位数 = 4 + 4 + 2 + 5 + 3 + 5 = 23 位。","kps":["第5章 中央处理器","微程序控制器","微指令的编码"],"video":"计算机组成原理·六讲 第5章 中央处理器-4-微程序控制器 18:58-29:55","kpSummary":"微指令控制字段的编码方式：\n直接控制法：每个微命令占一位，无需译码，速度最快但位数极多。\n字段直接编码法：互斥的微命令分在同一字段，用二进制编码表示，额外需要一个状态表示不发出命令。\n字段间接编码法：一个字段的编码含义受另一字段控制，可进一步压缩位数，但译码复杂。"},{"id":"d_co_28","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第五章 中央处理器","num":28,"date":"2026-06-23","stem":"假定不采用Cache和指令预取技术，且机器处于“开中断”状态，则在下列有关指令执行的叙述中，错误的是（ ）。","options":{"A":"每个指令周期中CPU都至少访问内存一次","B":"每个指令周期一定大于或等于一个CPU时钟周期","C":"空操作指令的指令周期中任何寄存器的内容都不会被改变","D":"当前程序在每条指令执行结束时都可能被外部中断打断"},"answer":["C"],"analysis":"没有采用Cache和指令预取技术时，CPU要执行指令，第一步必须到内存中取指令。因此，每个指令周期至少包含一次访存取指操作。A正确。\nCPU 时钟周期是时序的最小单位。一个指令周期由若干个机器周期组成，每个机器周期又包含若干时钟周期。即使是最简单的单周期处理器，完成一条指令也至少需要一个时钟周期。B正确。\n对于空操作指令，CPU在取址后，程序计数器PC会自动“+1”，指向下一条指令的地址。C错误。\n在“开中断”状态下，CPU 在每条指令执行结束的时刻，都会采样中断请求线。如果有外部中断请求信号，且满足优先级等条件，CPU 就会响应中断，转去执行中断服务程序。因此，每条指令结束后都有可能被打断。D正确。","kps":["第5章 中央处理器","指令执行过程","指令周期"],"video":"计算机组成原理·六讲 第5章 中央处理器-2-指令的执行过程 00:00-07:11","kpSummary":"指令周期的基本流程：\n指令周期一般包括取指、间址、执行、中断四个阶段。在没有 Cache 和预取时，取指阶段必须访问内存，因而每个指令周期至少访存一次。\n时钟周期、机器周期、指令周期的关系：\n时钟周期是 CPU 工作节拍的基本单位。一个机器周期通常由若干时钟周期组成，完成一次基本的微操作（如访存）。指令周期则是完成一条指令所需的全部机器周期之和。"},{"id":"d_co_29","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第五章 中央处理器","num":29,"date":"2026-06-24","stem":"下列关于CPU中的数据通路和控制器的叙述中,错误的是（ ）","options":{"A":"通用寄存器组中应该包含程序计数器","B":"控制器中一定包含指令操作码的译码电路","C":"单周期CPU中的控制器比多周期CPU中的更简单","D":"流水线CPU需解决数据相关和控制相关等冒险问题"},"answer":["A"],"analysis":"通用寄存器组是CPU中一组可被程序员直接访问的寄存器，用于暂存数据、地址或作为累加器、变址寄存器等，如x86的EAX、EBX、ECX、EDX等。程序计数器PC是一个专用寄存器，用于存放下一条将要执行的指令的地址，不包含在通用寄存器组内。A错误。\n控制器的核心任务之一就是译码。取指后，指令寄存器IR中的操作码字段必须经过译码电路，产生对应的控制信号序列，用来指挥运算器和数据通路完成指定操作。无论采用硬布线控制器还是微程序控制器，译码电路都是必不可少的部分。B正确。\n单周期CPU所有指令都在一个固定时钟周期内完成，控制信号在一个周期内一次性生成。其控制单元是一个纯组合逻辑电路，没有内部状态，设计相对直接。多周期CPU指令被分成若干步骤在不同周期完成，需要控制器记住当前处于哪个步骤，并依次发出对应的控制信号，因此需要控制器来管理时序和状态转换，复杂度明显高于单周期的组合逻辑。C正确。\n数据相关（冒险）是指后续指令需要用到前面指令尚未写回的结果（RAW等）；控制相关（冒险）是指因为转移指令执行顺序改变而引起的流水线阻塞。流水线 CPU 同时并行执行多条指令的不同阶段，这必然带来指令间的依赖冲突，需要解决冒险问题，D正确。","kps":["第5章 中央处理器","CPU的功能与结构","数据通路与寄存器"],"video":"计算机组成原理·六讲 第5章 中央处理器-7-指令流水线 04:24-11:17+24:04-24:43","kpSummary":"通用寄存器与专用寄存器的分类：\n通用寄存器：程序员可直接操作，用于存放操作数、地址等，数量较多，可灵活使用。\n专用寄存器：完成特定功能，如PC（程序计数器）、IR（指令寄存器）、PSW（程序状态字）、SP（堆栈指针）等，通常由硬件隐式操作。\n流水线中的冒险分类与处理：\n结构冒险：硬件资源冲突。通过增加资源副本（例如分离指令和数据存储器）解决。\n数据冒险：RAW、WAW、WAR，通过转发和阻塞解决。\n控制冒险：分支/跳转引起，通过冲刷、延迟转移、分支预测解决。"},{"id":"d_co_30","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第五章 中央处理器","num":30,"date":"2026-06-24","stem":"下列关于单周期数据通路和多周期数据通路的说法中，正确的是（ ）","options":{"A":"单周期处理器的CPI总比多周期处理器的CPI大","B":"单周期处理器的时钟周期通常比多周期处理器的时钟周期短","C":"在一条指令执行过程中，单周期处理器中的每个控制信号取值一直不变，而多周期处理器中的控制信号可能会发生改变","D":"在一条指令执行过程中，单周期数据通路中和多周期数据通路中的每个部件都可使用多次"},"answer":["D"],"analysis":"CPI即每条指令平均需要的时钟周期数。单周期处理器的所有指令都在一个固定时钟周期内完成，故 CPI = 1。多周期处理器的不同指令被分解为不同数量的执行步骤，每个步骤占一个时钟周期。故 CPI > 1。A错误。\n单周期处理器的时钟周期必须容纳下最慢的那条指令的全部执行时间，这个时钟周期会非常长，严重限制了处理器主频。而多周期处理器把一条指令的执行切成多个时钟周期，每个时钟周期只完成一个相对简单的微操作，耗时远小于整条指令。B错误。\n单周期处理器的控制器是纯组合逻辑电路，在一条指令执行的这一个时钟周期内，输入（操作码）不变，组合逻辑产生的所有控制信号就维持恒定，多周期处理器的控制器需要依据当前处于指令的哪个阶段（状态）来输出不同的控制信号，在同一条指令的不同执行阶段，控制信号是动态变化的。C正确。\n单周期处理器中的一条指令在一个时钟周期内完成，这意味着一套硬件部件在一次指令执行中最多只能被用一次。D错误。","kps":["第5章 中央处理器","数据通路","单周期与多周期数据通路"],"video":"计算机组成原理·六讲 第5章 中央处理器-9-习题 16:58-19:58","kpSummary":"单周期处理器和多周期处理器的区分：\n1.单周期的所有指令，无论复杂与否，都在一个固定的时钟周期内完成全部操作，而多周期不同指令的周期数是可变的。\n2.单周期的时钟周期的长度必须由执行时间最长的指令决定，这导致时钟频率被严重拖慢。而多周期的时钟周期只由单个基本步骤的耗时决定。\n3.单周期的CPI恒为 1，多周期的CPI > 1。\n4.单周期在一条指令执行的这一个时钟周期内，所有控制信号一经产生便维持恒定不变。多周期在一条指令执行的全过程中，控制信号会随着不同执行阶段而动态改变。\n5.单周期采用纯组合逻辑控制器。在一个时钟周期内，每个功能单元只能被使用一次。多周期则用控制器实现，必须包含有限状态机（FSM）或微程序控制器。"},{"id":"d_co_31","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第五章 中央处理器","num":31,"date":"2026-06-25","stem":"在微程序控制方式中，由（ ）形成微程序的入口地址。","options":{"A":"机器指令的地址码","B":"机器指令的操作码","C":"微指令的微地址","D":"微指令的操作码"},"answer":["B"],"analysis":"微程序控制方式中，每一条机器指令都对应一段微程序（由若干条微指令组成），存放在控制存储器中。当CPU取出一条机器指令后，控制器首先要做的就是把这条机器指令的操作码转换为该指令对应微程序的入口地址，这个转换通常由一个专门的硬件——微地址形成部件完成。该部件接收操作码，通过查表或组合逻辑生成微程序入口地址，送入微地址寄存器，从而从控制存储器中读取第一条微指令。故选B。","kps":["第5章 中央处理器","微程序控制器","微程序的入口地址"],"video":"计算机组成原理·六讲 第5章 中央处理器-4-微程序控制器 07:55-08:41","kpSummary":"后续微地址形成的几种方式：\n1.根据机器指令的操作码形成。\n2.有微指令的后继地址字段（下地址字段）指出。这种方式也称断定方式。\n3.增量计数器法，即(μPC) + 1 = μPC\n4.根据各种标志决定（如JMP指令）。\n5.由硬件直接产生微程序入口地址（如中断周期、取址周期前）。"},{"id":"d_co_32","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第五章 中央处理器","num":32,"date":"2026-06-25","stem":"下面有关微指令、指令和微程序、程序的说法中，正确的是()。","options":{"A":"每一条指令对应着一条微指令。","B":"每一条指令就是由一段微程序来解释执行的。","C":"程序就是由微程序构成的，指令就是由微指令构成的。","D":"程序是指令的有序集合，而指令是微程序的有序集合。"},"answer":["D"],"analysis":"程序由一系列机器指令组成，一条机器指令的功能由一段微程序解释，实现一段微程序由若干条微指令组成。A错误。\nCPU 将机器指令的操作码转换为一段微程序的入口地址，然后顺序执行该微程序中的各条微指令，通过它们的控制信号一步步完成指令功能。B正确。\n程序的上层是软件，它只能由同层次的指令构成，与硬件层的微程序无关。指令和微指令分属不同层次，是“解释”关系，不是“构成”关系。C错误。\n微程序是微指令的有序集合。微程序存在的目的是为了解释指令，而不是指令由微程序组成。D错误。","kps":["第5章 中央处理器","微程序控制器","微程序与机器指令"],"video":"计算机组成原理·六讲 第5章 中央处理器-4-微程序控制器 00:00-03:21","kpSummary":"程序的层次结构（从宏到微）：\n程序：由程序员编写，是机器指令的有序集合，完成特定任务。\n指令：程序的基本单元，是 CPU 执行的、对程序员可见的命令。在微程序控制CPU中，每条指令由一段微程序解释。\n微程序：由硬件设计者编写，存放在CPU控制存储器中，是微指令的有序集合，用于解释执行一条机器指令。\n微指令：微程序的基本单元，其各个字段直接产生控制信号，驱动数据通路完成一步基本微操作。"},{"id":"d_co_33","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第五章 中央处理器","num":33,"date":"2026-06-26","stem":"某计算机中，各种指令的CPI平均为8，CPU采用5级流水线方式执行指令，流水线每拍为2个时钟周期。执行程序A时，共执行2000条指令，此时流水线的加速比约为（ ）","options":{"A":"4","B":"5","C":"8","D":"10"},"answer":["A"],"analysis":"对于 k 级流水线，完成 n 条指令的总时间为：T = (k + n - 1) × 1拍时间。故采用流水线后的指令执行总时间为(5 + 2000 - 1) × 2T = 4008T。由于各种指令的CPI平均为8，故非流水线的执行总时间为2000 × 8T = 16000T。故加速比 S = 非流水线执行时间 / 流水线执行时间 = 16000T / 4008T ≈ 4。","kps":["第5章 中央处理器","指令流水线","流水线的性能（加速比）"],"video":"计算机组成原理·六讲 第5章 中央处理器-7-指令流水线 16:54-23:43","kpSummary":"影响加速比的实际因素：\n流水线级数k：k越大，填满开销(k-1)越大，需要足够多的指令才能接近理想加速比。\n流水线节拍时间的不均：节拍时间由最慢的一级决定，如果某级特别慢，会拖累整个流水线。\n流水线冒险：数据相关、控制相关等会导致流水线停顿，实际加速比会更低。"},{"id":"d_co_34","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第六章 总线和IO系统","num":34,"date":"2026-06-26","stem":"下列有关I/O接口的叙述中，错误的是（ ）","options":{"A":"状态端口和控制端口可以合用同一个寄存器","B":"I/O接口中CPU可访问的寄存器称为I/O端口","C":"采用独立编址方式时，I/O端口地址和主存地址可能相同","D":"采用统一编址方式时，CPU不能用访存指令访问I/O端口"},"answer":["D"],"analysis":"I/O 端口是指在I/O接口中能够被CPU直接读或写（通过地址译码选中）的寄存器，包括数据寄存器、状态寄存器和控制寄存器等。因为状态端口是读操作，控制端口是写操作，二者在操作方向上互斥，且在访问时间上也是错开的，因此，接口电路中可以让它们共用一个寄存器地址（即一个端口号）。A、B正确。\n根据编址方式的不同，I/O编址主要分为独立编址和统一编址。独立编址是指对所有的I/O端口进行编号，使它们成为一个独立的I/O地址空间，这个地址空间与主存地址空间相互独立、互不重叠，CPU需设置专门的I/O指令来访问端口。统一编址是指将I/O端口与主存存储单元进行统一编号，在这种方式下，不需要专门的I/O指令，所偶有能够访问主存的指令都可以用来访问I/O端口。C正确，D错误。","kps":["第7章 输入/输出系统","I/O接口","I/O编址方式"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-2-IO接口 全部","kpSummary":"独立编址和统一编址的优缺点：\n独立编址的优点是I/O地址空间独立，I/O指令与访存指令分开，程序清晰易读；I/O地址线较少，译码简单。缺点是需要专门的I/O指令，增加了指令系统的复杂性；I/O端口数量受地址线数限制，通常较少。\n统一编址的优点是无需专门的I/O指令，简化了指令系统；对I/O端口的操作与对存储器的操作完全相同，编程灵活。缺点是I/O端口占用了一部分主存空间，减少了实际可用的主存容量；由于访问主存和访问I/O使用同一套指令，在程序阅读上不如独立编址清晰。"},{"id":"d_co_35","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第六章 总线和IO系统","num":35,"date":"2026-06-27","stem":"下列选项中，发生中断请求的条件有（ ）。 I.一条指令执行结束II.机器内部发生故障 III.一次I/O操作结束IV.一次DMA操作结束 V.每个机器周期结束","options":{"A":"仅I、II","B":"II、III、IV","C":"I、II、III","D":"仅IV、V"},"answer":["B"],"analysis":"中断请求指由硬件或软件事件触发，发出请求信号，让CPU知道有事情需要处理。这个请求可以在任何时候发生。中断响应是指CPU收到请求后，在满足条件时暂停当前程序，转去执行中断服务程序。I是响应中断的时机，而不是发生中断请求的条件。II、III、IV均是中断请求的条件。V只是CPU工作流程的一个节点，并不自动产生中断请求。故选B。","kps":["第7章 输入/输出系统","中断系统","中断的分类"],"video":"计算机组成原理·六讲 第5章 中央处理器-6-异常和中断机制 全部","kpSummary":"中断的分类（内中断与外中断）：\n内中断（异常）：由CPU内部或执行指令产生的意外事件，细分为故障（校验错）、陷入（系统调用）、终止（电源掉电）等。选项 II 属于故障类内中断。\n外中断（中断）：由 CPU 外部设备发出请求，如 I/O 完成、时钟中断等。选项 III 属于外中断。"},{"id":"d_co_36","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第六章 总线和IO系统","num":36,"date":"2026-06-27","stem":"某计算机有4级中断，其响应优先级从高到低分别为A>B>C>D。若要将中断处理优先级的顺序修改为C>A>D>B，则","options":{"A":"1111、1011、0011、0001","B":"1101、0100、1111、0101","C":"1101、1111、0001、1001","D":"1001、0001、1111、1101"},"answer":["B"],"analysis":"屏蔽字的每一位从高到低对应响应优先级顺序，即从左到右依次代表 A、B、C、D。某位为 1 表示屏蔽该中断，0 表示开放。C 的处理优先级最高，处理 C 时，不允许被任何其他中断打断，因此必须屏蔽所有其他中断及自身。故C的屏蔽字为1111。A 的处理优先级次高，处理 A 时，只有比它更高的 C 可以打断，因此需屏蔽 A 自身、D、B，开放 C。故A的中断屏蔽字为1101。其余同理，故选B。","kps":["第7章 输入/输出系统","中断系统","中断优先级与屏蔽"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-3-程序查询方式和中断方式 29:12-33:49","kpSummary":"中断优先级的两层含义：\n响应优先级：由硬件排队电路决定，当多个中断同时请求时，CPU 先响应级别高的。无法通过软件改变。\n处理优先级：通过软件设置中断屏蔽字来动态改变，决定正在处理中断时能否被其他中断打断。"},{"id":"d_co_37","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第六章 总线和IO系统","num":37,"date":"2026-06-29","stem":"下列有关中断I/O方式和DMA方式比较的叙述中，不正确的是（ ）。","options":{"A":"中断I/O方式请求的是CPU处理时间，DMA方式请求的是总线使用权","B":"中断响应发生在一条指令执行结束后，DMA响应发生在一个总线事务完成后","C":"中断I/O方式下数据传送通过软件完成，DMA方式下数据传送由硬件完成","D":"中断I/O方式适用于所有外部设备，DMA方式仅适用于快速外部设备"},"answer":["D"],"analysis":"中断I/O方式适用于慢速或中低速外设（如键盘、鼠标、打印机等）。这些设备数据率低，CPU有足够时间在两次中断之间处理其他任务。对于高速外设（如磁盘、固态硬盘），若采用中断方式，每次传送一个字节或一个字就产生一次中断，CPU会被频繁打断，大量时间耗费在保存和恢复现场上，效率极低，甚至可能来不及响应导致数据丢失。因此，中断方式不适用于高速外设。同时，多路型DMA控制器也适合同时为多个慢速外设服务。D错误。其余选项正确。","kps":["第7章 输入/输出系统","I/O方式比较","中断与DMA的比较"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-4-DMA方式 00:00-13:12","kpSummary":"中断 I/O 方式的核心特征：\nCPU 响应外设中断，通过执行程序指令实现数据传送，数据需要经过CPU寄存器中转。每传送一个数据块，需要多次中断 CPU，适用于慢速外设的逐字传送。\nDMA 方式的核心特征：\n数据传送由DMA控制器硬件直接控制，在主存和外设之间建立直接数据通路，CPU不参与数据传送过程，只需在传送开始和结束时介入。传送过程中CPU让出总线控制权。"},{"id":"d_co_38","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第六章 总线和IO系统","num":38,"date":"2026-06-29","stem":"某设备以中断方式与CPU进行数据交换，CPU主频为1GHz，设备接口的数据缓冲寄存器为32位，设备的数据传输率为50KB/s。若每次中断开销（包括中断响应和中断处理）为1000个时钟周期，则CPU用于该设备输入/输出的时间占整个CPU时间的百分比最多是（ ）","options":{"A":"1.25%","B":"2.5%","C":"5%","D":"12.5%"},"answer":["A"],"analysis":"设备每秒需要传送的总字节数为50000字节。每中断一次可以传送4字节，故每秒中断次数 = 总字节数 ÷ 每次传送字节数 = 12500次。每次中断消耗 1000 个时钟周期，则每秒用于中断的时钟周期数为12,500,000 个周期。故CPU用于该设备输入/输出的时间占整个CPU时间的百分比最多是12500000/1G = 1.25%","kps":["第7章 输入/输出系统","中断系统","中断方式的数据传送"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-3-程序查询方式和中断方式 04:12-13:49 + 第6章 总线和IO系统-5-习题 39:01-39:55","kpSummary":"中断方式的数据传送粒度：\n在中断I/O方式中，每次中断传送的数据量由接口中的数据缓冲寄存器宽度决定，这是计算中断频率的基础。\n数据传输率的单位换算：\n在计算机通信和 I/O 传输率中，K、M 通常以 10 的幂次计算（1 Kb/s = 1000 b/s，1 KB/s = 1000 B/s），这与存储器容量中的 1024 不同。"},{"id":"d_co_39","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第六章 总线和IO系统","num":39,"date":"2026-06-30","stem":"下列设备中，适合采用DMA输入输出的设备是（ ） Ⅰ键盘 Ⅱ网卡 Ⅲ固态硬盘 Ⅳ针式打印机","options":{"A":"Ⅰ、Ⅱ","B":"Ⅱ、Ⅲ","C":"Ⅱ、Ⅳ","D":"Ⅲ、Ⅳ"},"answer":["B"],"analysis":"DMA 适合高速、批量数据传送的外部设备，而低速、字符型设备通常用中断或程序查询方式。\n键盘是典型的慢速字符设备，SSD是典型的高速块设备。现代网卡（尤其千兆、万兆网卡）需要高速、连续地传送大量网络数据包，适合采用DMA方式。针式打印机是一种慢速字符输出设备，打印速度以字符每秒或行每分计算，数据率很低，不适合使用DMA。故选B。","kps":["第7章 输入/输出系统","DMA方式","DMA适用的设备"],"video":"计算机组成原理·六讲 第6章 总线和IO系统-4-DMA方式 00:00-07:31","kpSummary":"I/O 方式选择的典型对应关系\n程序查询：用于极简单的、对 CPU 占用不敏感的场合，或慢速设备（如状态检测）。\n程序中断：用于慢速或中低速、随机发生的 I/O，如键盘、鼠标、打印机、早期串口通信。每次传送的数据量小，但要求实时响应。\nDMA 方式：用于高速、批量传输的 I/O 设备，如磁盘、固态硬盘、图形显示卡、高速网络接口、数据采集卡。"},{"id":"d_co_40","source":"daily","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第六章 总线和IO系统","num":40,"date":"2026-06-30","stem":"下列关于程序中断方式和DMA方式的表述中，正确的是（）。 I. 程序中断的优先级比DMA的优先级要高 II. 程序中断方式需要保护现场，而DMA方式不需要保护现场 III. 程序中断方式需要用到中断，而DMA方式不需要用到中断 IV. 两种方式都需要用到中断，但目的不同","options":{"A":"I、III","B":"II、III","C":"I、IV","D":"II、IV"},"answer":["D"],"analysis":"DMA优先级高于中断，I错误；程序中断需要保护现场，DMA方式不涉及CPU寄存器，无需保护现场，II正确；DMA方式在传输结束时也会触发中断通知CPU，III错误；程序中断用于数据传输，DMA中断用于报告传输完成，目的不同，IV正确，D正确。","kps":["第7章 输入/输出系统","I/O方式比较","程序中断与DMA的对比"],"video":"计算机组成原理·六讲 第5章 中央处理器-4-微程序控制器 07:55-08:41","kpSummary":""},{"id":"b_ds_1_第一讲 绪论","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第一章 绪论","num":1,"date":"","stem":"以下逻辑结构中哪一个属于非线性结构（ ）","options":{"A":"队列","B":"栈","C":"线性表","D":"二叉树"},"answer":["D"],"analysis":"线性结构中每个数据元素最多只有一个直接前驱和一个直接后继。非线性结构中每个数据元素可能对应多个直接前驱和多个直接后继。二叉树中一个节点最多有两个子节点作为直接后继，属于非线性结构。","kps":["数据结构","第一讲 绪论"],"video":"","_n":"以下逻辑结构中哪一个属于非线性结构()"},{"id":"b_ds_2_第一讲 绪论","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第一章 绪论","num":2,"date":"","stem":"在存储数据时，通常不仅要存储各数据元素的值，还需要存储（\n）","options":{"A":"数据的操作方法","B":"数据元素的类型","C":"数据元素之间的关系","D":"数据的存取方法"},"answer":["C"],"analysis":"任意一种数据结构中，存储数据时不仅要存储数据元素的值，还要能够体现出数据元素之间的逻辑关系。","kps":["数据结构","第一讲 绪论"],"video":"","_n":"在存储数据时,通常不仅要存储各数据元素的值,还需要存储()"},{"id":"b_ds_3_第一讲 绪论","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第一章 绪论","num":3,"date":"","stem":"下列关于数据结构的说法中，正确的是（ ）","options":{"A":"逻辑结构独立于物理结构","B":"物理结构独立于逻辑结构","C":"逻辑结构可以唯一决定其物理结构","D":"数据结构仅由其逻辑结构和物理结构决定"},"answer":["A"],"analysis":"逻辑结构是数据的抽象关系，物理结构是其具体存储实现，逻辑结构不依赖物理结构，但数据的存储是逻辑结构在计算机上的映射，故物理结构不能独立于逻辑结构而存在，故A 正确，B错误。决定物理结构的除了逻辑结构特性，还有存储介质特性，故 C 错误。数据结构由逻辑结构、物理结构和数据的运算共同决定，故D错误。","kps":["数据结构","第一讲 绪论"],"video":"","_n":"下列关于数据结构的说法中,正确的是()"},{"id":"b_ds_4_第一讲 绪论","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第一章 绪论","num":4,"date":"","stem":"下列说法中正确的是（ ）","options":{"A":"数据结构研究的是数值计算问题中的数据组织与操作问题","B":"逻辑结构指的是数据元素之间的关系","C":"存储结构是数据在计算机中的存储映像，与逻辑结构无关","D":"存储结构分为线性结构和非线性结构两种"},"answer":["B"],"analysis":"数据结构研究的是非数值计算的程序设计问题，故A错误。一种逻辑结构可以采用一种或多种存储方式来表达数据元素之间的逻辑关系，存储结构必须能够体现出逻辑结构，故C错误。存储结构分为顺序存储、链式存储、索引存储和散列存储，逻辑结构分为线性结构和非线性结构，故D错误。","kps":["数据结构","第一讲 绪论"],"video":"","_n":"下列说法中正确的是()"},{"id":"b_ds_5_第一讲 绪论","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第一章 绪论","num":5,"date":"","stem":"给出程序段如下，则该程序段的时间复杂度是（ ）int x=0;while (n>=(x+1)*(x+1))x=x+1;","options":{"A":"O(logn)","B":"O(√n)","C":"O(n)","D":"O(n²)"},"answer":["B"],"analysis":"每轮循环将x自增1，当(x+1)²＞n时跳出循环，不妨设(x+1)²=n，得x+1=√n，所以程序的时间复杂度为O(√n)。","kps":["数据结构","第一讲 绪论"],"video":"","_n":"给出程序段如下,则该程序段的时间复杂度是()"},{"id":"b_ds_6_第一讲 绪论","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第一章 绪论","num":6,"date":"","stem":"给出程序段如下，则该程序段的时间复杂度是（ ）int i=0, j=1;while(i+j <= n){if(i<j)i++;elsej++;\n}","options":{"A":"O(n²)","B":"O(nlogn)","C":"O(n)","D":"O(n³)"},"answer":["C"],"analysis":"每一轮循环中，if-else语句必执行其中一个分支，要么执行i++，要么执行j++，但无论执行哪个分支，最终的效果都等价于将i+j 表达式的值加1，i+j从初始值1增至n+1，总循环次数为n，时间复杂度为 O(n)。","kps":["数据结构","第一讲 绪论"],"video":"","_n":"给出程序段如下,则该程序段的时间复杂度是()"},{"id":"b_ds_7_第一讲 绪论","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第一章 绪论","num":7,"date":"","stem":"下列关于时间复杂度的描述中正确的是（ ）","options":{"A":"时间复杂度相同的算法在相同的计算机上的运行时间相同","B":"算法的时间复杂度仅反映算法的运行时间与问题规模之间的关系","C":"时间复杂度相同的算法在解决问题的规模相同时运行时间相同","D":"算法的时间复杂度与问题的规模和计算机硬件的运行速度相关"},"answer":["B"],"analysis":"算法的时间复杂度考虑的只是运行时间和问题规模n之间的关系，而非精确计算基本操作执行次数。算法运行时间不只与算法的时间复杂度相关，还与执行算法的设备和环境等因素有关。时间复杂度是事先对算法效率进行估算，和计算机硬件的运行速度无关。","kps":["数据结构","第一讲 绪论"],"video":"","_n":"下列关于时间复杂度的描述中正确的是()"},{"id":"b_ds_1_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":1,"date":"","stem":"在长度为n的顺序表中，对于如下操作，时间复杂度是O(1)的是（ ）。","options":{"A":"访问第i(1≤i≤n)个元素和求第i(1＜i≤n)个元素的直接前驱","B":"在第i(1≤i≤n)个元素后插入一个新元素","C":"删除第i(1≤i≤n)个元素","D":"将n个元素从小到大排序"},"answer":["A"],"analysis":"在顺序表中访问第i个元素及其前驱都可以利用顺序表的随机存取特性，时间复杂度为O(1)，故A正确。在顺序表中插入元素和删除元素的时间复杂度均为O(n)，故B和C错误，在考研范围内，将n个元素从小到大排序的时间复杂度不低于O(nlogn)，具体可参考第9章 排序相关考点。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"在长度为n的顺序表中,对于如下操作,时间复杂度是o(1)的是()."},{"id":"b_ds_2_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":2,"date":"","stem":"在一个长度为n的顺序表中删除第i(1≤i≤n)个元素，需要向前移动（ ）个元素。","options":{"A":"n-i","B":"n-i+1","C":"n-i-1","D":"i+1"},"answer":["A"],"analysis":"在一个长度为n的顺序表中删除第i个元素，需要将第i+1个元素~第n个元素都向前移动一个位置，共移动n-i个元素。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"在一个长度为n的顺序表中删除第i(1≤i≤n)个元素,需要向前移动()个元素."},{"id":"b_ds_3_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":3,"date":"","stem":"在长度为n的顺序表中等概率插入一个元素所需移动的元素的平均个数是（ ）。","options":{"A":"n/2","B":"n","C":"n+1","D":"(n+1)／2"},"answer":["A"],"analysis":"在第n+1个位置插入元素需要移动0个元素，在第n个位置插入元素需要移动1个元素，…，在第1个位置插入元素需要移动n个元素。故插入一个元素平均需要移动的元素个数为（0+1+2+...+n）/（n+1） = n/2。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"在长度为n的顺序表中等概率插入一个元素所需移动的元素的平均个数是()."},{"id":"b_ds_4_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":4,"date":"","stem":"在长度为n的顺序表中等概率删除一个元素所需移动的元素的平均个数为（ ）。","options":{"A":"(n-1)/2","B":"n/2","C":"(n+1)／2","D":"n"},"answer":["A"],"analysis":"若删除第1个元素，则第2～n个元素依次前移一个位置，共需要移动n-1次，若删除第2个元素，则第3～n个元素依次前移一个位置，共需要移动n-2次，…，若删除第n-1个元素，则第n个元素前移一个位置，共需要移动1次，若删除第n个元素，则无须移动元素。故删除一个元素平均需要移动的元素个数为（0+1+2+...+n-1）/n = （n-1）/2。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"在长度为n的顺序表中等概率删除一个元素所需移动的元素的平均个数为()."},{"id":"b_ds_5_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":5,"date":"","stem":"将两个各有n个元素的有序表归并成一个有序表，其最少的比较次数为（ ）。","options":{"A":"n","B":"2n-1","C":"2n","D":"n-1"},"answer":["A"],"analysis":"将两个有序表合并，当其中一个表的元素均比另外一个表中的元素大时，其比较次数最小，只需要比较一个表长即可，最少的比较次数是n次，如表1=(1,2,3,4)，表2=(5,6,7,8)；当两个表的元素大小呈现交叉状态时，比较次数最多，最多是2n-1次，如表1=(1,3,5,7)，表2=(2,4,6,8)。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"将两个各有n个元素的有序表归并成一个有序表,其最少的比较次数为()."},{"id":"b_ds_6_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":6,"date":"","stem":"在一个长度为n(n＞1)且有头节点的单链表上，设有头指针和尾指针，分别指向该链表的第一个节点和最后一个节点，则执行（ ）操作的时间复杂度与链表的长度有关。","options":{"A":"删除单链表中的第一个元素","B":"删除单链表中的最后一个元素","C":"在单链表第一个元素前插入一个新元素","D":"在单链表最后一个元素后插入一个新元素"},"answer":["B"],"analysis":"删除节点或者插入节点需要找到其前驱节点，头指针所指头节点是第一个元素的前驱节点，因此删除单链表中的第一个元素和在单链表第一个元素前插入一个新元素都可以直接通过头指针完成，不需要遍历，时间复杂度O(1)，与表长无关，在单链表最后一个元素后插入一个新元素可以直接通过尾指针完成，不需要遍历，时间复杂度O(1)，与表长无关，而删除单链表中的最后一个元素需要通过遍历找到最后一个节点的前驱，时间复杂度为O(n)，与表长有关。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"在一个长度为n(n＞1)且有头节点的单链表上,设有头指针和尾指针,分别指向该链表的第一个节点和最后一个节点,则执行()操作的时间复杂度与链表的长度有关."},{"id":"b_ds_7_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":7,"date":"","stem":"指针p指向单链表中某一节点，现要在p之后插入指针s所指节点，正确的操作是（ ）。","options":{"A":"p-＞next=s；s-＞next=p-＞next；","B":"s-＞next=p-＞next；p-＞next=s；","C":"p-＞next=s；p-＞next=s-＞next；","D":"p-＞next=s-＞next；p-＞next=s；"},"answer":["B"],"analysis":"在p节点之后插入一个节点s，只需令s的指针域指向p的后继节点(s-＞next=p-＞next)，再调整p的指针域指向s节点(p-＞next=s)。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"指针p指向单链表中某一节点,现要在p之后插入指针s所指节点,正确的操作是()."},{"id":"b_ds_8_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":8,"date":"","stem":"设单链表的头指针变量为 head且该链表没有头节点，则其判空条件为（ ）。","options":{"A":"head==NULL","B":"head-＞next==NULL","C":"head-＞next==head","D":"head!=NULL"},"answer":["A"],"analysis":"单链表的头指针变量为head且该链表没有头节点，则判空的条件为head==NULL。若该链表具有头节点，则判空的条件为head-＞next==NULL。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"设单链表的头指针变量为head且该链表没有头节点,则其判空条件为()."},{"id":"b_ds_9_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":9,"date":"","stem":"将长度为n的单链表链接在长度为m的单链表之后的算法的时间复杂度为（ ）。","options":{"A":"O(1)","B":"O(n)","C":"O(m)","D":"O(m+n)"},"answer":["C"],"analysis":"将长度为n的单链表链接在长度为m的单链表之后，必须顺序遍历长度为m的单链表寻找该表的最后一个节点，修改该节点的后继指针指向长度为n的单链表中的第一个节点，所以时间复杂度为O(m)。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"将长度为n的单链表链接在长度为m的单链表之后的算法的时间复杂度为()."},{"id":"b_ds_10_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":10,"date":"","stem":"在一个长度为n的单链表的第i(1≤i≤n)个元素后面插入一个元素时，需要向后移动（ ）个元素。","options":{"A":"n-i","B":"n-i+l","C":"n-i-1","D":"0"},"answer":["D"],"analysis":"单链表的插入和删除不需要移动元素，只需要修改指针。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"在一个长度为n的单链表的第i(1≤i≤n)个元素后面插入一个元素时,需要向后移动()个元素."},{"id":"b_ds_11_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":11,"date":"","stem":"在单链表中，指针p指向元素为x的节点，实现删除x的后继节点的语句是（ ）。","options":{"A":"p=p-＞next；","B":"p-＞next=p-＞next-＞next；","C":"p-＞next=p；","D":"p=p-＞next-＞next；"},"answer":["B"],"analysis":"只需要将p的指针域修改为其后继节点的后继节点的地址即可，p-＞next=p-＞next-＞next。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"在单链表中,指针p指向元素为x的节点,实现删除x的后继节点的语句是()."},{"id":"b_ds_12_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":12,"date":"","stem":"对于一个具有n个节点的单链表，在已知的节点p后插入一个新节点的时间复杂度和在给定值为 x 的节点后插入一个新节点的时间复杂度分别为（ ）。","options":{"A":"O(1),O(n)","B":"O(n),O(n)","C":"O(1),O(1)","D":"O(n),O(1)"},"answer":["A"],"analysis":"当指定插入位置的直接前驱时，只需要在该位置修改指针即可，题目中给定了节点p，要在其后插入元素，只需要修改指针即可，不需要遍历，时间复杂度是O(1)。而当给定元素值时，需要通过遍历和比较找到其前驱，时间复杂度是O(n)。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"对于一个具有n个节点的单链表,在已知的节点p后插入一个新节点的时间复杂度和在给定值为x的节点后插入一个新节点的时间复杂度分别为()."},{"id":"b_ds_13_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":13,"date":"","stem":"关于线性表的顺序存储结构和链式存储结构的描述中，正确的是（ ）。\nⅠ．线性表的顺序存储结构优于其链式存储结构\nⅡ．链式存储结构比顺序存储结构能更方便地表示各种逻辑结构\nⅢ．如频繁使用插入和删除结点操作，顺序存储结构更优于链式存储结构\nⅣ．顺序存储结构和链式存储结构都可以进行顺序存取","options":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ","D":"Ⅲ、Ⅳ"},"answer":["B"],"analysis":"线性表的顺序存储和链式存储在不同的应用场景下各有千秋，不能说线性表的顺序存储表示优于链式存储表示。如果需要频繁进行插入和删除操作，应该选用链式存储，只需要修改对应的指针即可，而顺序表插入删除可能需要移动大量元素。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"关于线性表的顺序存储结构和链式存储结构的描述中,正确的是().ⅰ．线性表的顺序存储结构优于其链式存储结构ⅱ．链式存储结构比顺序存储结构能更方便地表示各种逻辑结构ⅲ．如频繁使用插入和删除结点操作,顺序存储结构更优于链式存储结构ⅳ．顺序存储结构和链式存储结构都可以进行顺序存取"},{"id":"b_ds_14_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":14,"date":"","stem":"已知表头元素为c的单链表在内存中的存储状态如下表所示。\n现将f存放于1014H处并插入到单链表中，若f在逻辑上位于a和e之间，则a，e，f的“链接地址”依次是（ ）。","options":{"A":"1010H,1014H,1004H","B":"1010H,1004H,1014H","C":"1014H,1010H,1004H","D":"1014H,1004H,1010H"},"answer":["D"],"analysis":"将f插入到a和e之间，那么此时a的后继为f，f的后继为e，e的后继不变仍为b。于是，a的链接地址变为1014H，f的链接地址变为1010H，e的链接地址仍然是1004H，如图1所示，因此选D。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"已知表头元素为c的单链表在内存中的存储状态如下表所示.\u0001现将f存放于1014h处并插入到单链表中,若f在逻辑上位于a和e之间,则a,e,f的\"链接地址\"依次是()."},{"id":"b_ds_15_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":15,"date":"","stem":"某线性表中最常用的操作是在最后一个元素之后插入一个新元素和删除第一个元素，则采用（ ）存储方式最节省运算时间。","options":{"A":"单链表","B":"仅有头指针的单循环链表","C":"双链表","D":"仅有尾指针的单循环链表"},"answer":["D"],"analysis":"对于在最后一个元素之后插入的操作，A、B、C都需要遍历到链表末尾，时间复杂度为O(n)，删除第一个元素的时间复杂度为O(1)。而有尾指针（设为r）的单循环链表在最后一个元素之后插入元素的时间复杂度为O(1)，也可以方便地取到链表的第一个元素，若不含有头结点，则第一个元素为尾结点的后继 r->next，若含有头结点，则第一个元素为尾结点的后继的后继r->next->next，删除操作都为O(1)。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"某线性表中最常用的操作是在最后一个元素之后插入一个新元素和删除第一个元素,则采用()存储方式最节省运算时间."},{"id":"b_ds_16_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":16,"date":"","stem":"若要在双向链表指针p所指结点之前插入一个指针q所指向的结点，则下面哪个操作序列是错误的（ ）。","options":{"A":"q->prior=p->prior; p->prior->next=q; q->next=p; p->prior=q;","B":"q->next=p; p->prior->next=q; q->prior=p->prior; p->prior=q;","C":"q->prior=p->prior; q->next=p; p->prior->next=q; p->prior=q;","D":"q>next=p; p->prior=q; q->prior=p->prior; p->prior->next=q;"},"answer":["D"],"analysis":"D选项中首先执行q>next=p;使q结点的next域指向p结点，使p结点作为q结点的后继。然后执行p->prior=q;使p结点的prior域指向q结点，使q结点作为p结点的前驱结点。对于q->prior=p->prior，p结点的前驱指向了q结点，因此会使q结点的prior域指向其自己，不正确。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"若要在双向链表指针p所指结点之前插入一个指针q所指向的结点,则下面哪个操作序列是错误的()."},{"id":"b_ds_17_第二讲 线性表","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第二章 线性表","num":17,"date":"","stem":"设单循环链表中结点的结构为(data，next)，且r是指向非空的带头结点的单循环链表的尾结点的指针，若要删除链表的第一个结点，则应执行（ ）操作。","options":{"A":"s=r; r=r->next; free(s);","B":"r=r->next; free(r);","C":"r=r->next->next; free(r);","D":"s=r->next->next; r->next->next=s->next; free(s);"},"answer":["D"],"analysis":"r->next 指向此链表的头结点,首先令 s 指向待删除结点(s=r->next->next)，然后使头结点的 next 指针指向 s 指向结点的后继结点(r->next->next=s->next)，然后将待删除结点s释放free(s)。","kps":["数据结构","第二讲 线性表"],"video":"","_n":"设单循环链表中结点的结构为(data,next),且r是指向非空的带头结点的单循环链表的尾结点的指针,若要删除链表的第一个结点,则应执行()操作."},{"id":"b_ds_1_第三讲 栈和队列","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第三章 栈和队列","num":1,"date":"","stem":"设栈S的初始状态为空，元素ABCDEFG按顺序进入栈S，进栈的过程中也可执行退栈操作，若出栈顺序是BDCFEAG，则栈S的容量至少是（ ）。","options":{"A":"1","B":"2","C":"3","D":"4"},"answer":[],"analysis":"BDCFEAG，入栈出栈过程：A入栈、B入栈、B出栈、C入栈、D入栈、D出栈、C出栈、E入栈、F入栈、F出栈、E出栈、A出栈、G入栈、G出栈，在此过程中，栈中元素最多时有3个元素，故栈S的容量至少为3。","kps":["数据结构","第三讲 栈和队列"],"video":"","_n":"设栈s的初始状态为空,元素abcdefg按顺序进入栈s,进栈的过程中也可执行退栈操作,若出栈顺序是bdcfeag,则栈s的容量至少是()."},{"id":"b_ds_2_第三讲 栈和队列","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第三章 栈和队列","num":2,"date":"","stem":"现有5个元素，其入栈序列为A，B，C，D，E，在各种可能的出栈次序中，以元素C，D最先出栈的次序不包括（ ）。","options":{"A":"CDEBA","B":"CDBEA","C":"CDBAE","D":"CDAEB"},"answer":["D"],"analysis":"若元素C，D最先出栈，则在ABC依次进栈之后，C出栈，然后D进栈，D出栈，此时栈中只有A和B，且B在栈顶，B必然在A之前出栈，因此不合法的是D。","kps":["数据结构","第三讲 栈和队列"],"video":"","_n":"现有5个元素,其入栈序列为a,b,c,d,e,在各种可能的出栈次序中,以元素c,d最先出栈的次序不包括()."},{"id":"b_ds_3_第三讲 栈 ysis":"一般情况下，循环队列初始化时front=rear=0或front=rear=-1，因此队满的条件是(rear+1)%MaxSize == front，故选A。","kps":["数据结构","第三讲 栈和队列"],"video":"","_n":"设循环队列最大容量为maxsize,用front和rear表示队头指针和队尾指针,则表示队满的条件是()."},{"id":"b_ds_12_第三讲 栈和队列","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第三章 栈和队列","num":12,"date":"","stem":"设栈S和队列Q的初始状态为空，6个元素的入栈顺序为a,b,c,d,e,f，一个元素出栈后立即进入队列Q，若6个元素出队的序列是a,c,f,e,d,b，则栈S的容量至少应该是（ ）。","options":{"A":"6","B":"5","C":"4","D":"3"},"answer":["C"],"analysis":"队列具有先进先出的特性，所以出队顺序=入队顺序，而本题中，入队顺序 = 出栈顺序，所以6个元素的出队顺序a,c,f,e,d,b即出栈顺序。可以通过以下的栈操作得到这个序列。push(a)，pop(a)，push(b)，push(c)，pop(c)，push(d)，push(e)，push(f)，pop(f)，pop(e)，pop(d)，pop(b)。在此过程中，栈中元素最多时有4个元素，故栈的大小至少为4。","kps":["数据结构","第三讲 栈和队列"],"video":"","_n":"设栈s和队列q的初始状态为空,6个元素的入栈顺序为a,b,c,d,e,f,一个元素出栈后立即进入队列q,若6个元素出队的序列是a,c,f,e,d,b,则栈s的容量至少应该是()."},{"id":"b_ds_13_第三讲 栈和队列","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第三章 栈和队列","num":13,"date":"","stem":"设循环队列最大容量为MaxSize，用front和rear表示队头指针和队尾指针，初始时front=rear=0，则任一时刻队列中的元素个数为（ ）。","options":{"A":"rear-front","B":"rear-front-1","C":"(rear-front)%MaxSize+1","D":"(rear-front+MaxSize)%MaxSize"},"answer":[],"analysis":"若初始化时初始化时front=rear=0或front=rear=-1，则队列中元素个数为（rear-front+MaxSize）%MaxSize，故选D。","kps":["数据结构","第三讲 栈和队列"],"video":"","_n":"设循环队列最大容量为maxsize,用front和rear表示队头指针和队尾指针,初始时front=rear=0,则任一时刻队列中的元素个数为()."},{"id":"b_ds_14_第三讲 栈和队列","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第三章 栈和队列","num":14,"date":"","stem":"现有4个元素8,1,4,2依次进入一个输入受限的双端队列，则以下选项中哪一个序列是不可能得到的输出序列是（ ）。","options":{"A":"2,1,4,8","B":"2,8,1,4","C":"1,4,8,2","D":"4,2,1,8"},"answer":["A"],"analysis":"不失一般性，假设输入受限的双端队列左右两端都可以输出，但只有右端能够输入，对于A选项，2第一个出队，则所有元素都已入队，队列中为【8,1,4,2】，在2出队后，要么4从右端出队，要么8从左端出队，1不可能出队，所以A是不可能得到的序列；B选项，队列中为【8,1,4,2】，2从右端出队后，8，1，4依次从左端出队，所以可能得到；类似地，C和D也是可能得到的输出序列。","kps":["数据结构","第三讲 栈和队列"],"video":"","_n":"现有4个元素8,1,4,2依次进入一个输入受限的双端队列,则以下选项中哪一个序列是不可能得到的输出序列是()."},{"id":"b_ds_15_第三讲 栈和队列","source":"bank500","subject":"ds","subjectName" 树","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第六章 树和二叉树","num":18,"date":"","stem":"将森林F转换成二叉树T，则F中各树叶子节点个数之和等于二叉树T中（ ）。","options":{"A":"叶子节点个数","B":"度为1的节点个数","C":"左孩子指针为空的节点个数","D":"右孩子指针为空的节点个数"},"answer":["C"],"analysis":"将森林转为二叉树需要先将森林中的每棵树转换成二叉树，再按给出的森林中的树的次序，从最后一棵二叉树开始，每棵二叉树作为前一棵二叉树的根节点的右子树，以此类推，则第一棵树的根节点就是转换后生成的二叉树的根节点。森林中的叶子节点都是没有孩子的，转换成二叉树后无左孩子，所以F中各树叶子节点个数之和等于二叉树T中左孩子指针为空的节点个数。","kps":["数据结构","第六讲 树和二叉树"],"video":"","_n":"将森林f转换成二叉树t,则f中各树叶子节点个数之和等于二叉树t中()."},{"id":"b_ds_19_第六讲 树和二叉树","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第六章 树和二叉树","num":19,"date":"","stem":"树的遍历有先根遍历和后根遍历，二叉树的遍历有先序遍历、中序遍历、后序遍历，下列结论中（ ）是正确的。","options":{"A":"树的先根遍历序列与其对应二叉树的中序遍历序列相同","B":"树的先根遍历序列与其对应二叉树的后序遍历序列相同","C":"树的后根遍历序列与其对应二叉树的中序遍历序列相同","D":"树的后根遍历序列与其对应二叉树的后序遍历序列相同"},"answer":["C"],"analysis":"树的先根遍历等同于对转换所得的二叉树进行先序遍历，树的后根遍历等同于对转换所得的二叉树进行中序遍历。","kps":["数据结构","第六讲 树和二叉树"],"video":"","_n":"树的遍历有先根遍历和后根遍历,二叉树的遍历有先序遍历,中序遍历,后序遍历,下列结论中()是正确的."},{"id":"b_ds_20_第六讲 树和二叉树","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第六章 树和二叉树","num":20,"date":"","stem":"某二叉树的中序遍历序列为BDAECF，后序遍历序列为DBEFCA，则该二叉树对应的森林中有（ ）棵树。","options":{"A":"1","B":"2","C":"3","D":"4"},"answer":["C"],"analysis":"给定二叉树的中序遍历序列和后序遍历序列，可唯一确定一棵二叉树，将该二叉树转为森林如下图所示，故该二叉树对应的森林中有3棵树。","kps":["数据结构","第六讲 树和二叉树"],"video":"","_n":"某二叉树的中序遍历序列为bdaecf,后序遍历序列为dbefca,则该二叉树对应的森林中有()棵树."},{"id":"b_ds_21_第六讲 树和二叉树","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第六章 树和二叉树","num":21,"date":"","stem":"由5个权值分别为9，2，3，5，14的叶子节点构成的一棵哈夫曼树，该树的带权路径长度为（ ）。","options":{"A":"60","B":"66","C":"67","D":"50"},"answer":["C"],"analysis":"构造哈夫曼树如下图所示。该哈夫曼树的带权路径长度为WPL=(2+3)×4+5×3+9×2+14=67。","kps":["数据结构","第六讲 树和二叉树"],"video":"","_n":"由5个权值分别为9,2,3,5,14的叶子节点构成的一棵哈夫曼树,该树的带权路径长度为()."},{"id":"b_ds_22_第六讲 树和二叉树","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第六章 树和二叉树","num":22,"date":"","stem":"在哈夫曼编码中，若编码长度只允许小于等于5，则除了已经对两个字符编码为0和10外，还可以最多对（ ）个字符编码。","opti G的连通分量\nII.G′为G的无环子图\nIII.G′为G的极小连通子图且V′=V","options":{"A":"仅I和II","B":"仅III","C":"仅II和III","D":"仅I"},"answer":["D"],"analysis":"生成树指的是包含图中全部顶点的一个极小连通子图，非连通图中不同连通分量的生成树构成生成森林。生成树有如下特点：① 生成树是针对连通图而言的，且和连通图顶点数相同；② 有n个顶点的连通图的生成树有n-1条边；③ 生成树中任意两个顶点之间的路径是唯一的；④ 在生成树中再加一条边必然形成回路，去掉一条边必然不再连通；⑤ 生成树不一定唯一。因此I错误，连通分量对应极大连通子图，II和III正确。","kps":["数据结构","第七讲 图"],"video":"","_n":"设有无向连通图g=(v,e)和g′=(v′,e′),如果g′是g的生成树,则下列说法不正确的是().i.g′为g的连通分量ii.g′为g的无环子图iii.g′为g的极小连通子图且v′=v"},{"id":"b_ds_6_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":6,"date":"","stem":"设无向图G中有n个顶点和e条边，则其对应的邻接表中，表头结点和边结点的个数分别是（ ）。","options":{"A":"n，e","B":"e，n","C":"2n，e","D":"n，2e"},"answer":["D"],"analysis":"在无向图的邻接表中，每个顶点对应一个表头节点，每个表头节点中存储一个顶点的数据以及指向一个链表的头指针，每个链表中存储多个边节点，无向图中的每条边对应2个边节点，因此表头结点和边结点的个数分别是n和2e。","kps":["数据结构","第七讲 图"],"video":"","_n":"设无向图g中有n个顶点和e条边,则其对应的邻接表中,表头结点和边结点的个数分别是()."},{"id":"b_ds_7_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":7,"date":"","stem":"下面关于图的存储结构的叙述中，正确的是（ ）。","options":{"A":"用邻接表存储图，占用的存储空间的大小只与图中边数有关，而与顶点个数 无关","B":"用邻接表存储图，占用的存储空间的大小与图中顶点个数和边数都有关","C":"用邻接矩阵存储图，占用的存储空间的大小与图中顶点个数和边数都有关","D":"用邻接矩阵存储图，占用的存储空间的大小只与图中边数有关，而与顶点个 数无关"},"answer":["B"],"analysis":"邻接表存储图时，需要维护一个顶点数组和边链表。顶点数组的大小与顶点个数有关，边链表的总长度与边数有关，因此占用的存储空间的大小与图中顶点个数和边数都有关。邻接矩阵存储图时，需要维护一个|V|×|V|的矩阵，其大小只与顶点个数有关，与边数无关。","kps":["数据结构","第七讲 图"],"video":"","_n":"下面关于图的存储结构的叙述中,正确的是()."},{"id":"b_ds_8_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":8,"date":"","stem":"带权图 G 是用邻接矩阵 A 存储的有向图，则顶点 A 的入度等于 A 中（ ）。","options":{"A":"第i行非无穷的元素之和","B":"第i列非无穷且非零的元素个数之和","C":"第i行非无穷且非零的元素个数","D":"第i行与第i列非无穷且非零的元素之和"},"answer":["B"],"analysis":"在有向带权图的邻接矩阵表示中，顶点的入度是指以该顶点为终点的有向边的数量。对于顶点i，其入度等于邻接矩阵中第i列上非无穷大（表示存在边）且非零（可能表示权值为0的边，但在常见实现中0可能表示无边，具体需根据上下文）的元素个数。因此，统计第i列中非无穷且非零的元素个数即可得到入度。","kps":["数据结构","第七讲 图"],"video":"","_n":"带权图g是用邻接矩阵a存储的有向图,则顶点a的入度等于a中()."},{"id":"b_ds_9_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":9,"date":"","stem":"设矩阵A是有向图G的邻接矩阵，将矩阵A2记作B，若B[i][j]=3，则意味着从顶点i到顶点j（ ）。","options":{"A":"存在3条长度为2的路径","B":"存在3条长度不超过2的路径","C":"存在2条长度为3的路径","D":"存在2条长度不超过3的路径"},"answer":["A"],"analysis":"设邻接矩阵A的m次方矩阵中Am[i][j] = n（i≠j），则表示该图中顶点Vi到顶点Vj长度为m的路径有n条，因此B[i][j]=3，意味着从顶点i到顶点j存在3条长度为2的路径。","kps":["数据结构","第七讲 图"],"video":"","_n":"设矩阵a是有向图g的邻接矩阵,将矩阵a2记作b,若b[i][j]=3,则意味着从顶点i到顶点j()."},{"id":"b_ds_10_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":10,"date":"","stem":"在有向图的邻接表存储结构中，顶点 v 在边节点中出现的次数等于（ ）。","options":{"A":"顶点v的度","B":"顶点v的出度","C":"顶点v的入度","D":"依附于顶点v的边数"},"answer":["C"],"analysis":"在有向图的邻接表存储结构中，每个顶点维护一个链表，存储从该顶点出发的边（即出边）。链表中的每个边节点包含一个顶点标识，表示该边指向的顶点。因此，顶点v出现在边节点中，意味着有一条边以v为终点。所以，顶点v在所有边节点中出现的次数等于以v为终点的边的数量，即顶点v的入度。","kps":["数据结构","第七讲 图"],"video":"","_n":"在有向图的邻接表存储结构中,顶点v在边节点中出现的次数等于()."},{"id":"b_ds_11_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":11,"date":"","stem":"若对无向图G遍历过程中，必须进行两次广度优先搜索才能访问其所有顶点，则下列说法中不正确的是（ ）。","options":{"A":"G肯定不是完全图","B":"G中一定有回路","C":"G 一定不是连通图","D":"G有2个连通分量"},"answer":["B"],"analysis":"对无向图G遍历时，必须进行两次广度优先搜索（BFS）才能访问所有顶点。这意味着从任意一个顶点出发执行一次 BFS 无法访问全部顶点，因此图G 不是连通图，且至少有两个连通分量。实际上，“必须进行两次 BFS” 意味着恰好有两个连通分量，因为如果连通分量多于两个，则需要更多次 BFS。图G 可以没有回路，例如，两个分离的树（无环连通图）构成的非连通图就没有回路，但需要两次 BFS。因此，B不正确。","kps":["数据结构","第七讲 图"],"video":"","_n":"若对无向图g遍历过程中,必须进行两次广度优先搜索才能访问其所有顶点,则下列说法中不正确的是()."},{"id":"b_ds_12_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":12,"date":"","stem":"已知无向图G的邻接表如下图所示，则从顶点v 出发按深度优先遍历0的顶点序列是（ ）。","options":{"A":"v v v v","B":"v v v v","C":"v v v v","D":"v v v v 1 3 2 0 0 2 3 1 0 3 2 1 0 1 2 3"},"answer":["D"],"analysis":"给定邻接表则DFS或者BFS遍历序列是唯一的，从v 出发，遍历v，0 1从v 出发，遍历v，最后遍历v。1 2 3","kps":["数据结构","第七讲 图"],"video":"","_n":"已知无向图g的邻接表如下图所示,则从顶点v0出发按深度优先遍历的顶点序列是().\u0001"},{"id":"b_ds_13_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":13,"date":"","stem":"下列说法中，正确的是（ ）。","options":{"A":"最小生成树也是哈夫曼树","B":"最小生成树唯一","C":"普里姆最小生成树算法时间复杂度为O(n2)","D":"克鲁斯卡尔最小生成树算法更适用于边稠密的图"},"answer":["C"],"analysis":"最小生成树（MST）与哈夫曼树是两种不同的树结构，应用场景和定义均不同，无直接包含关系，A错；最小生成树不唯一，例如当图中存在权值相同的边时，可能产生多个最小生成树，B错；普里姆算法采用邻接矩阵实现时，时间复杂度为 O(n²)，C 正确；克鲁斯卡尔(Kruskal)算法时间复杂度为O(eloge)，适用于求边稀疏的图的最小生成树，D错。","kps":["数据结构","第七讲 图"],"video":"","_n":"下列说法中,正确的是()."},{"id":"b_ds_14_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":14,"date":"","stem":"带权连通图如下图所示，则其最小生成树的代价是（ ）。","options":{"A":"66","B":"68","C":"76","D":"72"},"answer":["D"],"analysis":"使用Prim算法或者Kruskal算法构造最小生成树如下所示，其代价为72。","kps":["数据结构","第七讲 图"],"video":"","_n":"带权连通图如下图所示,则其最小生成树的代价是().\u0001"},{"id":"b_ds_15_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":15,"date":"","stem":"用有向无环图描述表达式(A+B)×[(A+B)／A]，至少需要（ ）个顶点。","options":{"A":"5","B":"6","C":"8","D":"9"},"answer":["A"],"analysis":"用有向无环图表示表达式(A+B)*[(A+B)/A如下图所示。","kps":["数据结构","第七讲 图"],"video":"","_n":"用有向无环图描述表达式(a+b)×[(a+b)／a],至少需要()个顶点."},{"id":"b_ds_16_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":16,"date":"","stem":"已知一个有向图如下图所示，则以下选项中（ ）是由该图得到的一个拓扑序列。","options":{"A":"(v ，v ，v ，v ，v ，v )","B":"(v ，v ，v ，v ，v ，v ) 1 4 6 2 5 3 1 3 5 6 4 2","C":"(v ，v ，v ，v ，v ，v )","D":"(v ，v ，v ，v ，v ，v ) 1 3 4 5 2 6 1 2 5 3 4 6"},"answer":["A"],"analysis":"所谓拓扑排序是指将各个顶点排成一个序列，按此序列完成各顶点代表的活动，可以确保整个工程顺利完成（只关心顺序，不关心活动的持续时间），其方法是：（1）在有向图中选一个无前趋的顶点v，输出；（2）从有向图中删除v及以v为尾的弧；（3）重复（1）、（2），直接全部输出全部顶点或有向图中不存在无前趋的结点时为止。故A选项正确。","kps":["数据结构","第七讲 图"],"video":"","_n":"已知一个有向图如下图所示,则以下选项中()是由该图得到的一个拓扑序列."},{"id":"b_ds_17_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":17,"date":"","stem":"设有向无环图G中的有向边集合E={＜1，2＞，＜2，3＞，＜3，4＞，\n＜1，4＞}，则以下哪个选项是该图的一种拓扑排序序列（ ）。","options":{"A":"1，2，3，4","B":"2，3，4，1","C":"1，4，2，3","D":"1，2，4，3"},"answer":["A"],"analysis":"有向边集合E定义了顶点间的关系：1必须在2和4之前，2必须在3之前，3必须在4之前。因此拓扑排序必须满足1→2→3→4的顺序，序列1,2,3,4符合要求。其他选项均违反了某些边的顺序。","kps":["数据结构","第七讲 图"],"video":"","_n":"设有向无环图g中的有向边集合e={＜1,2＞,＜2,3＞,＜3,4＞,＜1,4＞},则以下哪个选项是该图的一种拓扑排序序列()."},{"id":"b_ds_18_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":18,"date":"","stem":"若用邻接矩阵存储有向图，矩阵中主对角线以下的元素均为无穷大，则该图的拓扑序列（ ）。","options":{"A":"存在，且唯一","B":"存在，且不唯一","C":"存在，可能不唯一","D":"无法确定是否存在"},"answer":["C"],"analysis":"邻接矩阵中主对角线以下的元素均为无穷大，意味着不存在从编号大的顶点指向编号小的顶点的边，因此图中不存在环，拓扑序列一定存在。但由于边的具体分布不一定，拓扑序列不一定是唯一的，例如有向边集合E={＜1，2＞，＜1，3＞，＜1，4＞}构成的图，故选项C正确。","kps":["数据结构","第七讲 图"],"video":"","_n":"若用邻接矩阵存储有向图,矩阵中主对角线以下的元素均为无穷大,则该图的拓扑序列()."},{"id":"b_ds_19_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":19,"date":"","stem":"用DFS遍历有向无环图，并在DFS算法退栈返回时打印相应的顶点，打印完立即退栈返回，则输出的顶点序列是（ ）。","options":{"A":"逆拓扑有序的","B":"拓扑有序的","C":"无序的","D":"有序的"},"answer":["A"],"analysis":"在进行深度优先搜索（DFS）遍历有向无环图时，当从一个顶点退栈返回时打印该顶点，相当于对顶点进行后序遍历。由于有向无环图没有环，这种后序输出序列正好是逆拓扑有序的，即如果图中存在一条从顶点u到顶点v的路径，则v会先于u被打印出来。因此，输出的顶点序列是逆拓扑有序的。","kps":["数据结构","第七讲 图"],"video":"","_n":"用dfs遍历有向无环图,并在dfs算法退栈返回时打印相应的顶点,打印完立即退栈返回,则输出的顶点序列是()."},{"id":"b_ds_20_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":20,"date":"","stem":"下面说法不正确的是（ ）。\nI. 在AOE网中，减小一个关键活动上的权值后，整个工期也就相应缩短了\nII.AOE网工程工期为关键活动上的权值之和\nIII. 在关键路径上的活动都是关键活动，而关键活动也必在关键路径上","options":{"A":"仅I","B":"仅II","C":"仅III","D":"仅I、II"},"answer":["D"],"analysis":"在AOE网中，减小一个关键活动的权值不一定缩短整个工期。如果存在多条关键路径，且该活动只属于其中一条，则工期可能不变。AOE网工程工期是关键路径的长度，即从源点到汇点的最长路径上活动的权值之和，而非所","kps":["数据结构","第七讲 图"],"video":"","_n":"下面说法不正确的是().i.在aoe网中,减小一个关键活动上的权值后,整个工期也就相应缩短了ii.aoe网工程工期为关键活动上的权值之和iii.在关键路径上的活动都是关键活动,而关键活动也必在关键路径上"},{"id":"b_ds_21_第七讲 图","source":"bank500","subject":"ds","subjectName":"数据结构","lecture":"第七章 图","num":21,"date":"","stem":"如下图所示的AOE网表示一项包含8个活动的工程，则其关键活动有（ ）。","options":{"A":"a，b，c，d","B":"b，d，c，g","C":"b，c，d，e","D":"d，e，f，h"},"answer":["B"],"analysis":"如下图所示。","kps":["数据结构","第七讲 图"],"video":"","_n":"如下图所示的aoe网表示一项包含8个活动的工程,则其关 k-1个内部结点(记录比较中的失败者)。因此，败者树的总结点数(包括叶子结点和内部结点)为2k-1。-46-计算机组成与系统结构篇","kps":["数据结构","第九讲 排序"],"video":"","_n":"m个初始归并段采用k路平衡归并时,构建的败者树中共有()个结点(不计冠军结点)."},{"id":"b_co_1_第一讲 计算机系统概述","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第一章 计算机系统概述","num":1,"date":"","stem":"下列关于冯·诺依曼计算机的描述中，不正确的是（ ）。","options":{"A":"计算机硬件系统由运算器、控制器、存储器、输入设备和输出设备五大部件组成","B":"指令和数据在存储器中都是以二进制形式存储","C":"指令存储器和数据存储器独立存储在不同的存储器","D":"存储程序并按地址顺序执行是 CPU 自动工作的关键"},"answer":["C"],"analysis":"冯·诺依曼结构的计算机中，指令和数据存储在同一个存储器中，而不是分开存储。将指令和数据分开存储在不同存储器是哈佛结构的特点。","kps":["计算机组成与系统结构","第一讲 计算机系统概述"],"video":"","_n":"下列关于冯·诺依曼计算机的描述中,不正确的是()."},{"id":"b_co_2_第一讲 计算机系统概述","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第一章 计算机系统概述","num":2,"date":"","stem":"在冯·诺依曼计算机中，CPU根据（ ）区分从存储器中取出的是指令还是数据。","options":{"A":"指令和数据所在的存储单元地址不同","B":"访问指令和访问数据所处的指令执行阶段不同","C":"访问指令和访问数据的寻址方式不同","D":"指令和数据表示方式不同"},"answer":["B"],"analysis":"在冯·诺依曼计算机中，指令和数据都以二进制形式存储在同一个存储器中，CPU通过指令周期的不同阶段来区分读取的是指令还是数据，其中取指阶段CPU根据程序计数器（PC）中的指令地址访问存储器，此时取出的二进制信息被视为指令。执行阶段CPU根据指令中的地址码访问存储器（或寄存器），此时取出的二进制信息被视为数据。","kps":["计算机组成与系统结构","第一讲 计算机系统概述"],"video":"","_n":"在冯·诺依曼计算机中,cpu根据()区分从存储器中取出的是指令还是数据."},{"id":"b_co_3_第一讲 计算机系统概述","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第一章 计算机系统概述","num":3,"date":"","stem":"计算机硬件能够直接执行的程序包括（ ）。\nⅠ. 机器语言程序 Ⅱ. 汇编语言程序 Ⅲ. 硬件描述语言程序","options":{"A":"仅Ⅰ","B":"仅Ⅰ、Ⅱ","C":"仅Ⅰ、111","D":"Ⅰ、Ⅱ、Ⅲ"},"answer":["A"],"analysis":"机器语言程序由二进制代码（0和1）组成，是计算机硬件（CPU）能够直接识别和执行的指令集合。汇编语言程序是使用助记符（如MOV、ADD）表示的低级语言，必须通过汇编程序翻译成机器语言程序才能被硬件执行。硬件描述语言程序，如VHDL、Verilog，用于描述数字电路结构或行为，需要通过综合器和适配等流程转化为具体的硬件电路（如FPGA配置比特流或ASIC版图），并不是由CPU直接执行的程序。","kps":["计算机组成与系统结构","第一讲 计算机系统概述"],"video":"","_n":"计算机硬件能够直接执行的程序包括().ⅰ.机器语言程序ⅱ.汇编语言程序ⅲ.硬件描述语言程序"},{"id":"b_co_4_第一讲 计算机系统概述","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第一章 计算机系统概述","num":4,"date":"","stem":"只有当程序执行时才将源程序翻译成机器语言，并且一次只能翻译一行语句，边翻译边执行的是（ ）程序，把汇编语言源程序转变为机器语言程序的过程是（ ）。\nⅠ. 编译 Ⅱ. 目标 Ⅲ. 汇编 Ⅳ. 解释","options":{"A":"Ⅰ、Ⅱ","B":"Ⅳ、Ⅱ","C":"Ⅳ、Ⅰ","D":"Ⅳ、Ⅲ"},"answer":["D"],"analysis":"边翻译边执行指的是程序执行时才逐行翻译源程序为机器语言并立即执行。这种方式称为解释，对应的程序是解释程序（解释器）。而编译是将整个高级语言源程序一次性翻译成目标程序（机器语言或中间代码），然后执行目标程序，并非逐行边翻译边执行。将汇编语言源程序转换为机器语言程序的过程称为汇编，由汇编程序（汇编器）完成。目标程序通常指编译或汇编后生成的机器语言程序，本身不是翻译过程。","kps":["计算机组成与系统结构","第一讲 计算机系统概述"],"video":"","_n":"只有当程序执行时才将源程序翻译成机器语言,并且一次只能翻译一行语句,边翻译边执行的是()程序,把汇编语言源程序转变为机器语言程序的过程是().ⅰ.编译ⅱ.目标ⅲ.汇编ⅳ.解释"},{"id":"b_co_5_第一讲 计算机系统概述","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第一章 计算机系统概述","num":5,"date":"","stem":"下列关于机器指令和汇编指令的说法中，错误的是（ ）。","options":{"A":"可以直接用机器语言编写程序","B":"汇编指令和机器指令都能被计算机直接执行","C":"汇编语言和机器语言都与计算机系统结构相关","D":"汇编指令和机器指令一一对应，功能相同"},"answer":["B"],"analysis":"理论上可以直接使用二进制机器语言编写程序，但实际操作非常困难，故A正确。只有机器指令（二进制代码）能被计算机硬件直接执行，汇编指令是符号化的助记符，必须通过汇编器翻译成机器指令后才能执行，故B错误。机器语言和汇编语言都依赖于特定的计算机体系结构，不同的CPU有不同的指令集，故C正确。汇编指令与机器指令通常一一对应，两者功能相同，汇编指令只是机器指令的符号化表示，故D正确。","kps":["计算机组成与系统结构","第一讲 计算机系统概述"],"video":"","_n":"下列关于机器指令和汇编指令的说法中,错误的是()."},{"id":"b_co_6_第一讲 计算机系统概述","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第一章 计算机系统概述","num":6,"date":"","stem":"将高级语言源程序转化为可执行目标文件的主要过程是（ ）","options":{"A":"预处理→编译→汇编→链接","B":"预处理→汇编→编译→链接","C":"预处理→编译→链接→汇编","D":"预处理→汇编→链接→编译"},"answer":["A"],"analysis":"典型的高级语言（如C/C++）编译流程如下：预处理：展开宏定义、处理条件编译、包含头文件等，生成预处理后的源代码。编译：将预处理后的源代码翻译成汇编语言代码。汇编：将汇编代码转换为机器指令，生成目标文件（.o或.obj文件）。链接：将多个目标文件及库文件连接在一起，生成最终的可执行文件。这一标准顺序确保了源程序被逐步转换为可被计算机直接执行的二进制文件。","kps":["计算机组成与系统结构","第一讲 计算机系统概述"],"video":"","_n":"将高级语言源程序转化为可执行目标文件的主要过程是()"},{"id":"b_co_7_第一讲 计算机系统概述","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第一章 计算机系统概述","num":7,"date":"","stem":"假定计算机 M1 和 M2 具有相同的指令集体系结构（ISA），主频分别为1.5GHz和1.2GHz，在M1和M2上运行某程序P时经过编译得到相同的指令序列，平均CPI分别为2和1，则程序P在M1和M2上运行时间的比值是（ ）。","options":{"A":"0.4","B":"0.625","C":"1.6","D":"2.5"},"answer":["C"],"analysis":"程序运行时间 = 指令数×平均CPI×时钟周期 = ，两个指令序列的指令数相同，设为N，则程序P在M1和M2上运行时间的比值 == 1.6。","kps":["计算机组成与系统结构","第一讲 计算机系统概述"],"video":"","_n":"假定计算机m1和m2具有相同的指令集体系结构 量 CPU 执行指令的速度。MFLOPS 表示每秒执行的百万次浮点运算数（Million Floating-point Operations Per Second），用于衡量计算机的浮点运算性能。A选项中CPU主频不是“执行指令的频率”，CPI也不是“频率”。B选项中MIPS描述的是指令执行速度，而非一条指令使用的时钟周期数。C选项中MFLOPS是浮点运算速度，不是“浮点数指令”。","kps":["计算机组成与系统结构","第一讲 计算机系统概述"],"video":"","_n":"下列关于cpu主频,cpi,mips,mflops的说法中,正确的是()."},{"id":"b_co_1_第二讲 数据的表示和运算","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":1,"date":"","stem":"数值-59/64 的8位补码表示为（ ）。","options":{"A":"1.1100010","B":"1.0011101","C":"1.0001010","D":"0.0011110"},"answer":["C"],"analysis":"59D = 111011B，-59/64 = -0.1110110，[-59/64] = 1.1110110，原[-59/64] = 1.0001010。补","kps":["计算机组成与系统结构","第二讲 数据的表示和运算"],"video":"","_n":"数值-59/64的8位补码表示为()."},{"id":"b_co_2_第二讲 数据的表示和运算","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":2,"date":"","stem":"若[x]补 = 11011010，则x的十进制真值为（ ）。","options":{"A":"-38","B":"-37","C":"-36","D":"-35"},"answer":["A"],"analysis":"x为负数，将x的补码的数值位全部取反（符号位不动），末位加1即可得[x] = 10100110，[x] = -0100110 = -38。原 真值","kps":["计算机组成与系统结构","第二讲 数据的表示和运算"],"video":"","_n":"若[x]补=11011010,则x的十进制真值为()."},{"id":"b_co_3_第二讲 数据的表示和运算","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":3,"date":"","stem":"若整数x的移码[x]移 = 11011010，则x的十进制真值为（ ）。","options":{"A":"-90","B":"-88","C":"88","D":"90"},"answer":["D"],"analysis":"将移码符号位取反即可得[x] = 01011010 = [x] = 90。补 原","kps":["计算机组成与系统结构","第二讲 数据的表示和运算"],"video":"","_n":"若整数x的移码[x]移=11011010,则x的十进制真值为()."},{"id":"b_co_4_第二讲 数据的表示和运算","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":4,"date":"","stem":"设整数-1在计算机中的表示为11111110，则其采用的编码为（ ）","options":{"A":"原码","B":"反码","C":"补码","D":"移码"},"answer":["B"],"analysis":"[-1] = 10000001，[-1] = 11111110，[-1] = 11111111，[-1] =原 反 补 移01111111，因此其采用的编码为反码。","kps":["计算机组成与系统结构","第二讲 数据的表示和运算"],"video":"","_n":"设整数-1在计算机中的表示为11111110,则其采用的编码为()"},{"id":"b_co_5_第二讲 数据的表示和运算","source":"bank500","subject":"co","subjectName 数据的表示和运算","num":21,"date":"","stem":"十进制数69的IEEE754单精度浮点数表示为（ ）。","options":{"A":"428B0000H","B":"428A0000H","C":"528A0000H","D":"429A0000H"},"answer":["B"],"analysis":"69 =1000101 = 1.000101×26，符号位S=0，阶码10 2e=6+127=133 =10000101，尾数=00010100000000000000000，因此69的IEEE75410 2单精度浮点数表示为01000010100010100000000000000000 = 428A0000H。","kps":["计算机组成与系统结构","第二讲 数据的表示和运算"],"video":"","_n":"十进制数69的ieee754单精度浮点数表示为()."},{"id":"b_co_22_第二讲 数据的表示和运算","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":22,"date":"","stem":"C语言中一个float类型变量的机器数为7F800000H，则其对应的真值是（ ）?","options":{"A":"+∞","B":"-∞","C":"+0","D":"-0"},"answer":["A"],"analysis":"7F80 0000 = 01111111100000000000000000000000，阶码全1，尾数全0，符号位为0，对应+∞。","kps":["计算机组成与系统结构","第二讲 数据的表示和运算"],"video":"","_n":"c语言中一个float类型变量的机器数为7f800000h,则其对应的真值是()?"},{"id":"b_co_23_第二讲 数据的表示和运算","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":23,"date":"","stem":"计算机中用IEEE754标准表示的浮点数进行加减运算之前需要先进行对阶操作，若x的阶码大于y的阶码，则应将（ ）。","options":{"A":"x的阶码缩小至与y的阶码相同，且使x的尾数部分进行左移","B":"x的阶码缩小至与y的阶码相同，且使x的尾数部分进行右移","C":"y的阶码扩大至与x的阶码相同，且使y的尾数部分进行左移","D":"y的阶码扩大至与x的阶码相同，且使y的尾数部分进行右移"},"answer":["D"],"analysis":"浮点数加减运算的对阶核心是小阶向大阶看齐，将小阶数的阶码提升至大阶数的阶码，仅需对尾数进行右移（损失低位精度，误差更小）。","kps":["计算机组成与系统结构","第二讲 数据的表示和运算"],"video":"","_n":"计算机中用ieee754标准表示的浮点数进行加减运算之前需要先进行对阶操作,若x的阶码大于y的阶码,则应将()."},{"id":"b_co_24_第二讲 数据的表示和运算","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第二章 数据的表示和运算","num":24,"date":"","stem":"下列关于计算机中数据运算的叙述中，正确的是（ ）。\nI.定点数运算和浮点数运算的结果都可能发生溢出。\nII.只有定点数运算的结果才可能溢出，浮点数运算的结果不可能溢出。\nIII.在进行补码加法时，只有同号数据的运算才可能出现溢出。\nIV.采用双符号位补码表示的定点数加减运算不会发生溢出。\nV.在进行补码1位乘法时，被乘数和乘数的符号均参与运算。","options":{"A":"I、III、IV、V","B":"I、III、V","C":"II、III、IV、V","D":"III、IV、V"},"answer":["B"],"analysis":"定点数运算在结果超出其表示范围时会发生溢出，浮点数运算的结果也可能发生“溢出”（上溢，即阶码超出最大值），也可能发生“下溢”（阶码小于最小值）。所以浮点数运算也是会溢出的，故I对，II错。补码加法溢出的原因是两个正数相加得到负数（正溢），或两个负数相加得到正数（负溢），异号相加不会溢出（因为结果的绝对值小于其中一个操作数，不会超出表示范围）。此III正确。双符号位可以帮助检测溢出，但溢出一样可能发生，IV错。补码一位乘法可以直接将符号位一起参与运算，不必像原码乘法那样符号单独处理，V正确。","kps":["计算机组成与系统结构","第二讲 数据的表示和运算"],"video":"","_n":"下列关于计算机中数据运算的叙述中,正确的是().i.定点数运算和浮点数运算的结果都可能发生溢出.ii.只有定点数运算的结果才可能溢出,浮点数运算的结果不可能溢出.iii.在进行补码加法时,只有同号数据的运算才可能出现溢出.iv.采用双符号位补码表示的定点数加减运算不会发生溢出.v.在进行补码1位乘法时,被乘数和乘数的符号均参与运算."},{"id":"b_co_1_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":1,"date":"","stem":"在存储器分层体系结构中，存储器存储速度从最快到最慢的排列顺序是（ ）。","options":{"A":"寄存器→主存→Cache→辅存","B":"寄存器→主存→辅存→Cache","C":"寄存器→Cache→辅存→主存","D":"寄存器→Cache→主存→辅存"},"answer":["D"],"analysis":"核心规律：离 CPU 越近，速度越快。存储器速度排序（由快到慢）：寄存器（CPU内部，最快）、Cache（SRAM，比主存快）、主存（DRAM）、辅存（磁盘、SSD等，最慢）","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"在存储器分层体系结构中,存储器存储速度从最快到最慢的排列顺序是()."},{"id":"b_co_2_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":2,"date":"","stem":"对主存储器进行连续两次的读写操作所需的最小时间间隔称为（ ）。","options":{"A":"存取时间","B":"存取周期","C":"CPU 周期","D":"机器周期"},"answer":["B"],"analysis":"存取时间（AccessTime）是指从启动一次存储器操作到完成该操作所经历的时间。存取周期（MemoryCycleTime）是指连续两次访问存储器所需的最小时间间隔，通常比存取时间长，因为还包括存储器内部的恢复时间。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"对主存储器进行连续两次的读写操作所需的最小时间间隔称为()"},{"id":"b_co_3_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":3,"date":"","stem":"某计算机字长32位，主存容量是128KB，若按字编址，则该计算机的寻址范围是（ ）。","options":{"A":"64K","B":"32K","C":"64KB","D":"32KB"},"answer":["B"],"analysis":"字长 32 位 = 4 字节，按字编址指的是每个地址对应一个 4 字节的字，因此总字数 = 总字节数/4=32K，故寻址范围是 0 到 32K-1，即 32K（单位是“字”）。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"某计算机字长32位,主存容量是128kb,若按字编址,则该计算机的寻址范围是()."},{"id":"b_co_4_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":4,"date":"","stem":"下面关于随机存取存储器（RAM）的叙述中，正确的是（ ）。","options":{"A":"SRAM集成度低，但存取速度快且无须刷新","B":"DRAM的集成度高且成本高，常用作 Cache","C":"DRAM的存取速度比 SRAM 的快","D":"DRAM中存储的数据断电后不会丢失"},"answer":["A"],"analysis":"SRAM 用双稳态触发器存储，速度快，无须刷新，但单元晶体管多→集成度低，A正确；DRAM 集成度高且成本低（不是高），常用作主存，Cache 用的是 SRAM，错在“成本高”和“用作 Cache”，B错误；SRAM 存取速度比 DRAM快，C错误，DRAM 是易失性存储器，断电数据丢失，D错误。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"下面关于随机存取存储器(ram)的叙述中,正确的是()."},{"id":"b_co_5_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":5,"date":"","stem":"以下对半导体存储器的叙述，正确的是（ ）。","options":{"A":"Flash存储器功耗低、集成度高，读写速度一样快，目前得到了广泛使用","B":"SRAM是易失性半导体存储器，需要刷新，常用作Cache","C":"DRAM集成度高、功耗低，常用作主存","D":"EEPROM是一种需要通过紫外线擦除的存储器"},"answer":["C"],"analysis":"Flash 功耗低、集成度高，但读快写慢（写需要先擦除），A错误，错在“读写速度一样快”；SRAM 是易失性，无须刷新（DRAM才需要），常用作 Cache，B错误，错在“需要刷新”。需紫外线擦除的是EPROM（窗口），EEPROM是电擦除，D错误，错在“紫外线”。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"以下对半导体存储器的叙述,正确的是()."},{"id":"b_co_6_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":6,"date":"","stem":"关于RAM和ROM芯片，以下选项不正确的是（ ）。","options":{"A":"ROM和RAM都采用随机访问方式进行读写","B":"RAM是可读可写存储器，ROM是只读存储器","C":"系统的主存由RAM和ROM组成","D":"系统的主存都用DRAM芯片实现"},"answer":["D"],"analysis":"ROM 和 RAM 均属于随机存取存储器，均可按地址直接访问，A正确；RAM 可读可写，ROM 出厂后一般只读，程序执行期间不能写入，B正确；主存空间既包含可读写的 RAM 区，也包含固化的 ROM 区（如 BIOS），C正确；主存需要 RAM 区（通常用 DRAM 芯片实现），但ROM 部分并非 DRAM，D错误，错在“全部主存都用 DRAM 实现”。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"关于ram和rom芯片,以下选项不正确的是()."},{"id":"b_co_7_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":7,"date":"","stem":"下列关于存储器的叙述正确的是（ ）。\nI. 动态存储器是利用电容电荷来存储信息的，需要周期性逐个刷新每一个存储单元\nII.Flash存储器具有不易失特性，所以它是ROM且无法更新存储单元\nIII.DRAM是动态存储器，采用随机存取方式，读写时主存地址需分两次传送","options":{"A":"仅I","B":"仅I、III","C":"仅II、III","D":"仅III"},"answer":["D"],"analysis":"DRAM 靠电容存储电荷，需要刷新，但刷新是按行进行，不是逐个存储单元刷新，I错误，错在“逐个刷新”；Flash 是不易失，属于 ROM 类，但可电擦写，支持更新（如 U 盘、SSD），II错误，错在“无法更新”；DRAM 采用随机存取方式，为减少引脚，地址分两次传送（行地址、列地址），III 正确。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"下列关于存储器的叙述正确的是().i.动态存储器是利用电容电荷来存储信息的,需要周期性逐个刷新每一个存储单元ii.flash存储器具有不易失特性,所以它是rom且无法更新存储单元iii.dram是动态存储器,采用随机存取方式,读写时主存地址需分两次传送"},{"id":"b_co_8_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":8,"date":"","stem":"某 SRAM 芯片，其存储容量为 512K×8 位，该芯片的地址线和数据线数目分别为（ ）。","options":{"A":"8、512","B":"512、8","C":"19、8","D":"10、8"},"answer":["C"],"analysis":"SRAM没有地址复用，因此地址引脚19根，数据引脚8根。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"某sram芯片,其存储容量为512k×8位,该芯片的地址线和数据线数目分别为()."},{"id":"b_co_9_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":9,"date":"","stem":"现有一计算机字长32位，CPU地址总线有24根，按字编址，用512K\n×8位的RAM芯片构成该计算机的主存储器，则该计算机主存需要（ ）片这样的存储芯片。","options":{"A":"256","B":"512","C":"64","D":"128"},"answer":["D"],"analysis":"地址总线24根，按字编址，因此主存空间大小为224字，字长32位，对应主存容量为224×4字节=64MB，每片RAM芯片容量为512KB，因此所需芯片总数 = 主存总字节数 ÷ 每芯片字节数 =64MB/512KB=128片。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"现有一计算机字长32位,cpu地址总线有24根,按字编址,用512k×8位的ram芯片构成该计算机的主存储器,则该计算机主存需要()片这样的存储芯片."},{"id":"b_co_10_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":10,"date":"","stem":"设一存储器地址总线为A ~A ，用4K×4位的存储芯片构成容量为15 016KB的存储器，则产生片选信号的译码器的输入地址线应该是（ ）。","options":{"A":"A3A2","B":"A1A0","C":"A14A13","D":"A13A12"},"answer":["D"],"analysis":"存储芯片容量 4K×4位，需要组成 16KB 存储器。先进行位扩展：用2 片 4K×4 位组成 4K×8 位，再进行字扩展：16KB/4KB=4 组，每组对应一个 4KB 的地址空间。4KB 地址空间内部需要 12 根地址线，因此芯片内地址用 A ～A，剩余高位地11 0址线A ～A ，用于产生片选信号，需要 4 个片选，可用 2-4 译码器，需要 215 12根输入地址线。因此产生片选信号的译码器的输入地址线应该是A A 。13 12","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"设一存储器地址总线为a15~a0,用4k×4位的存储芯片构成容量为16kb的存储器,则产生片选信号的译码器的输入地址线应该是()."},{"id":"b_co_11_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":11,"date":"","stem":"使用4片8K×8 位的存储芯片构成一个容量为32KB的内存储器，用末两位地址A1、A0作为片选信号，用13根地址线A14～A2与每个存储芯片的地址引脚相连，则第0片存储芯片中各存储单元的地址是（ ）。","options":{"A":"0，4，…，7FFCH","B":"0，1，2，…，7FFCH","C":"0，4，…，FFFCH","D":"0，1，2，…，FFFCH"},"answer":["A"],"analysis":"4片 8K×8位芯片构成 32KB 存储器，每片容量 8KB，按字节编址，每片芯片需要 13 根地址线，因此用 A14～A2 作为芯片内地址，剩余 A1、A0 用作片选信号，第 0 片中A1A0 = 00，A14～A2 从 0 到 8K-1 变化。A14～A2 为 0 时，地址 = 0000H（对应 0）；A14～A2 为 1 时，地址 = 000...001 00 = 4；A14～A2 为 2 时，地址 = 000...010 00 = 8；……A14～A2 为 8191 时，地址 = 7FFCH。所以第 0 片地址是 0，4，8，…，7FFCH（每次加 4）。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"使用4片8k×8位的存储芯片构成一个容量为32kb的内存储器,用末两位地址a1,a0作为片选信号,用13根地址线a14～a2与每个存储芯片的地址引脚相连,则第0片存储芯片中各存储单元的地址是()."},{"id":"b_co_12_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":12,"date":"","stem":". 多模块存储器之所以能提高存储器的访问速度，是因为（ ）。","options":{"A":"采用了高速元器件","B":"各模块有独立的读/写电路","C":"采用了信息预读技术","D":"模块内各单元地址连续"},"answer":["B"],"analysis":"多模块存储器提高访问速度的原因是各模块有独立的读/写电路，从而可以实现多个模块并行工作（如轮流启动或同时访问），减少存储器平均访问时间。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":".多模块存储器之所以能提高存储器的访问速度,是因为()."},{"id":"b_co_13_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":13,"date":"","stem":"下列关于DRAM和SDRAM的说法中，不正确的是（ ）。","options":{"A":"传统DRAM芯片与CPU采用异步方式交换数据","B":"SDRAM芯片与CPU采用同步方式交换数据","C":"DRAM需要定期刷新，而SDRAM不需要定期刷新","D":"SDRAM的行缓冲器通常用SRAM实现"},"answer":["C"],"analysis":"传统 DRAM 与 CPU 异步交换数据，由 CPU 提供地址和控制信号后，便不断采样DRAM的完成信号，经过一段时间的延迟（在这段时间内CPU不能做别的事），数据才读出或写入，A正确；SDRAM和CPU之间采用同步方式交换数据，SDRAM将CPU发出地址和控制信号进行锁存，经过确定的几个时钟周期后给出响应，在这段时间内CPU可以做别的事，B正确；SDRAM 本质仍是 DRAM，仍然需要定期刷新，只是刷新操作由内部逻辑管理，对用户透明，C错误；SDRAM内部行缓冲器通常用 SRAM 实现以提高速度，D正确。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"下列关于dram和sdram的说法中,不正确的是()."},{"id":"b_co_14_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":14,"date":"","stem":"已知磁盘的数据传输速率为10MB/s，磁盘转速为9600RPM，磁盘控制器延时2.5ms，平均寻道时间为15ms，则该硬盘写2KB数据的时间为（ ）。","options":{"A":"13.825ms","B":"15.125ms","C":"15.325ms","D":"20.8298ms"},"answer":["D"],"analysis":"总时间 = 寻道时间 + 旋转延迟 + 传输时间 + 控制器延迟，其中寻道时间 = 15 ms，转一圈时间 = 60 s / 9600 = 0.00625 s = 6.25 ms，平均旋转延迟 = 半圈时间 =6.25ms/2=3.125ms，传输时间 =2048/106=0.2048ms，控制器延时 = 2.5 ms，总时间 = 15 + 3.125 + 0.2048 + 2.5 = 20.8298ms。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"已知磁盘的数据传输速率为10mb/s,磁盘转速为9600rpm,磁盘控制器延时2.5ms,平均寻道时间为15ms,则该硬盘写2kb数据的时间为()."},{"id":"b_co_15_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":15,"date":"","stem":"假定某一磁盘的转速为6000RPM（转/分），平均寻道时间为5ms，数据传输率为4MB/s，不考虑排队时间，则读一个512B扇区的时间大约是（ ）。","options":{"A":"10.125ms","B":"10.128ms","C":"15.128ms","D":"15.125ms"},"answer":["B"],"analysis":"读一个扇区的时间 = 平均寻道时间 + 平均旋转延迟 + 传输时间，其中平均寻道时间 = 5 ms，转速 6000 RPM，则每转时间 = 60 s / 6000 =10 ms，平均旋转延迟 = 半圈时间 = 5 ms，传输时间 = 512 / (4×106) = 0.128 ms，总时间 = 5 + 5 + 0.128 = 10.128 ms。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"假定某一磁盘的转速为6000rpm(转/分),平均寻道时间为5ms,数据传输率为4mb/s,不考虑排队时间,则读一个512b扇区的时间大约是()."},{"id":"b_co_16_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":16,"date":"","stem":"下列磁盘阵列模式中，没有容错功能的是（ ）。","options":{"A":"RAID0","B":"RAID1","C":"RAID3","D":"RAID5"},"answer":["A"],"analysis":"RAID（独立磁盘冗余阵列）通过将数据分布在多个磁盘上来提高性能或可靠性，不同级别提供不同的容错能力，RAID0将数据分块（条带）依次写入多个磁盘，读写并行，速度快，但没有任何数据冗余。任意一个磁盘损坏，整个阵列的数据都会丢失。因此 RAID 0 没有容错功能。RAID 1数据同时在两个（或多个）磁盘上写完全相同的内容，一个磁盘损坏时另一个磁盘仍可正常工作，因此有容错功能。RAID3数据按位或字节拆分，分别写入数据盘，另设一个专用盘存放奇偶校验信息。如果一个数据盘损坏，可通过剩余数据盘和奇偶盘恢复数据，因此有容错功能。RAID 5类似 RAID 3，但将奇偶校验信息分布存储在阵列的所有磁盘上，没有专用校验盘，同样允许单个磁盘故障时恢复数据，因此有容错功能。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"下列磁盘阵列模式中,没有容错功能的是()."},{"id":"b_co_17_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":17,"date":"","stem":"下面关于RAID的说法中正确的是（ ）。","options":{"A":"RAID0 采用镜像盘","B":"RAID1 无冗余","C":"RAID2 采用 CRC 校验","D":"RAID3 采用奇偶校验"},"answer":["D"],"analysis":"RAID0 采用条带化，无镜像，A 错误；RAID1 是镜像（有冗余），B 错误；RAID2 采用海明码纠错，不是 CRC，C 错误；RAID3 采用奇偶校验（位交叉存取+专用奇偶盘），D 正确。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"下面关于raid的说法中正确的是()."},{"id":"b_co_18_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":18,"date":"","stem":"下列关于固态硬盘（SSD）的说法中，不正确的是（ ）。","options":{"A":"固态硬盘的读写是以页为单位的","B":"固态硬盘的擦除以页为单位的","C":"由于固态硬盘在写入时需要擦除，所以固态硬盘的写入比读取要慢很多","D":"由于固态硬盘的写入次数有限，为延长使用寿命，一般引入磨损均衡"},"answer":["B"],"analysis":"SSD 中读/写操作的基本单位是页（通常 4KB 或更大），A 正确；SSD中擦除的基本单位是块（由多个页组成），不是页，B 错误；因为必须先擦除块才能写入页，所以写入前需要先读→擦→写过程，比单纯读要慢，C 正确；磨损均衡用于均衡各块的擦写次数以延长寿命，D 正确。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"下列关于固态硬盘(ssd)的说法中,不正确的是()."},{"id":"b_co_19_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":19,"date":"","stem":"若一个存储单元被访问后，很快又被再次访问，这称为（ ）。","options":{"A":"时间局部性","B":"空间局部性","C":"程序局部性","D":"数据局部性"},"answer":["A"],"analysis":"时间局部性：如果一个存储单元被访问，则不久后它很可能被再次访问。空间局部性：如果一个存储单元被访问，则其邻近单元很可能很快被访问。题目描述“一个存储单元被访问后，很快又被再次访问”正是时间局部性的定义。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"若一个存储单元被访问后,很快又被再次访问,这称为()."},{"id":"b_co_20_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":20,"date":"","stem":"假设Cache的访问时间为5ns，主存访问时间为100ns，若Cache-主存系统的平均访问时间为6ns，则Cache的命中率为（ ）。","options":{"A":"99%","B":"98%","C":"97%","D":"96%"},"answer":["A"],"analysis":"平均时间 = 命中率 × Cache 访问时间 + (1 - 命中率) × (Cache访问时间 + 主存访问时间)，代入数值：6 = H × 5 + (1 - H) × (5 + 100)，H = 0.99。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"假设cache的访问时间为5ns,主存访问时间为100ns,若cache-主存系统的平均访问时间为6ns,则cache的命中率为()."},{"id":"b_co_21_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":21,"date":"","stem":"以下选项中哪种方法不能提高Cache命中率（ ）。","options":{"A":"增加Cache容量","B":"增加主存容量","C":"对程序优化编译","D":"采用合适的地址映像方式"},"answer":["B"],"analysis":"增大 Cache 容量能减少冲突/容量缺失，提高命中率；增加主存容量并不改变 Cache 命中率，因为程序访问的局部性与主存总大小无关，不会减少访问 Cache 时的缺失次数；优化编译可改善程序空间/时间局部性，提高命中率；选择合适的映像方式（如组相联优于直接映射）能减少冲突缺失，提高命中率。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"以下选项中哪种方法不能提高cache命中率()."},{"id":"b_co_22_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":22,"date":"","stem":"在程序的执行过程中，Cache 与主存的地址映射是由（ ）。","options":{"A":"操作系统来管理的","B":"程序员调度的","C":"硬件自动完成的","D":"用户软件完成的"},"answer":["C"],"analysis":"Cache 与主存之间的地址映射、替换算法、命中判断全部由硬件电路自动完成，对操作系统和程序员都是透明的，目的是为了尽可能快。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"在程序的执行过程中,cache与主存的地址映射是由()."},{"id":"b_co_23_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":23,"date":"","stem":"某32位计算机按字节编址，Cache容量为16KB，Cache行的大小为16\nB，若主存与Cache地址映射采用直接映射方式，则主存地址为0x1234E8F8的单元装入Cache的地址是（ ）。","options":{"A":"00010001001101","B":"01000100011010","C":"10100011111000","D":"11010011101000"},"answer":["C"],"analysis":"Cache总行数=16KB/16B=1024 行，因此索引占10位，块内地址16B，按字节编址，因此块内地址占 4 位，主存地址 0x1234E8F8 = 0001 0010 00110100 1110 1000 1111 1000从最低位（左高右低）起，低 4 位 1000 是块内地址，接着 10 位 1010001111是索引，因此Cache地址为10 1000 1111 1000，故选C。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"某32位计算机按字节编址,cache容量为16kb,cache行的大小为16b,若主存与cache地址映射采用直接映射方式,则主存地址为0x1234e8f8的单元装入cache的地址是()."},{"id":"b_co_24_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":24,"date":"","stem":"对于采用n路组相联映射方式的Cache，在保持主存容量和Cache总容量不变的前提下，将主存块大小和Cache块大小都增加一倍，则下列描述中正确的是（ ）。","options":{"A":"块内地址的位数增加1位，主存tag字段的位数增加1位","B":"块内地址的位数增加1位，主存tag字段的位数不变","C":"块内地址的位数减少1位，主存tag字段的位数增加1位","D":"块内地址的位数增加1倍，主存tag字段的位数减少一半"},"answer":["B"],"analysis":"组相联方式中主存地址的结构为（tag，索引，块内地址），根据索引定位Cache组，若主存块大小和Cache块大小都增加一倍，例如从64B增加到128B，则块内地址的位数增加1位，Cache总块数减小1倍，例如从8块减小到4块，保持每组内的块数不变，因此组数减小1倍，即索引字段减少1位，故tag字段不变。","kps":["计算机组成与系统结构","第三讲 存储器层次结构"],"video":"","_n":"对于采用n路组相联映射方式的cache,在保持主存容量和cache总容量不变的前提下,将主存块大小和cache块大小都增加一倍,则下列描述中正确的是()."},{"id":"b_co_25_第三讲 存储器层次结构","source":"bank500","subject":"co","subjectName":"计算机组成与系统结构","lecture":"第三章 存储器层次结构","num":25,"date":"","stem":"某计算机主存块大小为16B，按字节编址，Cache采用8路组相联映射方式，共128KB，则主存地址1234567H中Tag字段是（ ）。","options":{"A":"1234H","B":"2468H","C":"048DH","D":"12345H"},"answer":["C"],"analysis":"组相联方式中主存地址的结构为（tag，索引，块内地址），主存块大小为16B，按字节编
